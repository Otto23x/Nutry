function weekSummary(){
  const days=PLAN.map((d,di)=>{const e=eatenOfDay(di);
    return {day:d.day,eat:e.k,prot:e.p,c:e.c,f:e.f,fib:e.fib,burn:burnedOfDay(di),def:deficitOfDay(di),sk:skippedOfDay(di),
      sgarri:extrasKcal(di),sleep:S.week.days[di].sleep,relax:S.week.days[di].relax,feel:S.week.days[di].feel,
      note:S.week.days[di].note||"",workouts:S.week.days[di].workouts.map(w=>w.sport+" "+w.min+"'")}});
  days.forEach((d,di)=>d.completed=dayCompleted(di));
  const done=days.filter(d=>d.completed);
  const avg=a=>a.length?Math.round(a.reduce((x,y)=>x+y,0)/a.length):0;
  return {from:S.week.started,to:iso(new Date()),tdee:tdee(),weight:S.profile.w,nDone:done.length,
    avgEat:avg(done.map(d=>d.eat)),avgProt:avg(done.map(d=>d.prot)),avgDef:avg(done.map(d=>d.def)),
    totBurn:days.reduce((a,d)=>a+d.burn,0),days,ai:null};}
/* ═══════════════════════════════════════════════════════════════
   PERIODI: Dieta 1 → Periodo libero 1 → Dieta 2 …
   Ogni periodo ha inizio/fine, aspettativa iniziale (★), motivazione
   di inizio, giudizio finale (★), motivazione di fine e — per i
   periodi chiusi — una valutazione AI (★ + indicazioni) basata su
   come hai mangiato, sugli allenamenti e sui risultati.
   ═══════════════════════════════════════════════════════════════ */
function activePeriod(){return S.periods.find(p=>!p.end)||null;}
function periodLabel(p){return (p.type==="dieta"?"Dieta ":"Periodo libero ")+p.n;}
function starsTxt(n){n=Math.max(0,Math.min(5,Math.round(+n||0)));return "★".repeat(n)+"☆".repeat(5-n);}
function nextPeriodN(type){return S.periods.filter(p=>p.type===type).length+1;}
function weightNear(dateISO,after){ // peso registrato più vicino alla data (after: primo dopo, altrimenti ultimo prima)
  const ws=(S.profile.weights||[]).slice().sort((a,b)=>new Date(a.d)-new Date(b.d));
  if(!ws.length)return null;const t=new Date(dateISO+"T12:00:00");
  if(after){const x=ws.find(w=>new Date(w.d)>=t);return x?x.w:ws[ws.length-1].w;}
  const before=ws.filter(w=>new Date(w.d)<=t);return before.length?before[before.length-1].w:ws[0].w;}
function periodStats(p){
  const endISO=p.end||iso(new Date());
  const days=flattenDiet().filter(d=>d.date>=p.start&&d.date<=endISO);
  const done=days.filter(d=>d.eat>0);
  const n=done.length||1;
  const avg=k=>Math.round(done.reduce((a,d)=>a+(d[k]||0),0)/n);
  const workouts=days.reduce((a,d)=>a+((d.workouts||[]).length),0);
  const w0=weightNear(p.start,true),w1=weightNear(endISO,false);
  const dW=(w0!=null&&w1!=null)?Math.round((w1-w0)*10)/10:null;
  const nDays=Math.max(1,Math.round((new Date(endISO+"T12:00:00")-new Date(p.start+"T12:00:00"))/864e5)+1);
  return{nDays,nDone:done.length,avgEat:avg("eat"),avgProt:avg("prot"),avgFib:avg("fib"),avgDef:avg("def"),workouts,w0,w1,dW};}
window.startPeriod=(type)=>{
  if(activePeriod())return alert("C'è già un periodo aperto ("+periodLabel(activePeriod())+"). Chiudilo prima di iniziarne uno nuovo.");
  const start=prompt("Data di inizio (AAAA-MM-GG):",iso(new Date()));if(!start)return;
  if(!/^\d{4}-\d{2}-\d{2}$/.test(start))return alert("Formato data non valido.");
  const exp=parseInt(prompt("Con che aspettativa di impegno parti? (1–5 stelle)","4"));
  const note=prompt("Motivazione di inizio (perché cominci, cosa vuoi ottenere):","")||"";
  S.periods.push({id:Date.now(),type,n:nextPeriodN(type),start,end:null,
    expStars:Math.max(1,Math.min(5,exp||3)),expNote:note,endStars:null,endNote:"",aiStars:null,aiText:""});
  save();render(cur);toast(periodLabel(S.periods[S.periods.length-1])+" iniziato ✓");};
window.endPeriod=(id)=>{
  const p=S.periods.find(x=>x.id===id);if(!p||p.end)return;
  const end=prompt("Data di fine (AAAA-MM-GG):",iso(new Date()));if(!end)return;
  if(!/^\d{4}-\d{2}-\d{2}$/.test(end)||end<p.start)return alert("Data non valida (deve essere ≥ inizio).");
  const st=parseInt(prompt("Come ti senti di essere andato/a davvero? (1–5 stelle)","3"));
  const note=prompt("Motivazione di fine (com'è andata, cosa hai imparato):","")||"";
  p.end=end;p.endStars=Math.max(1,Math.min(5,st||3));p.endNote=note;
  save();render(cur);toast(periodLabel(p)+" chiuso ✓ Ora puoi chiedere la valutazione AI in Storico.");};
window.editPeriod=(id)=>{
  const p=S.periods.find(x=>x.id===id);if(!p)return;
  const start=prompt("Data di inizio:",p.start);if(start&&/^\d{4}-\d{2}-\d{2}$/.test(start))p.start=start;
  if(p.end){const end=prompt("Data di fine:",p.end);if(end&&/^\d{4}-\d{2}-\d{2}$/.test(end)&&end>=p.start)p.end=end;}
  const en=prompt("Motivazione di inizio:",p.expNote||"");if(en!==null)p.expNote=en;
  if(p.end){const xn=prompt("Motivazione di fine:",p.endNote||"");if(xn!==null)p.endNote=xn;}
  save();render(cur);};
window.delPeriod=(id)=>{const p=S.periods.find(x=>x.id===id);if(!p)return;
  if(!confirm("Elimino "+periodLabel(p)+"? I dati giornalieri restano, sparisce solo il raggruppamento."))return;
  S.periods=S.periods.filter(x=>x.id!==id);save();render(cur);};
window.analyzePeriod=(id)=>{ // apre l'Analisi con il range del periodo
  const p=S.periods.find(x=>x.id===id);if(!p)return;
  AN.mode="manuale";AN.from=p.start;AN.to=p.end||iso(new Date());
  render("storico");
  const f=document.getElementById("anFrom"),t=document.getElementById("anTo");
  if(f)f.value=AN.from;if(t)t.value=AN.to;drawAnalysis();
  const card=document.getElementById("anMode");if(card)card.scrollIntoView({behavior:"smooth"});};
window.aiRatePeriod=async(id)=>{
  const p=S.periods.find(x=>x.id===id);if(!p||!p.end)return;
  if(!aiOn())return aiFail(new Error("nokey"));
  const st=periodStats(p);
  try{
    const t=await aiAsk('Sei un coach nutrizionale. Valuta questo periodo "'+periodLabel(p)+'" ('+p.start+' → '+p.end+', '+st.nDays+' giorni).'
      +' Dati: giorni tracciati '+st.nDone+', kcal medie '+st.avgEat+', proteine medie '+st.avgProt+' g, fibre medie '+st.avgFib+' g,'
      +' deficit medio '+st.avgDef+' kcal, allenamenti totali '+st.workouts+','
      +' peso da '+(st.w0!=null?st.w0+' kg':'n.d.')+' a '+(st.w1!=null?st.w1+' kg':'n.d.')+(st.dW!=null?' ('+(st.dW>0?'+':'')+st.dW+' kg)':'')+'.'
      +' Aspettativa iniziale dell\'utente: '+p.expStars+'/5 ("'+(p.expNote||"")+'"). Autovalutazione finale: '+p.endStars+'/5 ("'+(p.endNote||"")+'").'
      +' Dai un voto onesto in stelle (1-5) su come si è comportato davvero, e 3-4 indicazioni concrete e incoraggianti in italiano.'
      +' Rispondi SOLO JSON: {"stelle":numero,"testo":"..."}');
    const j=parseAIJSON(t);
    p.aiStars=Math.max(1,Math.min(5,Math.round(j.stelle)||3));p.aiText=String(j.testo||"").trim();
    save();render("storico");toast("Valutazione AI pronta ✓");
  }catch(e){aiFail(e);}};

/* ═══ TABELLONE: esportazione completa di un periodo ═══════════════
   Una riga per giorno con TUTTO ciò che è stato inserito o calcolato:
   pianificato vs mangiato, macro completi, sport, sonno/relax/umore,
   acqua, evento del giorno, periodo di dieta, azioni compiute
   (ribilanciamento, recupero, spostamenti) e conteggio dei pasti.
   Serve sia all'utente sia all'AI per l'analisi dei pattern. */
function periodOfDate(dISO){
  const p=(S.periods||[]).find(x=>dISO>=x.start&&(!x.end||dISO<=x.end));
  return p?periodLabel(p):"";}
const EXPORT_COLS=[
  ["data","date"],["giorno",d=>new Date(d.date+"T12:00:00").toLocaleDateString("it-IT",{weekday:"long"})],
  ["periodo",d=>periodOfDate(d.date)],
  ["evento",d=>(S.dayEvents||{})[d.date]||""],
  ["giornata_particolare",d=>d.hard?"si":"no"],
  ["kcal_piano","planK"],["kcal_mangiate","eat"],["kcal_scostamento",d=>(d.planK?d.eat-d.planK:"")],
  ["prot_piano","planP"],["prot_mangiate","prot"],["prot_scostamento",d=>(d.planP?d.prot-d.planP:"")],
  ["carbo_piano","planC"],["carbo_mangiati","c"],
  ["grassi_piano","planF"],["grassi_mangiati","f"],
  ["fibre_piano","planFib"],["fibre_mangiate","fib"],
  ["zuccheri_piano","planZ"],["zuccheri_mangiati","z"],
  ["fabbisogno_tdee","tdee"],["kcal_sport","burn"],["deficit","def"],
  ["n_allenamenti","workoutN"],["allenamenti",d=>(d.workouts||[]).join(" + ")],
  ["sonno","sleep"],["relax","relax"],["umore","feel"],["acqua_bicchieri","water"],
  ["pasti_totali","mealsTot"],["pasti_spuntati","mealsDone"],["pasti_saltati","mealsSkip"],
  ["extra_n","extrasN"],["extra_kcal","sgarri"],
  ["pasti_spostati","moved"],["ribilanciato",d=>d.rebalanced?"si":"no"],["kcal_recuperate","recovered"],
  ["giornata_completa",d=>d.completed?"si":"no"],["nota","note"]
];
function exportRows(from,to){
  return flattenDiet().filter(d=>(!from||d.date>=from)&&(!to||d.date<=to))
    .map(d=>EXPORT_COLS.map(([,g])=>{const v=(typeof g==="function")?g(d):d[g];
      return (v==null||v==="")?(typeof g==="function"?v||"":0):v;}));}
function exportCSV(from,to){
  const head=EXPORT_COLS.map(c=>c[0]).join(";");
  const body=exportRows(from,to).map(r=>r.map(v=>{
    const t=String(v).replace(/"/g,"'");return /[;\n]/.test(t)?'"'+t+'"':t;}).join(";"));
  return [head].concat(body).join("\n");}
function exportRange(){
  const f=document.getElementById("expFrom"),t=document.getElementById("expTo");
  return {from:(f&&f.value)||"",to:(t&&t.value)||""};}
window.doExportCSV=()=>{const{from,to}=exportRange();
  const rows=exportRows(from,to);if(!rows.length)return alert("Nessun giorno tracciato nel periodo scelto.");
  dlFile("nutry_"+(from||"inizio")+"_"+(to||"oggi")+".csv","text/csv;charset=utf-8","\uFEFF"+exportCSV(from,to));};
window.doExportJSON=()=>{const{from,to}=exportRange();
  const rows=exportRows(from,to);if(!rows.length)return alert("Nessun giorno tracciato nel periodo scelto.");
  const keys=EXPORT_COLS.map(c=>c[0]);
  const obj={profilo:{eta:age(),sesso:S.profile.gender,altezza:S.profile.h,peso:S.profile.w,
      attivita:S.profile.act,passi_base:S.profile.baseSteps||3000,tdee:tdee(),obiettivo:S.profile.goal||""},
    regole:rulesSnapshot(),dieta:S.diet||{},
    periodo:{da:from||rows[0][0],a:to||rows[rows.length-1][0]},
    giorni:rows.map(r=>{const o={};keys.forEach((k,i)=>o[k]=r[i]);return o;})};
  dlFile("nutry_"+(from||"inizio")+"_"+(to||"oggi")+".json","application/json",JSON.stringify(obj,null,1));};
window.doExportCopy=async()=>{const{from,to}=exportRange();
  const rows=exportRows(from,to);if(!rows.length)return alert("Nessun giorno tracciato nel periodo scelto.");
  const txt="Dati Nutry dal "+(from||rows[0][0])+" al "+(to||rows[rows.length-1][0])+
    " (separatore ;)\n"+exportCSV(from,to);

  catch(e){alert("Copia non riuscita: usa il download CSV.");}};
function dlFile(name,type,content){
  const b=new Blob([content],{type}),u=URL.createObjectURL(b);
  const a=document.createElement("a");a.href=u;a.download=name;document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(u);a.remove();},400);}
window.aiPatterns=async()=>{ // analisi dei pattern sul tabellone
  if(!aiOn())return aiFail(new Error("nokey"));

window.genPlanAI=async()=>{

  const goal=p.goal||"dimagrimento graduale";
  const deficit=(/mantenimento/i.test(goal))?0:(/massa|aument/i.test(goal)?-300:400);
  const target=Math.max(1200,t-deficit);
  const protG=Math.round(p.w*((S.profile.protKg!=null?+S.profile.protKg:1.6)));
  const slots=(D.slots||"Colazione, Metà mattina, Pranzo, Metà pomeriggio, Cena").split(",").map(x=>x.trim()).filter(Boolean);
  if(!confirm("Genero un piano settimanale completo da:\n\n• "+age()+" anni, "+p.w+" kg, obiettivo: "+goal+
    "\n• fabbisogno "+t+" kcal → target ~"+target+" kcal al giorno\n• impostazione: "+(D.tipo||"mediterranea")+
    "\n• pasti: "+slots.join(", ")+
    "\n\n⚠️ È una proposta generata automaticamente, non una prescrizione: falla validare da un medico o da un nutrizionista prima di seguirla a lungo. Sostituirà il piano attuale (le settimane già salvate restano intatte)."))return;
  const box=document.getElementById("rulesOut");
  if(box){box.style.display="block";box.textContent="✨ Sto costruendo 7 giorni…";}
  try{
    const t2=await aiAsk('Costruisci un piano alimentare settimanale italiano, sano ed equilibrato. Persona: '+age()+' anni, '+(p.gender==="m"?"uomo":"donna")+', '+p.h+' cm, '+p.w+' kg, obiettivo: '+goal+'. Target giornaliero: circa '+target+' kcal e almeno '+protG+' g di proteine, distribuiti sui pasti. '+rulesForAI()+
      ' Pasti da prevedere ogni giorno, in questo ordine: '+slots.join(", ")+'. Regole: porzioni in grammi sempre indicate; valori nutrizionali REALI degli alimenti nelle quantità scritte; varietà tra i giorni (non ripetere lo stesso piatto più di due volte); ingredienti reperibili in un supermercato italiano; rispetta il tempo di cucina dichiarato; se sono previsti pasti fuori casa o mensa, mettili nei giorni indicati come pasto "mensa" o "libero". Rispondi SOLO con un JSON array di 7 oggetti, uno per giorno da Lunedì a Domenica, in questo formato esatto: [{"day":"Lunedì","ctx":"contesto breve del giorno","meals":[{"n":"Colazione","t":"08:00","type":"norm","d":"descrizione con grammature","k":numero,"p":numero,"c":numero,"f":numero,"fib":numero,"z":numero}]}] dove type vale "norm", "mensa" oppure "libero".');
    const arr=parseAIJSON(t2);
    if(!Array.isArray(arr)||arr.length!==7)throw new Error("formato non valido");
    const plan=arr.map(d=>({day:d.day,ctx:d.ctx||"",meals:(d.meals||[]).map(m=>({
      n:m.n,t:m.t||"",type:m.type||"norm",
      o:[{d:m.d,k:Math.round(m.k)||0,p:Math.round(m.p)||0,c:Math.round(m.c)||0,f:Math.round(m.f)||0,
        fib:Math.round(m.fib)||estFiberOf(m.d),z:Math.round(m.z)||estSugarOf(m.d)}]}))}));
    const tot=plan.map(d=>d.meals.reduce((a,m)=>a+m.o[0].k,0));
    if(!confirm("Piano pronto. Calorie per giorno:\n\n"+plan.map((d,i)=>d.day+": ~"+tot[i]+" kcal").join("\n")+
      "\n\nMedia: ~"+Math.round(tot.reduce((a,b)=>a+b,0)/7)+" kcal (target "+target+")\n\nOK = attiva questo piano"))return;
    S.customPlan=plan;PLAN=plan;S.permMeals={};S.week=freshWeek();

    if(box)box.textContent="";
  }catch(e){if(box)box.textContent="";aiFail(e);}};

/* Quante colonne mostrare: le calcoliamo in base alla LARGHEZZA del grafico,

function bucketsToShow(){
  const el=document.getElementById("chAnCal");
  let w=el&&el.clientWidth?el.clientWidth:0;
  if(!w){const pg=document.querySelector(".page.active");w=(pg&&pg.clientWidth)||document.body.clientWidth||340;}
  const perCol=26; // px per colonna leggibile
  return Math.max(6,Math.min(24,Math.round(w/perCol)));}
function periodBounds(mode,n){
  if(!n)n=bucketsToShow();
  const today=new Date();today.setHours(12,0,0,0);
  const back=d=>{const x=new Date(today);x.setDate(x.getDate()-d);return x;};
  if(mode==="giorno")return{from:back(n-1),to:today,bucket:"day"};
  if(mode==="settimana")return{from:back((n-1)*7),to:today,bucket:"week"};
  if(mode==="mese"){const f=new Date(today.getFullYear(),today.getMonth()-(n-1),1);f.setHours(12,0,0,0);return{from:f,to:today,bucket:"month"};}
  if(mode==="anno"){const f=new Date(today.getFullYear()-(n-1),0,1);f.setHours(12,0,0,0);return{from:f,to:today,bucket:"year"};}
  const f=document.getElementById("anFrom"),t=document.getElementById("anTo");
  const fromD=f&&f.value?new Date(f.value+"T12:00:00"):back(30);
  const toD=t&&t.value?new Date(t.value+"T12:00:00"):today;
  const days=(toD-fromD)/864e5;

function bucketKey(d,bucket){
  if(bucket==="day")return d.date;
  if(bucket==="year")return d.date.slice(0,4);
  if(bucket==="month")return d.date.slice(0,7);
  const dt=new Date(d.date+"T12:00:00");const day=(dt.getDay()+6)%7;dt.setDate(dt.getDate()-day);
  return iso(dt);}
function bucketLabel(key,bucket){
  if(bucket==="year")return key;
  if(bucket==="month"){const p=key.split("-");return new Date(+p[0],+p[1]-1,1).toLocaleDateString("it-IT",{month:"short",year:"2-digit"});}
  const dt=new Date(key+"T12:00:00");
  return dt.toLocaleDateString("it-IT",{day:"numeric",month:"short"});}
function aggregateDiet(mode){
  const {from,to,bucket}=periodBounds(mode);
  const all=flattenDiet().filter(d=>{const dt=new Date(d.date+"T12:00:00");return dt>=from&&dt<=to;});
  const buckets={};
  all.forEach(d=>{const k=bucketKey(d,bucket);(buckets[k]=buckets[k]||[]).push(d);});
  const keys=Object.keys(buckets).sort();
  const rows=keys.map(k=>{const arr=buckets[k];const n=arr.length;
    const avg=fld=>Math.round(arr.reduce((a,x)=>a+(x[fld]||0),0)/n);
    return{key:k,label:bucketLabel(k,bucket),n,eat:avg("eat"),prot:avg("prot"),c:avg("c"),f:avg("f"),fib:avg("fib"),def:avg("def"),burn:avg("burn")};});
  return {rows,all,from,to,bucket};}
function aggregateWeight(mode){
  const {from,to,bucket}=periodBounds(mode);
  const ws=S.profile.weights.filter(x=>{const dt=new Date(x.d);return dt>=from&&dt<=to;});
  if(bucket==="day")return ws.map(x=>({label:new Date(x.d).toLocaleDateString("it-IT",{day:"numeric",month:"short"}),w:x.w,fat:x.fat}));
  const buckets={};
  ws.forEach(x=>{const dstr=iso(new Date(x.d));let k;
    if(bucket==="year")k=dstr.slice(0,4);else if(bucket==="month")k=dstr.slice(0,7);
    else{const dt=new Date(dstr+"T12:00:00");const day=(dt.getDay()+6)%7;dt.setDate(dt.getDate()-day);k=iso(dt);}
    (buckets[k]=buckets[k]||[]).push(x);});
  const keys=Object.keys(buckets).sort();
  return keys.map(k=>{const arr=buckets[k];const n=arr.length;
    const avgw=arr.reduce((a,x)=>a+x.w,0)/n;
    const fats=arr.filter(x=>x.fat!=null);const avgf=fats.length?fats.reduce((a,x)=>a+x.fat,0)/fats.length:null;
    return{label:bucketLabel(k,bucket),w:Math.round(avgw*10)/10,fat:avgf!=null?Math.round(avgf*10)/10:null};});}

let GOALCH=null;
function goalEmptyChart(cv,msg){

function drawGoalProjection(){

  if(!p.goalW||!p.w){if(txt)txt.textContent="Imposta peso attuale e obiettivo peso in Io per popolare la proiezione.";goalEmptyChart(cv);return;}
  const W=(p.weights||[]).filter(x=>x.w).slice().sort((a,b)=>new Date(a.d)-new Date(b.d));
  const anchorW=W.length?W[0].w:p.w,anchorDate=W.length?new Date(W[0].d):new Date();
  const sim=simulateWeightDescent(anchorW,anchorDate);   // curva ideale dal primo dato reale

  const projByKey={};if(sim)sim.points.forEach(pt=>{projByKey[iso(pt.d)]=pt.w;});

  if(!keys.length){if(txt)txt.textContent="Aggiungi almeno una pesata per popolare la proiezione.";goalEmptyChart(cv);return;}
  const labels=keys.map(k=>new Date(k+"T12:00:00").toLocaleDateString("it-IT",{day:"numeric",month:"short",year:"2-digit"}));
  const realData=keys.map(k=>realByKey[k]!=null?realByKey[k]:null);
  const projData=keys.map(k=>projByKey[k]!=null?projByKey[k]:null);
  const goalData=keys.map(()=>p.goalW);
  // Media mobile a 7 giorni del peso reale (smussa le oscillazioni di acqua/glicogeno)
  const mavgByKey={};W.forEach(x=>{const dt=new Date(x.d).getTime();
    const win=W.filter(y=>{const t=new Date(y.d).getTime();return t<=dt&&t>=dt-7*864e5;});
    mavgByKey[iso(new Date(x.d))]=Math.round(win.reduce((a,y)=>a+y.w,0)/win.length*10)/10;});

    data:{labels,datasets:[
      {label:"Proiezione ideale",data:projData,borderColor:"#2F5FA6",borderDash:[6,4],pointRadius:0,tension:.25,spanGaps:true},
      {label:"Peso reale",data:realData,borderColor:"#9CC3A6",backgroundColor:"#9CC3A6",pointRadius:2,tension:.2,spanGaps:true},
      {label:"Media 7 gg",data:mavgData,borderColor:"#2F7D3B",borderWidth:2,pointRadius:0,tension:.3,spanGaps:true},
      {label:"Obiettivo",data:goalData,borderColor:"#C77A15",borderDash:[3,3],pointRadius:0}
    ]},
    options:{plugins:{legend:{labels:{boxWidth:11,font:{size:10}}}},
      scales:{x:{ticks:{font:{size:9},maxTicksLimit:8}},y:{ticks:{font:{size:9}}}}}});
  if(txt){const parts=[];
    if(simNow){if(simNow.stalled)parts.push("Con dieta e obiettivi attuali il deficit si annulla prima di "+p.goalW+" kg: servirebbe mangiare meno o muoversi di più.");
      else parts.push("Stima: <b>"+p.goalW+" kg</b> intorno al <b>"+simNow.etaDate.toLocaleDateString("it-IT",{day:"numeric",month:"long",year:"numeric"})+"</b> (~"+simNow.etaDays+" giorni), ritmo non lineare.");}

    if(worsening)parts.push("Il divario peggiora da qualche pesata: conviene chiedere all'AI un'analisi qui sotto per capire cosa aggiustare.");

function computeCorrelations(){

  const mean=arr=>arr.length?Math.round(arr.reduce((a,x)=>a+x,0)/arr.length):null;
  const goodSleep=days.filter(d=>d.sleep>=4),badSleep=days.filter(d=>d.sleep&&d.sleep<=2);

  const goodMood=days.filter(d=>d.feel>=4),badMood=days.filter(d=>d.feel&&d.feel<=2);

    sonno:{n_alto:goodSleep.length,n_basso:badSleep.length,alto_def:mean(goodSleep.map(d=>d.def)),basso_def:mean(badSleep.map(d=>d.def)),alto_sgarri:mean(goodSleep.map(d=>d.sgarri)),basso_sgarri:mean(badSleep.map(d=>d.sgarri))},
    allenamento:{n_con:wDays.length,n_senza:rDays.length,con_def:mean(wDays.map(d=>d.def)),senza_def:mean(rDays.map(d=>d.def)),con_sgarri:mean(wDays.map(d=>d.sgarri)),senza_sgarri:mean(rDays.map(d=>d.sgarri))},
    umore:{n_alto:goodMood.length,n_basso:badMood.length,alto_def:mean(goodMood.map(d=>d.def)),basso_def:mean(badMood.map(d=>d.def)),alto_sgarri:mean(goodMood.map(d=>d.sgarri)),basso_sgarri:mean(badMood.map(d=>d.sgarri))}};}

/* ── 💬 Chiedi all'AI: contesto con dieta PIANIFICATA vs dati REALI ── */
/* Riepilogo della dieta pianificata (cosa mangeresti seguendo il piano): media
   sui 7 giorni del piano. Serve per le proiezioni quando i pasti reali non sono
   ancora stati registrati (altrimenti i giorni "vuoti" darebbero deficit ~ TDEE). */
function plannedDietSummary(){
  let pk=0,pp=0,pc=0,pf=0;for(let di=0;di<7;di++){const o=plannedTemplateOfDay(di);pk+=o.k;pp+=o.p;pc+=(o.c||0);pf+=(o.f||0);}
  return {kcal_giorno:Math.round(pk/7),proteine_g:Math.round(pp/7),carboidrati_g:Math.round(pc/7),grassi_g:Math.round(pf/7)};}
/* Sport + passi: MEDIA GIORNALIERA vera sul periodo tracciato (i giorni di
   riposo contano come 0), NON il valore grezzo di un singolo giorno — che
   gonfierebbe il deficit. Riporta anche quanti giorni compongono la media, così
   l'AI sa se il campione è affidabile (con 1-2 giorni lo sport è occasionale). */
function activityDailyAvg(recent){
  const nDays=recent.length;
  const totBurn=recent.reduce((a,x)=>a+(x.burn||0),0);
  const activeDays=recent.filter(x=>(x.burn||0)>0).length;
  return {giorni_considerati:nDays,giorni_con_attivita:activeDays,
    media_giornaliera_kcal:nDays?Math.round(totBurn/nDays):0,campione_sufficiente:nDays>=7};}
function buildDiaryContext(){
  const all=flattenDiet();
  const recentAll=all.slice(-30);
  const hardCount=recentAll.filter(d=>d.hard).length;
  const recent=recentAll.filter(d=>!d.hard); // le giornate difficili non sporcano le medie
  const avgOf=(arr,f)=>arr.length?Math.round(arr.reduce((a,x)=>a+(x[f]||0),0)/arr.length):0;
  // REALE: solo i giorni in cui i pasti sono stati davvero registrati (eat>0).
  // I giorni senza pasti segnati mostrerebbero deficit ~ TDEE e falserebbero tutto.
  const withMeals=recent.filter(d=>(d.eat||0)>0);
  const TDEE=tdee();
  const plan=plannedDietSummary();
  // Deficit da DIETA (parte affidabile): TDEE − intake pianificato (senza sport).
  const deficitDieta=TDEE-plan.kcal_giorno;
  // Sport/passi come MEDIA GIORNALIERA (non il dato puro di oggi).
  const act=activityDailyAvg(recent);
  const sportAvg=act.media_giornaliera_kcal;
  // Nel deficit teorico lo sport si aggiunge SOLO se il campione è sufficiente,
  // altrimenti col dato di 1-2 giorni sballerebbe la stima.
  const deficitTeorico=deficitDieta+(act.campione_sufficiente?sportAvg:0);
  const realDeficit=withMeals.length?avgOf(withMeals,"def"):null;
  const workoutsCount={};recent.forEach(d=>(d.workouts||[]).forEach(w=>{const s=String(w).split(" ")[0];if(s)workoutsCount[s]=(workoutsCount[s]||0)+1;}));
  // Ritmo peso osservato (kg/settimana) dallo storico pesate, se abbastanza dati
  let rateKgWeek=null;const W=(S.profile.weights||[]).filter(x=>x.w).slice(-10);
  if(W.length>=2){const days=(new Date(W[W.length-1].d)-new Date(W[0].d))/864e5;if(days>=5)rateKgWeek=Math.round((W[W.length-1].w-W[0].w)/days*7*100)/100;}
  const kgToGoal=(S.profile.goalW&&S.profile.w)?Math.round((S.profile.w-S.profile.goalW)*10)/10:null;
  return {
    obiettivo_peso_kg:S.profile.goalW||null,
    peso_attuale_kg:S.profile.w||null,
    kg_da_perdere:kgToGoal,
    tdee_kcal:TDEE,
    dieta_pianificata:{kcal_giorno:plan.kcal_giorno,proteine_g:plan.proteine_g,carboidrati_g:plan.carboidrati_g,grassi_g:plan.grassi_g,
      deficit_dieta_giorno:deficitDieta,
      sport_passi_media_giornaliera_kcal:sportAvg,
      giorni_considerati_per_sport:act.giorni_considerati,giorni_con_attivita:act.giorni_con_attivita,campione_sport_sufficiente:act.campione_sufficiente,
      deficit_teorico_giorno:deficitTeorico,
      spiegazione:"Deficit da dieta = TDEE("+TDEE+") − intake("+plan.kcal_giorno+") = "+deficitDieta+" kcal/giorno. Sport+passi vanno aggiunti come MEDIA GIORNALIERA ("+sportAvg+" kcal su "+act.giorni_considerati+" giorni, riposo incluso), non col valore di un singolo giorno; con pochi giorni consideralo occasionale. Deficit teorico = "+deficitTeorico+" kcal/giorno."},
    dati_reali:{giorni_con_pasti_registrati:withMeals.length,
      kcal_medie:withMeals.length?avgOf(withMeals,"eat"):null,
      proteine_medie_g:withMeals.length?avgOf(withMeals,"prot"):null,
      carboidrati_medi_g:withMeals.length?avgOf(withMeals,"c"):null,
      grassi_medi_g:withMeals.length?avgOf(withMeals,"f"):null,
      deficit_medio_reale_kcal:realDeficit,
      ritmo_peso_kg_settimana:rateKgWeek,
      giornate_difficili_escluse:hardCount},
    sonno_medio:avgOf(recent,"sleep")||null,relax_medio:avgOf(recent,"relax")||null,umore_medio:avgOf(recent,"feel")||null,
    allenamenti_per_tipo:workoutsCount,
    obiettivi:{passi_giorno_nota:"passi base ("+(((+S.profile.baseSteps>0)?+S.profile.baseSteps:3000))+"/giorno) già inclusi nel TDEE, nessun obiettivo passi separato",
      allenamenti_settimana:(S.profile.goalWorkoutList||[]).map(g=>({sport:g.sport,volte_settimana:g.perWeek,minuti:g.min})),
      dispendio_extra_medio_giornaliero_kcal:plannedActivityBurnFor(S.profile.w||70)},
    proiezione:(()=>{const s=simulateWeightDescent(S.profile.w,new Date());if(!s)return null;
      const Wt=(S.profile.weights||[]).filter(x=>x.w).slice().sort((a,b)=>new Date(a.d)-new Date(b.d));
      let delta=null,ideale=null;if(Wt.length){const last=Wt[Wt.length-1];ideale=projectedWeightAt(last.d);if(ideale!=null)delta=Math.round((last.w-ideale)*10)/10;}
      return {data_stimata:s.stalled?null:iso(s.etaDate),giorni_stimati:s.stalled?null:s.etaDays,deficit_iniziale_giorno:s.dailyDeficitStart,stallo:s.stalled,
        peso_reale_ultimo:Wt.length?Wt[Wt.length-1].w:null,peso_ideale_stessa_data:ideale,delta_kg_vs_ideale:delta,
        nota_delta:"delta>0 = sei indietro rispetto al piano; delta<0 = sei in anticipo"};})(),
    resoconti_settimanali:S.history.slice(-4).map(w=>({periodo:new Date(w.from).toLocaleDateString("it-IT")+"→"+new Date(w.to).toLocaleDateString("it-IT"),kcal_medie:w.avgEat,deficit_medio:w.avgDef,peso:w.weight}))
  };}

      "ANALISI COSA FUNZIONA: se l'utente chiede come sta andando o cosa migliorare, confronta proiezione.delta_kg_vs_ideale (reale vs curva ideale: >0 sei indietro, <0 sei in anticipo) con gli allenamenti_per_tipo e le kcal reali per capire dove agire (dieta poco rispettata, poco movimento, deficit troppo blando…), proponendo senza imporre.");

      if(box)box.textContent="⚠️ Posso rispondere solo a domande sui tuoi dati: alimentazione, peso, allenamenti, obiettivi e progressi.";

      }else if(fats.length<2){

          recomp=true;

        }
      }
      if(!recomp){
      let sugg="Da 3 settimane il deficit teorico c'è ma il peso non scende: probabilmente il TDEE reale è più basso o il NEAT è calato.";

        sugg=t;}catch(e){}}

        S.profile.act=Math.max(1.15,Math.round((S.profile.act-0.05)*100)/100);}
      }
    }}
  S.week=freshWeek();save();if(!silent){render(cur);
  alert("Settimana salvata"+(wk.ai?" con report AI":"")+". Buona settimana nuova!");}}

function renderGuida(){document.getElementById("pg-guida").innerHTML=`
<div class="card"><h2>❓ Guida rapida</h2>
<div class="hint">Come funziona, in 20 secondi: ogni giorno <b>spunti quello che mangi</b> (✓ o ✗, extra compresi) e registri gli allenamenti; l'anello di Oggi ti mostra il <b>deficit</b> in tempo reale; a fine settimana l'app <b>archivia da sola</b> e riparte (tutto resta modificabile nello Storico). Tutto qui — il resto sono aiuti.</div></div>

<div class="card"><h2>🧠 Come funziona il sistema</h2>
<div class="hint">Se leggi una cosa sola, leggi questa: spiega il modello su cui è costruita tutta l'app.</div>

<div class="gsec">1 · Due numeri, non uno</div>
<p style="font-size:14.5px;line-height:1.55">Ogni giorno Nutry tiene separati <b>quello che era previsto</b> e <b>quello che hai davvero mangiato</b>.
Il <b>Piano</b> è un modello fisso: la somma dei pasti previsti per quel giorno. Non cambia mai da solo — se ribilanci, fotografi un piatto o correggi con ✏️, cambia la <b>giornata</b> in Oggi, non il piano.
Il <b>mangiato</b> è la somma dei pasti spuntati ✓ più gli extra non barrati. I pasti con la ✗ e gli extra con la ✗ non contano.
Dalla distanza fra questi due numeri nasce tutto il resto: recap, ribilanciamenti, recuperi, analisi dei pattern.</p>

<div class="gsec">2 · Il fabbisogno</div>
<p style="font-size:14.5px;line-height:1.55">Il <b>metabolismo basale</b> si calcola su peso, altezza, età e sesso; si moltiplica per l'<b>attività di base</b> (lavoro e vita quotidiana) e si corregge sui <b>passi base</b>, quelli che fai comunque ogni giorno (riferimento 3.000). Il risultato è il <b>fabbisogno</b>.
Gli allenamenti non sono dentro: si sommano a parte, con la formula <b>(MET dello sport × intensità − 1) × peso × ore</b>. Quel −1 toglie il metabolismo a riposo, che nel fabbisogno c'è già: senza, ogni allenamento risulterebbe più generoso del reale.
<b>Il deficit</b> = fabbisogno + sport − mangiato. Se cali di peso il basale scende, quindi aggiornando la pesata cala anche il fabbisogno: il dimagrimento rallenta da solo, ed è normale.</p>

<div class="gsec">3 · Ribilanciare la giornata</div>
<p style="font-size:14.5px;line-height:1.55">⚖️ <b>Ribilancia Oggi</b> ragiona a <b>budget</b>: pianificato del giorno meno quello già mangiato. Se i pasti che restano stanno dentro il budget non tocca nulla e te lo dice.
Se invece eccedono, riscrive i pasti <b>ancora da consumare</b>: prima abbassa le grammature, poi — solo se il piatto diventa poco saziante — sostituisce un ingrediente con uno più leggero. Le proteine non si riducono mai, nessun pasto scende sotto il minimo impostato, e le proposte che abbassano solo i numeri lasciando il piatto identico vengono scartate prima di arrivarti sotto gli occhi.</p>

<div class="gsec">4 · Recuperare i giorni passati</div>
<p style="font-size:14.5px;line-height:1.55">Il menu <b>Recupero</b> (riga Evento, solo su oggi) mostra le calorie ancora da recuperare degli ultimi 5 giorni. Tre regole di sicurezza:
sotto la <b>soglia di tolleranza</b> lo sforo non viene nemmeno proposto (è dentro l'errore di stima delle porzioni);
in un giorno si taglia al massimo il <b>tetto</b> impostato, in percentuale o in kcal;
nessun pasto scende sotto il <b>minimo</b>. Se lo sforo è grande il resto resta in coda per i giorni dopo. Una festa non si paga con un giorno di digiuno.</p>

<div class="gsec">5 · La settimana</div>
<p style="font-size:14.5px;line-height:1.55">La settimana va da lunedì a domenica. Alla fine viene <b>archiviata da sola</b> con quello che c'è: nessun bottone da premere, e resta sempre modificabile da Storico → Settimane passate → ✏️.
Le medie si calcolano sui giorni tracciati. I giorni con un <b>evento</b> (Natale, trasferta, giornata no) restano registrati ma escono dalle medie e non spezzano la serie 🔥.</p>

<div class="gsec">6 · Cosa sa l'AI di te</div>
<p style="font-size:14.5px;line-height:1.55">Ogni richiesta all'AI porta con sé le <b>regole numeriche</b> attive e le tue <b>caratteristiche alimentari</b>: tipo di dieta, intolleranze, cibi da evitare, preferenze, tempo per cucinare, pasti liberi, condizioni da tenere presenti.
Le trovi tutte nella sezione <b>📐 Regole</b>, dove sono modificabili — e con "Vedi cosa legge l'AI" puoi leggere il testo esatto che viene allegato. L'AI propone sempre: la spunta e la conferma restano tue.</p>

<div class="gsec">7 · I tuoi dati</div>
<p style="font-size:14.5px;line-height:1.55">Tutto vive sul telefono, senza account. Il backup su Drive è facoltativo e va sul tuo account.
Da <b>Storico → Esporta i dati</b> scarichi qualsiasi periodo come tabella: una riga per giorno con pianificato, mangiato, macro completi, sport, sonno, relax, umore, acqua, evento, periodo di dieta, ribilanciamenti e recuperi. In CSV per il foglio di calcolo, in JSON per un'analisi esterna, oppure lasci che sia Nutry a cercarci i <b>pattern</b>.</p>
</div>

<div class="card"><h2>Le pagine</h2><table class="gtable">
<tr><td>☀️</td><td><b>Oggi</b> — bilancio del giorno (anello con il <b>deficit</b> in grande e <b>Pianificato</b> = le kcal previste dal piano per quel giorno), acqua, sonno/relax/umore, pasti ed extra da spuntare. Le frecce ‹ › in alto cambiano giorno.</td></tr>

/* Composizione in kg derivata da peso + percentuali. Il "resto" della massa
   magra non è "liquidi": è acqua extra-muscolare, ossa e organi. */
function compLine(p){const fat=parseFloat(p.fatp),mus=parseFloat(p.musp);
  if(!(fat>0))return "";
  const gK=(p.w*fat/100),lbmK=p.w-gK;
  let s="La tua composizione: <b>magra "+lbmK.toFixed(1)+" kg</b> · <b>grasso "+gK.toFixed(1)+" kg</b>";
  if(mus>0){const mK=p.w*mus/100,rest=lbmK-mK;
    s+=" — della magra: muscolo "+mK.toFixed(1)+" kg, il resto ("+rest.toFixed(1)+" kg) è acqua extra-muscolare, ossa e organi";}
  return `<div class="hint" style="margin:2px 0 6px">${s}. I calcoli (Katch-McArdle) usano la magra derivata dalla % di grasso.</div>`;}
/* Proiezione verso l'obiettivo: regressione lineare sulle ultime pesate */
function goalProj(){const p=S.profile,ws=p.weights.slice(-8);
  if(!p.goalW||ws.length<2)return "";
  const t0=new Date(ws[0].d).getTime(),days=(new Date(ws[ws.length-1].d).getTime()-t0)/864e5;
  if(days<5)return "";
  const xs=ws.map(x=>(new Date(x.d).getTime()-t0)/864e5),ys=ws.map(x=>x.w);
  const n=xs.length,mx=xs.reduce((a,b)=>a+b)/n,my=ys.reduce((a,b)=>a+b)/n;
  let num=0,den=0;xs.forEach((x,i)=>{num+=(x-mx)*(ys[i]-my);den+=(x-mx)**2;});
  const slope=den?num/den:0; // kg/giorno
  if(slope>=-0.005)return "Il peso al momento non sta scendendo: la proiezione verso l'obiettivo apparirà quando ci sarà un trend in discesa.";
  if(ys[ys.length-1]<=p.goalW)return "🎉 Obiettivo raggiunto!";
  const dLeft=(ys[ys.length-1]-p.goalW)/(-slope);
  const eta=new Date(Date.now()+dLeft*864e5);
  return "Al ritmo attuale (~"+(slope*7).toFixed(1).replace("-","−")+" kg/settimana) dovresti raggiungere <b>"+p.goalW+" kg</b> intorno al <b>"+eta.toLocaleDateString("it-IT",{day:"numeric",month:"long",year:"numeric"})+"</b>. Stima indicativa: il ritmo rallenta man mano che scendi.";}

/* BMI dell'obiettivo e classificazione (salubrità) */
function bmiFor(w){const h=S.profile.h;if(!h||!w)return null;return Math.round(w/Math.pow(h/100,2)*10)/10;}
function bmiClass(b){if(b==null)return{ok:true,label:"—",msg:""};
  if(b<16)return{ok:false,label:"gravemente sottopeso",msg:"È un peso a rischio per la salute: sconsigliato."};
  if(b<18.5)return{ok:false,label:"sottopeso",msg:"Sotto la soglia sana: valuta un obiettivo un po' più alto."};
  if(b<25)return{ok:true,label:"normopeso",msg:"Rientra nella fascia sana."};
  if(b<30)return{ok:true,label:"sovrappeso",msg:"Ancora sopra la fascia normopeso: obiettivo sensato."};
  if(b<35)return{ok:true,label:"obesità I",msg:""};
  if(b<40)return{ok:true,label:"obesità II",msg:""};
  return{ok:true,label:"obesità III",msg:""};}

/* ═══════════════════════════════════════════════════════════════
   16. GOOGLE DRIVE SYNC (GSI + Drive REST, scope drive.appdata)
       Funziona solo da origine http/https registrata nel progetto.
   ═══════════════════════════════════════════════════════════════ */
let DTOKEN=null,tokenClient=null,driveReauthed=false;
/* Cache del token d'accesso Drive: dopo il primo consenso, entro la sua durata
   (~1h) l'app riusa il token salvato senza chiedere di nuovo l'accesso, anche
   dopo un riavvio. Alla scadenza si rinnova in silenzio. */
const DTOK_KEY="diario_dtoken";
// Questo dispositivo ha già completato una sincronizzazione con Drive? Serve a
// distinguere il PRIMO collegamento di un nuovo dispositivo (dove non bisogna
// mai spingere un profilo vuoto sopra un backup con dati veri di un altro
// dispositivo) dalle sincronizzazioni successive (dove basta confrontare i
// timestamp di contenuto).
const SYNCED_ONCE_KEY="diario_synced_once";
function hasRealLocalContent(){
  return !!(S.profile&&S.profile.dob) || (S.history&&S.history.length>0) || (S.profile&&S.profile.weights&&S.profile.weights.length>0);
}
function driveSaveToken(t){try{if(t&&t.access_token){DTOKEN=t.access_token;
  const exp=Date.now()+(((+t.expires_in||3600)-90)*1000);
  localStorage.setItem(DTOK_KEY,JSON.stringify({tok:t.access_token,exp}));}}catch(e){}}
function driveCachedToken(){try{const c=JSON.parse(localStorage.getItem(DTOK_KEY)||"null");
  if(c&&c.tok&&c.exp&&Date.now()<c.exp)return c.tok;}catch(e){}return null;}
function driveClearToken(){DTOKEN=null;try{localStorage.removeItem(DTOK_KEY);}catch(e){}}
/* Riacquisizione silenziosa del token (nessun popup se la sessione Google è
   attiva e il consenso è già stato dato in passato su questo dispositivo). */
function driveSilentAuth(){
  loadGSI(()=>{try{
    tokenClient=google.accounts.oauth2.initTokenClient({client_id:S.drive.cid,
      scope:"https://www.googleapis.com/auth/drive.appdata",
      callback:async t=>{if(t&&t.access_token){driveSaveToken(t);await driveSyncOnStart();
        const st=document.getElementById("driveStatus");if(st)st.textContent="✅ Sincronizzato con Drive.";}},
      error_callback:()=>{}});
    tokenClient.requestAccessToken({prompt:""});
  }catch(e){}});}
function loadGSI(cb){if(window.google&&google.accounts)return cb();
  const s=document.createElement("script");s.src="https://accounts.google.com/gsi/client";
  s.onload=cb;s.onerror=()=>alert("Impossibile caricare Google Identity (offline?).");document.head.appendChild(s);}
window.driveConnect=()=>{

  if(!S.drive.cid)return alert("Inserisci il CLIENT_ID.");
  if(location.protocol==="file:")return alert("L'OAuth Google non funziona da file:// — pubblica l'app su https (es. GitHub Pages) e registra l'origine nel progetto Google Cloud.");
  loadGSI(()=>{
    tokenClient=google.accounts.oauth2.initTokenClient({client_id:S.drive.cid,
      scope:"https://www.googleapis.com/auth/drive.appdata",
      callback:async t=>{driveSaveToken(t);S.drive.on=true;save();
        document.getElementById("driveStatus").textContent="✅ Connesso. Sincronizzo…";
        await driveSyncOnStart();render("io");}});
    tokenClient.requestAccessToken();});};

window.driveUpload=async()=>{
  if(!DTOKEN)return alert("Connettiti prima a Drive.");

    const meta={name:"diario_backup.json",parents:f?undefined:["appDataFolder"]};
    const boundary="-------diario";const body=
      "--"+boundary+"\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n"+JSON.stringify(meta)+
      "\r\n--"+boundary+"\r\nContent-Type: application/json\r\n\r\n"+JSON.stringify(S)+"\r\n--"+boundary+"--";
    const url="https://www.googleapis.com/upload/drive/v3/files"+(f?"/"+f.id:"")+"?uploadType=multipart";

    const st=document.getElementById("driveStatus");if(st)st.textContent="✅ Salvato su Drive alle "+new Date().toLocaleTimeString("it-IT");

/* Avvio: riconnessione silenziosa se già autorizzato su questo dispositivo.

function tryDriveAuto(){

window.driveDelete=async(silent)=>{
  if(!DTOKEN){if(!silent)alert("Connettiti prima a Drive.");return;}
  if(!silent&&!confirm("Eliminare il backup da Google Drive?\n\nATTENZIONE: sparirà da TUTTI i dispositivi collegati a questo account, non solo da questo. I dati locali di questo dispositivo restano finché non li cancelli a parte."))return;
  try{const f=await driveFind();
    if(f)await fetch("https://www.googleapis.com/drive/v3/files/"+f.id,{method:"DELETE",headers:{Authorization:"Bearer "+DTOKEN}});
    if(!silent){const st=document.getElementById("driveStatus");if(st)st.textContent="🗑️ Backup eliminato da Drive.";alert("Backup eliminato da Drive.");}

async function driveSyncOnStart(){ // confronta i timestamp DI CONTENUTO e allinea in silenzio
  try{const f=await driveFind();if(!f){try{localStorage.setItem(SYNCED_ONCE_KEY,"1");}catch(e2){}return driveUpload();}
    // Scarico il contenuto e confronto remote.meta.updated con S.meta.updated:
    // sono entrambi scritti dallo stesso save(), quindi sullo STESSO dispositivo
    // combaciano (niente più falso avviso "versione più recente" a ogni avvio).
    // Non uso f.modifiedTime (ora del file sul server), che è sempre leggermente
    // successiva al contenuto e faceva scattare l'avviso ogni volta.
    const r=await fetch("https://www.googleapis.com/drive/v3/files/"+f.id+"?alt=media",{headers:{Authorization:"Bearer "+DTOKEN}});
    if(r.status===401){driveClearToken();throw new Error("auth");}
    const remote=await r.json();
    const rT=new Date((remote&&remote.meta&&remote.meta.updated)||0).getTime();
    const lT=new Date((S&&S.meta&&S.meta.updated)||0).getTime();
    const firstSyncOnThisDevice=!localStorage.getItem(SYNCED_ONCE_KEY);

    if(firstSyncOnThisDevice){
      // Primo collegamento di QUESTO dispositivo: un dispositivo appena aperto
      // non ha un timestamp di contenuto significativo (è solo il momento in
      // cui il profilo vuoto è stato creato), quindi non va MAI usato per
      // decidere di sovrascrivere un backup che può contenere i dati veri di
      // un altro dispositivo — è esattamente il bug che impediva la
      // sincronizzazione tra telefono e tablet. Se qui non c'è nulla di
      // reale, adottiamo sempre il backup in silenzio; se invece questo
      // dispositivo ha già dati suoi mai sincronizzati, chiediamo una sola volta.
      if(!hasRealLocalContent()){
        S=remote;localStorage.setItem(KEY,JSON.stringify(S));
        try{localStorage.setItem(SYNCED_ONCE_KEY,"1");}catch(e2){}
        location.reload();return;
      }
      const useRemote=confirm("Questo dispositivo non si è mai sincronizzato con Drive. È già presente un backup del "+
        new Date(remote.meta&&remote.meta.updated||f.modifiedTime).toLocaleString("it-IT")+
        ".\n\nOK = usa i dati di Drive (quelli presenti solo su questo dispositivo andranno persi)\nAnnulla = mantieni i dati di questo dispositivo e sovrascrivi Drive");
      try{localStorage.setItem(SYNCED_ONCE_KEY,"1");}catch(e2){}
      if(useRemote){S=remote;localStorage.setItem(KEY,JSON.stringify(S));location.reload();}
      else{await driveUpload();}
      return;
    }

    if(rT>lT+2000){ // il remoto è davvero più recente (modifica da un altro dispositivo): lo adotto in silenzio
      S=remote;localStorage.setItem(KEY,JSON.stringify(S));location.reload();
    }else if(lT>rT+2000){ // il locale è più recente: aggiorno Drive
      await driveUpload();
    } // altrimenti sono allineati: non faccio nulla
  }catch(e){ if(String(e&&e.message)==="auth"&&!driveReauthed){driveReauthed=true;driveSilentAuth();} }}

/* Banner (non popup) per gli allenamenti di ieri dimenticati */
function yIdx(){const y=new Date();y.setDate(y.getDate()-1);return wd(y);}
function unmarkedOfDay(di){return dayItems(di).filter(it=>{const st=S.week.days[it.pdi].meals[it.mi];return !st.done&&!st.skip;}).length;}
function dayCompleted(di){return dayItems(di).length>0&&unmarkedOfDay(di)===0;}
/* Settimana "scaduta": è iniziata prima del lunedì corrente e va convalidata */
function weekStale(){const m=new Date();m.setHours(12,0,0,0);m.setDate(m.getDate()-wd(m));return S.week.started<iso(m);}

/* v5 — Revisione persistente: i giorni passati con pasti non spuntati (o ieri
   senza sport) restano in un banner FISSO finché non premi "Completa" su
   ciascuno. Sopravvive al cambio di giorno (non è più "solo per oggi"). */
function pendingReviewDays(){ // v5.1: solo IERI, un promemoria semplice
  S.ui.reviewDone=S.ui.reviewDone||{};
  if(wd(new Date())===0)return [];      // lunedì: ieri è nella settimana chiusa
  const di=yIdx(),dISO=isoOfPdi(di);
  if(S.ui.reviewDone[dISO])return [];
  const missMeals=unmarkedOfDay(di)>0;
  const missSport=S.week.days[di].workouts.length===0;
  return (missMeals||missSport)?[{di,dISO,missMeals,missSport}]:[];}
function isoOfPdi(di){ // ISO del giorno di piano `di` nella settimana corrente
  const mon=new Date();mon.setHours(12,0,0,0);mon.setDate(mon.getDate()-wd(mon));

/* ── ZOOM GRAFICI: tap su un grafico → overlay con pinch/rotella/drag ── */
let ZM={s:1,x:0,y:0,drag:null,pinch:0};
function ensureZoomOv(){
  let ov=document.getElementById("zoomOv");
  if(ov)return ov;
  ov=document.createElement("div");ov.id="zoomOv";
  ov.innerHTML=`<div class="zhint">🔍 Rotella / pinch per zoom · trascina per muoverti · doppio tap per resettare</div>
  <img id="zoomImg" alt="grafico ingrandito">
  <div class="ztools">
    <button onclick="zoomBy(1.35)" title="Zoom +">＋</button>
    <button onclick="zoomBy(1/1.35)" title="Zoom −">－</button>
    <button onclick="zoomReset()" title="Reimposta">⤾</button>
    <button onclick="closeZoom()" title="Chiudi">✕</button></div>`;
  document.body.appendChild(ov);
  ov.addEventListener("click",e=>{if(e.target===ov)closeZoom();});
  const img=ov.querySelector("#zoomImg");
  ov.addEventListener("wheel",e=>{e.preventDefault();zoomBy(e.deltaY<0?1.18:1/1.18);},{passive:false});
  img.addEventListener("pointerdown",e=>{e.preventDefault();ZM.drag={x:e.clientX-ZM.x,y:e.clientY-ZM.y};img.setPointerCapture(e.pointerId);img.style.cursor="grabbing";});
  img.addEventListener("pointermove",e=>{if(!ZM.drag)return;ZM.x=e.clientX-ZM.drag.x;ZM.y=e.clientY-ZM.drag.y;applyZoom();});
  img.addEventListener("pointerup",()=>{ZM.drag=null;img.style.cursor="grab";});
  img.addEventListener("dblclick",zoomReset);
  let lastTap=0;
  img.addEventListener("touchend",e=>{const now=Date.now();if(now-lastTap<300)zoomReset();lastTap=now;});
  ov.addEventListener("touchmove",e=>{ // pinch a due dita
    if(e.touches.length===2){e.preventDefault();
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      if(ZM.pinch)zoomBy(d/ZM.pinch,true);
      ZM.pinch=d;}
  },{passive:false});
  ov.addEventListener("touchend",()=>{ZM.pinch=0;});
  document.addEventListener("keydown",e=>{if(e.key==="Escape")closeZoom();});
  return ov;

/* Prompt d'installazione automatico: quando il browser segnala che l'app è
   installabile mostriamo un banner "Installa". */
(function(){
  let deferredPrompt=null;
  const KEY_DISMISS="nutri_install_dismiss";
  function isStandalone(){return (window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches)||window.navigator.standalone===true;}
  function showBanner(){
    if(isStandalone())return;
    if(document.getElementById("install-banner"))return;
    if(!document.body){document.addEventListener("DOMContentLoaded",showBanner);return;}
    const b=document.createElement("div");
    b.id="install-banner";
    b.style.cssText="position:fixed;left:12px;right:12px;bottom:calc(64px + env(safe-area-inset-bottom));z-index:9999;background:linear-gradient(135deg,#0F3D20,#2F7D3B);color:#fff;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 6px 24px rgba(0,0,0,.35);font-family:inherit;";
    b.innerHTML='<span style="font-size:22px">📲</span><div style="flex:1;font-size:13px;line-height:1.35"><b>Installa Nutry</b><br><span style="opacity:.9;font-size:12px">Aggiungila alla schermata Home per aprirla come app.</span></div>'+
      '<button id="install-yes" style="background:#fff;color:#0F3D20;border:0;border-radius:9px;padding:8px 12px;font-weight:700;font-size:12px;cursor:pointer">Installa</button>'+
      '<button id="install-no" aria-label="Chiudi" style="background:transparent;color:#d6e6da;border:0;font-size:18px;cursor:pointer;padding:4px 6px">✕</button>';
    document.body.appendChild(b);
    document.getElementById("install-no").onclick=()=>{try{localStorage.setItem(KEY_DISMISS,String(Date.now()));}catch(e){}b.remove();};
    document.getElementById("install-yes").onclick=async()=>{
      if(deferredPrompt){b.remove();deferredPrompt.prompt();try{await deferredPrompt.userChoice;}catch(e){}deferredPrompt=null;}
      else{alert('Per installare: apri il menu del browser (⋮) e scegli "Installa app" oppure "Aggiungi a schermata Home".');}
    };
  }
  window.addEventListener("beforeinstallprompt",function(e){
    e.preventDefault();deferredPrompt=e;
    let dis=0;try{dis=+localStorage.getItem(KEY_DISMISS)||0;}catch(e2){}
    if(Date.now()-dis>7*24*3600*1000)showBanner();
  });
  window.addEventListener("appinstalled",function(){const b=document.getElementById("install-banner");if(b)b.remove();deferredPrompt=null;try{localStorage.removeItem(KEY_DISMISS);}catch(e){}});
})();
applyTheme();bumpStreak();renderHeader();tryDriveAuto();

if(weekStale())autoCloseStaleWeeks().then(()=>{renderHeader();render(cur);});
