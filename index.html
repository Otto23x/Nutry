<style>
/* ══════════ TEMA: variabili per chiaro e scuro ══════════ */
:root{
  --bosco:#14532D; --salvia:#2F7D3B; --menta:#E7F2E4; --crema:#F4F7F2; --card:#FFFFFF;
  --ink:#1E2A1E; --grigio:#68755F; --linea:#DFE8DB;
  --zaff:#C77A15; --zaffbg:#FCF1DF; --mensa:#2F5FA6; --mensabg:#EAF0FA;
  --rosso:#B23B3B; --rossobg:#F9ECEC; --ok:#2F7D3B; --okbg:#E7F2E4;
  --shadow:0 1px 3px rgba(20,40,20,.08),0 4px 14px rgba(20,40,20,.06);
  --hdr1:#0F3D20; --hdr2:#2F7D3B;
}
html[data-theme="dark"]{
  --bosco:#8FD3A0; --salvia:#5FB870; --menta:#173420; --crema:#0F1712; --card:#18241B;
  --ink:#E7F0E7; --grigio:#9DB09B; --linea:#2A3B2D;
  --zaff:#E8A44C; --zaffbg:#2E2413; --mensa:#7FA7E0; --mensabg:#16202F;
  --rosso:#E08484; --rossobg:#301A1A; --ok:#5FB870; --okbg:#173420;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 4px 14px rgba(0,0,0,.3);
  --hdr1:#0B2413; --hdr2:#1E5A2E;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--crema);color:var(--ink);font-size:15px;padding-bottom:78px;transition:background .25s,color .25s}
h1,h2,.dayname,.ringnum{font-family:Georgia,'Noto Serif',serif}
header{background:linear-gradient(130deg,var(--hdr1),var(--hdr2));color:#fff;padding:12px 14px 10px;position:sticky;top:0;z-index:50;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.hrow{display:flex;align-items:center;justify-content:space-between;gap:8px}
header h1{font-size:18px;font-weight:700}
.logo-badge{display:inline-block;background:#fff;color:var(--bosco,#14532D);padding:4px 12px;border-radius:7px;font-weight:900;font-size:19px;letter-spacing:-.5px;line-height:1.15;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.hbtns{display:flex;gap:6px;align-items:center}
.hbtn{border:0;background:rgba(255,255,255,.15);color:#fff;border-radius:9px;padding:6px 9px;font-size:15px;cursor:pointer}
.streak{background:rgba(255,255,255,.15);border-radius:9px;padding:6px 9px;font-size:13px;font-weight:700}
/* ══ Scorrimento date ══ */
.datebar{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:8px}
.datebar button{border:0;background:rgba(255,255,255,.18);color:#fff;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer}
.datebar .dt{font-size:13px;text-transform:capitalize;min-width:190px;text-align:center;cursor:pointer}
.datebar .dt small{display:block;font-size:10px;opacity:.8}
.page{display:none;padding:15px;max-width:640px;margin:0 auto}
.page.active{display:block;animation:fadein .18s ease}
@keyframes fadein{from{opacity:.4;transform:translateY(4px)}to{opacity:1;transform:none}}
.tabs{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--linea);display:flex;z-index:60;padding:4px 4px calc(4px + env(safe-area-inset-bottom))}
.tabs button{flex:1;border:0;background:none;padding:7px 2px 5px;font-size:10.5px;color:var(--grigio);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-radius:12px}
.tabs button .ic{font-size:19px;line-height:1}
.tabs button.on{color:var(--bosco);font-weight:700;background:var(--menta)}
.card{background:var(--card);border:1px solid var(--linea);border-radius:14px;padding:15px;margin-bottom:13px;box-shadow:var(--shadow)}
.card h2{font-size:16px;color:var(--bosco);margin-bottom:10px}
.dayname{font-size:22px;color:var(--bosco);margin:22px 0 2px;display:flex;align-items:center;gap:9px}
.dayctx{font-size:12px;color:var(--grigio);font-style:italic;margin-bottom:9px}
.meal{background:var(--card);border:1px solid var(--linea);border-left:4px solid var(--salvia);border-radius:12px;padding:12px 13px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;box-shadow:var(--shadow)}
.meal.free{border-left-color:var(--zaff);background:var(--zaffbg)}
.meal.mensa{border-left-color:var(--mensa);background:var(--mensabg)}
.meal.done{opacity:.6}.meal.done .mdesc{text-decoration:line-through}
.meal.skip{opacity:.6;border-left-color:var(--rosso)}
.meal.skip .mdesc{text-decoration:line-through;color:var(--rosso)}
.chk{min-width:28px;height:28px;margin-top:1px;border:2px solid var(--salvia);border-radius:50%;background:var(--card);cursor:pointer;font-size:15px;line-height:24px;text-align:center;color:#fff;transition:transform .1s}
.chk:active{transform:scale(.88)}
.meal.free .chk{border-color:var(--zaff)}
.chk.c{background:var(--salvia);border-color:var(--salvia)}
.meal.free .chk.c{background:var(--zaff);border-color:var(--zaff)}
.chk.s{background:var(--rosso)!important;border-color:var(--rosso)!important}
.mbody{flex:1;min-width:0}
.mtop{display:flex;justify-content:space-between;gap:6px;font-size:12px;margin-bottom:2px}
.mname{font-weight:700;color:var(--bosco)}
.meal.free .mname{color:var(--zaff)}
.meal.mensa .mname{color:var(--mensa)}
.meal.skip .mname{color:var(--rosso)}
.mtime{color:var(--grigio)}
.mdesc{font-size:13.5px;line-height:1.45}
.mkcal{font-size:12px;font-weight:700;color:var(--salvia);margin-top:3px}
.mopts{margin-top:7px;display:flex;flex-wrap:wrap;gap:5px}
.mopts button,.chipbtn{border:1.5px solid var(--linea);background:var(--card);border-radius:20px;padding:4px 11px;font-size:11.5px;cursor:pointer;color:var(--grigio)}
.mopts button.sel{border-color:var(--zaff);color:var(--zaff);font-weight:700}
.mtools{margin-top:9px;display:flex;gap:8px;row-gap:8px;align-items:center;flex-wrap:wrap}
.mtools .btn{margin-top:0}
.mtools select{border:1px solid var(--linea);border-radius:8px;padding:6px 8px;font-size:11.5px;color:var(--grigio);background:var(--card);flex:1 1 40%;min-width:120px}
.badge{font-size:10.5px;background:var(--okbg);color:var(--ok);border-radius:7px;padding:2.5px 8px;font-weight:700}
.badge.moved{background:var(--rossobg);color:var(--rosso)}
.badge.ai{background:var(--mensabg);color:var(--mensa)}
.legend{display:flex;gap:12px;font-size:12px;color:var(--grigio);margin-top:6px;flex-wrap:wrap}
.legend b{font-size:14px}
.daytotal{font-size:13px;font-weight:700;color:var(--bosco);padding:6px 2px 14px}
.daytotal span{color:var(--salvia)}
textarea,input[type=text],input[type=number],input[type=date],input[type=password],select{width:100%;border:1px solid var(--linea);border-radius:10px;padding:9px;font-size:14px;font-family:inherit;background:var(--card);color:var(--ink)}
textarea{min-height:54px;resize:vertical}
label{font-size:12px;font-weight:700;color:var(--grigio);display:block;margin:10px 0 4px}
.btn{display:inline-block;border:0;background:var(--salvia);color:#fff;border-radius:11px;padding:10px 17px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;box-shadow:var(--shadow)}
html[data-theme="dark"] .btn{color:#0F1712}
.btn.ghost{background:var(--card);color:var(--salvia);border:1.5px solid var(--salvia);box-shadow:none}
.btn.warn{background:var(--rosso)}
.btn.small{padding:6px 12px;font-size:12.5px;margin-top:4px}
.row2{display:flex;gap:10px}.row2>*{flex:1;min-width:0}
.row3{display:flex;gap:10px}.row3>*{flex:1;min-width:0}
label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.shopcat{font-weight:700;color:#fff;background:linear-gradient(90deg,var(--hdr1),var(--hdr2));border-radius:11px 11px 0 0;padding:9px 13px;font-size:13.5px;margin-top:13px}

<script>
"use strict";
/* ═══════════════════════════════════════════════════════════════
   1. DATI DEL PIANO (ribilanciati: quinoa soffiata al posto dell'avena
      −100 kcal / −5 g prot in colazione, compensati con
      "+ parmigiano 15g + 1 noce" (+90 kcal / +6 g prot) in UN pasto
      normale al giorno (mai mensa, mai liberi).
   ═══════════════════════════════════════════════════════════════ */
const ADD=" + parmigiano 15g + 1 noce"; // il compenso quotidiano
const MM ={n:"Metà mattina",t:"09:30",type:"norm",o:[{d:"Kefir 150g + quinoa soffiata 25g + frutti di bosco 40g + semi oleosi 10g",k:250,p:9,c:30,f:9}]};
const POM={n:"Metà pomeriggio",t:"16:00",type:"norm",o:[{d:"Yogurt greco 150g + frutta di stagione 40g + semi oleosi 10g",k:170,p:17,c:10,f:8}]};
const DC ={n:"Dopo cena",t:"21:30",type:"norm",o:[{d:"Tisana senza zucchero e frutta",k:70,p:0,c:16,f:0}]};
const BASE_PLAN=[
 {day:"Lunedì",ctx:"A casa (smart)",meals:[MM,
   {n:"Pranzo",t:"12:30",type:"norm",o:[{d:"Pollo 200g + verdura + patate 150g + ½ avocado + EVO 10g"+ADD,k:710,p:53,c:32,f:37}]},POM,
   {n:"Cena",t:"19:30",type:"norm",o:[{d:"Zuppa di verdure + 2 uova sode + crostini 30g + ½ avocado + EVO 10g",k:490,p:22,c:40,f:26}]},DC]},
 {day:"Martedì",ctx:"In ufficio — pranzo in mensa",meals:[{...MM,t:"09:30 (portatile)"},
   {n:"Pranzo",t:"12:30",type:"mensa",o:[{d:"MENSA: secondo di carne o pesce + verdura/insalata + pane + frutta",k:600,p:38,c:60,f:24}]},
   {...POM,t:"16:00 (portatile)"},
   {n:"Cena",t:"19:30",type:"norm",o:[
     {d:"Pane 60g + vitello 200g + scamorza 20g + insalata + patate 150g"+ADD,k:700,p:63,c:60,f:24},
     {d:"Pane 60g + prosciutto 150g + scamorza 40g + insalata + patate 150g"+ADD,k:700,p:63,c:60,f:24},
     {d:"Pane 120g + prosciutto 150g + scamorza 40g + insalata"+ADD,k:700,p:63,c:60,f:24}]},DC]},
 {day:"Mercoledì",ctx:"A casa (smart)",meals:[MM,
   {n:"Pranzo",t:"12:30",type:"free",o:[
     {d:"LIBERO: sushi — 4 nigiri + 16 uramaki (vai piano con la soia)",k:720,p:30,c:105,f:20},
     {d:"Branzino 250g + verdura + patate 180g + EVO 10g",k:520,p:51,c:34,f:20}]},POM,
   {n:"Cena",t:"19:30",type:"norm",o:[{d:"Verdura cruda + tonno 100g + fiocchi di latte 170g + pane 30g"+ADD,k:580,p:57,c:28,f:24}]},DC]},
 {day:"Giovedì",ctx:"In ufficio — pranzo in mensa",meals:[{...MM,t:"09:30 (portatile)"},
   {n:"Pranzo",t:"12:30",type:"mensa",o:[{d:"MENSA: secondo di carne o pesce + verdura/insalata + pane + frutta",k:600,p:38,c:60,f:24}]},
   {...POM,t:"16:00 (portatile)"},
   {n:"Cena",t:"19:30",type:"norm",o:[{d:"Pollo 200g + verdura + patate al forno 200g + EVO 10g"+ADD,k:630,p:52,c:38,f:28}]},
   {n:"Dopo cena",t:"21:30",type:"free",o:[
     {d:"LIBERO: gelato 1 pallina o dolcetto",k:150,p:3,c:18,f:7},
     {d:"Tisana senza zucchero e frutta",k:70,p:0,c:16,f:0}]}]},
 {day:"Venerdì",ctx:"A casa (smart)",meals:[MM,
   {n:"Pranzo",t:"12:30",type:"norm",o:[{d:"Pasta 100g + tonno 120g + parmigiano 15g + verdura + EVO 10g"+ADD,k:780,p:52,c:72,f:32}]},
   {n:"Aperitivo",t:"17:30",type:"free",o:[
     {d:"LIBERO: birra media, olive, pochi panificati o fritti",k:570,p:0,c:70,f:32},
     {d:"Yogurt greco 150g + frutta di stagione 40g + semi oleosi 10g",k:170,p:17,c:10,f:8}]},
   {n:"Cena",t:"20:00",type:"norm",o:[{d:"3 uova + piselli 220g + patate 100g",k:520,p:39,c:42,f:22}]},DC]},
 {day:"Sabato",ctx:"Weekend — flessibile",meals:[MM,
   {n:"Pranzo",t:"12:30",type:"norm",o:[{d:"Caprino 100g + piselli 240g + verdura + patate 100g + EVO 10g"+ADD,k:800,p:45,c:48,f:46}]},POM,
   {n:"Cena",t:"20:00",type:"free",o:[
     {d:"LIBERO: pizza, burger o grigliata non eccessivi, poche patatine",k:900,p:30,c:110,f:36},
     {d:"Branzino 250g + verdura + patate 180g + EVO 10g",k:520,p:51,c:34,f:20}]},DC]},
 {day:"Domenica",ctx:"Weekend — flessibile",meals:[
   {n:"Colazione",t:"09:30",type:"free",o:[
     {d:"LIBERO: 1 cornetto + succo senza zucchero",k:350,p:4,c:45,f:16},
     {d:"Kefir 150g + quinoa soffiata 25g + frutti di bosco 40g + semi oleosi 10g",k:250,p:9,c:30,f:9}]},
   {n:"Pranzo",t:"12:30",type:"norm",o:[{d:"3 uova + piselli 100g + verdura + EVO 10g"+ADD,k:550,p:36,c:20,f:35}]},POM,
   {n:"Cena",t:"19:30",type:"norm",o:[{d:"Salmone al forno 250g + verdura + patate 150g + EVO 10g",k:700,p:59,c:28,f:39}]},DC]}
];
let PLAN=BASE_PLAN; // può essere sostituito dal piano personalizzato (S.customPlan)
const SLOTS=["Colazione","Metà mattina","Pranzo","Metà pomeriggio","Aperitivo","Cena","Dopo cena"];
const SHOP=[
 ["PROTEINE (peso da crudo)",["Pollo 400 g crudi (lun + gio)","Salmone 250 g crudi (dom)","Branzino 250 g crudi (mer, alternativa al sushi)","Vitello 200 g crudi (mar) — o prosciutto 150 g","Tonno all'olio ~3 scatolette (mer + ven)","Fiocchi di latte 170 g SENZA lattosio (mer)","Caprino fresco 100 g (sab)","Scamorza senza lattosio ~40 g","Parmigiano ~120 g (uso quotidiano)","Prosciutto cotto ~150 g (variante mar)","Uova ~8 (lun 2, ven 3, dom 3)","Piselli surgelati ~560 g (ven 220 + sab 240 + dom 100)"]],
 ["KEFIR / YOGURT (senza lattosio)",["Kefir ~1 L (colazione)","Yogurt greco senza lattosio ~1,4 kg (spuntini)"]],
 ["CARBOIDRATI",["Patate ~1,3 kg (crude)","Quinoa soffiata ~200 g","Pasta 100 g secca (ven)","Pane + crostini 1 filone","Zuppa di verdure 1 (lun)","Gelato senza lattosio (gio, opz.)"]],
 ["VERDURA (di stagione)",["Verdura di stagione + verdura cruda (mer)","Carote ~1 kg","Insalata / valeriana 4–5 buste","Cetrioli / cipollotto (parte verde)","Verdure surgelate al naturale"]],
 ["FRUTTA (di stagione)",["Frutta di stagione (spuntino + dopo cena)","Frutti di bosco freschi o surgelati ~400 g","Limone"]],
 ["GRASSI, SEMI, DISPENSA",["Olio EVO","Semi oleosi misti ~150 g (con noci e lino)","Noci ~100 g (1 al giorno)","Avocado 1–2 (lun)","Olive 1 barattolo (opz.)","Tisane: finocchio, melissa, camomilla"]]
];
const SPORTS_DEFAULT=[{name:"Camminata",met:3.5},{name:"Corsa",met:9.8},{name:"Tennis",met:7.3},{name:"Squash",met:9.0},{name:"Pesi",met:5.0},{name:"Trekking",met:6.0}];
const INT={bassa:.8,media:1,alta:1.2};

/* ═══════════════════════════════════════════════════════════════
   2. STATO, PERSISTENZA, TEMA
   ═══════════════════════════════════════════════════════════════ */
const KEY="diarioDieta_v2"; // NON cambiare mai: e' dove vivono i dati dell'utente
const APP_VER="3.2.2";        // aggiorna a ogni release: visibile in Io per verificare il deploy
function freshWeek(){return {started:new Date().toISOString().slice(0,10),
  days:PLAN.map(d=>({meals:d.meals.map(()=>({done:false,skip:false,opt:0,movedTo:-1,movedAs:"",custom:null})),
    extras:[],workouts:[],note:"",water:0,sleep:0,relax:0,feel:0,steps:0}))};}
function defaultState(){return {
  profile:{name:"",gender:"m",dob:"",h:185,w:114,lbm:"",act:1.3,weights:[]},
  customSports:[],shop:{},links:[],permMeals:{},week:freshWeek(),history:[],
  ai:{key:""},drive:{cid:"",on:false},
  ui:{theme:"light",vacanza:false,lastOpen:"",lastMorning:""},
  streak:{count:0,last:""},meta:{updated:new Date().toISOString()}};}
let S;
try{S=JSON.parse(localStorage.getItem(KEY))||null;}catch(e){S=null;}
if(!S){ // migrazione dalla v1 se presente
  try{const old=JSON.parse(localStorage.getItem("diarioDieta_v1"));
    if(old){S=defaultState();S.profile=Object.assign(S.profile,old.profile||{});
      S.customSports=old.customSports||[];S.shop=old.shop||{};S.history=old.history||[];S.ai=old.ai||{key:""};}
  }catch(e){}
}
if(!S)S=defaultState();
// retro-compatibilità morbida su tutti i rami
S.ui=Object.assign({theme:"light",vacanza:false,lastOpen:"",lastMorning:""},S.ui||{});
S.drive=Object.assign({cid:"",on:false},S.drive||{});
S.ai=Object.assign({key:"",model:"auto"},S.ai||{});
S.usage=Object.assign({day:"",calls:0,tokens:0,errors:0,last:""},S.usage||{});
S.links=S.links||[];S.permMeals=S.permMeals||{};S.streak=S.streak||{count:0,last:""};S.tapisWorkouts=S.tapisWorkouts||{};S.hardDays=S.hardDays||{};
if(!S.profile.goalWorkoutList){S.profile.goalWorkoutList=[];
  if(S.profile.goalWorkouts&&S.profile.goalSport)S.profile.goalWorkoutList.push({sport:S.profile.goalSport,perWeek:S.profile.goalWorkouts,min:S.profile.goalWorkoutMin||30});}
S.meta=S.meta||{updated:new Date().toISOString()};
S.conadTpl=S.conadTpl||"";
S.recipes=S.recipes||[];
S.progressLog=S.progressLog||[];
S.diet=Object.assign({intol:"lattosio; colon irritabile",
  no:"aglio, cipolla, porro, pomodoro, arancia, ananas, caffè, peperoni, melanzane, cavoli e verza, carciofi, asparagi, avena",
  si:"pollo, patate, kefir, yogurt greco senza lattosio, uova, salmone, piselli, quinoa soffiata",
  note:"",fodmap:true},S.diet||{});
if(S.profile&&S.profile.lbm&&!S.profile.fatp&&S.profile.w>0){ // migrazione: da magra kg a % grasso
  S.profile.fatp=Math.round((1-parseFloat(S.profile.lbm)/S.profile.w)*1000)/10;}
if(S.customPlan&&Array.isArray(S.customPlan)&&S.customPlan.length===7)PLAN=S.customPlan;
if(!S.week||!S.week.days||S.week.days.length!==7)S.week=freshWeek();
S.week.days.forEach((d,di)=>{d.meals.forEach(m=>{if(m.skip===undefined)m.skip=false;if(m.movedAs===undefined)m.movedAs="";if(m.custom===undefined)m.custom=null;});
  while(d.meals.length<PLAN[di].meals.length)d.meals.push({done:false,skip:false,opt:0,movedTo:-1,movedAs:"",custom:null});
  if(d.sleep===undefined)d.sleep=0;if(d.relax===undefined)d.relax=(d.stress?Math.max(1,6-d.stress):0);if(d.feel===undefined)d.feel=0;if(d.steps===undefined)d.steps=0;});
let driveTimer=null;
function save(){S.meta.updated=new Date().toISOString();
  try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}
  // Auto-save su Drive (debounce 4s) se connesso
  if(DTOKEN&&S.drive.on){clearTimeout(driveTimer);driveTimer=setTimeout(driveUpload,4000);}}
function toggleTheme(){/* tema unico chiaro: nessuna alternanza */}
function applyTheme(){
  S.ui.theme="light";
  document.documentElement.dataset.theme="light";}

/* ═══════════════════════════════════════════════════════════════
   3. DATA VISUALIZZATA (scorrimento giorni) + utilità date
   ═══════════════════════════════════════════════════════════════ */
let VIEW=new Date(); VIEW.setHours(12,0,0,0);
const iso=d=>d.toISOString().slice(0,10);
const wd=d=>(d.getDay()+6)%7; // 0=lunedì
function shiftDay(n){VIEW.setDate(VIEW.getDate()+n);renderHeader();render(cur);}
function goToday(){VIEW=new Date();VIEW.setHours(12,0,0,0);renderHeader();render(cur);}
function viewIdx(){return wd(VIEW);}
function isToday(){return iso(VIEW)===iso(new Date());}
const fmtDate=d=>d.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

/* ═══════════════════════════════════════════════════════════════
   4. MOTORE CALORICO E BIOMETRICO
   ═══════════════════════════════════════════════════════════════ */
function age(){if(!S.profile.dob)return 0;const b=new Date(S.profile.dob),n=new Date();
  let a=n.getFullYear()-b.getFullYear();if(n<new Date(n.getFullYear(),b.getMonth(),b.getDate()))a--;return a;}
function bmr(){const p=S.profile;
  const fat=parseFloat(p.fatp);
  const lbm=fat>0?p.w*(1-fat/100):parseFloat(p.lbm); // magra in kg dalla % di grasso
  if(lbm>0)return Math.round(370+21.6*lbm);
  const base=10*p.w+6.25*p.h-5*age();return Math.round(p.gender==="m"?base+5:base-161);}
function tdee(){return Math.round(bmr()*S.profile.act);}
function allSports(){return SPORTS_DEFAULT.concat(S.customSports);}
function workoutKcal(w){const sp=allSports().find(s=>s.name===w.sport)||{met:6};
  return Math.round(sp.met*S.profile.w*(w.min/60)*(INT[w.int]||1));}
function mealOpt(pdi,mi){const st=S.week.days[pdi].meals[mi];
  if(st.custom)return st.custom; // override AI/manuale della settimana
  const perm=S.permMeals[pdi+"_"+mi];
  if(perm&&st.opt===0)return perm; // override permanente sull'opzione base
  return PLAN[pdi].meals[mi].o[st.opt]||PLAN[pdi].meals[mi].o[0];}
function assignedDay(pdi,mi){const st=S.week.days[pdi].meals[mi];return st.movedTo===-1?pdi:st.movedTo;}
function dayItems(di){const items=[];
  PLAN.forEach((pd,pdi)=>pd.meals.forEach((m,mi)=>{if(assignedDay(pdi,mi)===di){
    const st=S.week.days[pdi].meals[mi];const slot=st.movedAs||m.n;
    items.push({pdi,mi,slot,ord:SLOTS.indexOf(slot)<0?9:SLOTS.indexOf(slot)});}}));
  items.sort((a,b)=>a.ord-b.ord);return items;}
function eatenOfDay(di){let k=0,p=0,c=0,f=0;
  dayItems(di).forEach(it=>{const st=S.week.days[it.pdi].meals[it.mi];
    if(st.done&&!st.skip){const o=mealOpt(it.pdi,it.mi);k+=o.k;p+=o.p;c+=o.c||0;f+=o.f||0;}});
  S.week.days[di].extras.forEach(e=>{k+=e.k;p+=e.p||0;c+=e.c||0;f+=e.f||0;});return{k,p,c,f};}
function extrasKcal(di){return S.week.days[di].extras.reduce((a,e)=>a+e.k,0);}
function skippedOfDay(di){return dayItems(di).filter(it=>S.week.days[it.pdi].meals[it.mi].skip).length;}
function plannedOfDay(di){let k=0,p=0;
  dayItems(di).forEach(it=>{const o=mealOpt(it.pdi,it.mi);k+=o.k;p+=o.p;});return{k,p};}
function stepsKcal(di){const s=S.week.days[di].steps||0;
  return Math.round(Math.max(0,s-5000)*S.profile.w*0.00045);} // solo i passi OLTRE la vita sedentaria già nel TDEE
function burnedOfDay(di){return S.week.days[di].workouts.reduce((a,w)=>a+workoutKcal(w),0)+stepsKcal(di);}
function deficitOfDay(di){return tdee()+burnedOfDay(di)-eatenOfDay(di).k;}
/* ── Obiettivi passi/allenamenti e PROIEZIONE non lineare del peso ──────────
   Man mano che si dimagrisce il BMR cala (dipende dal peso), quindi il deficit
   si riduce e il calo rallenta: la discesa NON è lineare. Simuliamo giorno per
   giorno ricalcolando BMR sul peso corrente. Sport e passi vengono dagli
   OBIETTIVI (media giornaliera), non dal singolo dato. */
function bmrForWeight(w){const p=S.profile;const fat=parseFloat(p.fatp);
  const lbm=fat>0?w*(1-fat/100):parseFloat(p.lbm);
  if(lbm>0)return Math.round(370+21.6*lbm);
  const base=10*w+6.25*p.h-5*age();return Math.round(p.gender==="m"?base+5:base-161);}
function stepsBurnFor(steps,w){return Math.round(Math.max(0,(+steps||0)-5000)*w*0.00045);}
function workoutBurnFor(sport,min,intensity,w){const sp=allSports().find(s=>s.name===sport)||{met:6};
  return Math.round(sp.met*w*((+min||0)/60)*(INT[intensity]||1));}
/* Dispendio EXTRA medio giornaliero dagli obiettivi (passi/giorno + lista allenamenti/sett) */
function plannedActivityBurnFor(w){let b=0;const p=S.profile;
  if(p.goalSteps)b+=stepsBurnFor(p.goalSteps,w);
  (p.goalWorkoutList||[]).forEach(g=>{if(g.sport&&g.perWeek)b+=Math.round(workoutBurnFor(g.sport,g.min||30,"media",w)*g.perWeek/7);});
  return b;}
/* Simulazione della discesa del peso a partire da (startW,startDate) fino
   all'obiettivo, con deficit = TDEE(peso) + attività pianificata − intake dieta.
   Ritorna i punti (campionati ~settimanalmente), i giorni stimati e la data. */
function simulateWeightDescent(startW,startDate){
  const p=S.profile,goal=p.goalW;
  startW=startW||p.w;const start=startDate?new Date(startDate):new Date();start.setHours(12,0,0,0);
  if(!goal||!startW||startW<=goal)return null;
  const intake=plannedDietSummary().kcal_giorno;
  const dailyDeficitStart=Math.round(bmrForWeight(startW)*p.act)+plannedActivityBurnFor(startW)-intake;
  let w=startW;const pts=[{d:new Date(start),w:Math.round(w*10)/10}];
  let day=0;const MAX=3650;let stalled=false;
  while(w>goal&&day<MAX){day++;
    const def=Math.round(bmrForWeight(w)*p.act)+plannedActivityBurnFor(w)-intake;
    if(def<=0){stalled=true;break;}
    w-=def/7700;if(w<goal)w=goal;
    if(day%7===0||w<=goal){const dt=new Date(start);dt.setDate(dt.getDate()+day);pts.push({d:dt,w:Math.round(w*10)/10});}}
  const reached=w<=goal+0.05&&!stalled;
  const etaDate=new Date(start);etaDate.setDate(etaDate.getDate()+day);
  return {points:pts,etaDays:day,etaDate,reached,stalled,dailyDeficitStart,intake};}
/* Peso "ideale" proiettato a una certa data, partendo dalla prima pesata reale */
function projectedWeightAt(dateISO){
  const W=(S.profile.weights||[]).filter(x=>x.w).slice().sort((a,b)=>new Date(a.d)-new Date(b.d));
  if(!W.length)return null;
  const sim=simulateWeightDescent(W[0].w,W[0].d);if(!sim)return null;
  const target=new Date(dateISO).getTime();let best=sim.points[0];
  sim.points.forEach(pt=>{if(pt.d.getTime()<=target)best=pt;});
  return best?best.w:null;}
/* Proposta obiettivo acqua in base al peso (~35 ml/kg), in litri, arrotondata a 0,5 L */
function waterSuggestL(){return Math.min(5,Math.max(1.5,Math.round(S.profile.w*0.035*2)/2));}
/* Obiettivo acqua: l'utente lo sceglie in IO (litri/giorno); se non impostato
   si usa la proposta in base al peso. +2 bicchieri se allenamento intenso o >45'.
   1 bicchiere = 250 ml. */
function waterGoal(di){const hard=S.week.days[di].workouts.some(w=>w.int==="alta"||w.min>45);
  const litri=(+S.profile.waterGoalL>0)?+S.profile.waterGoalL:waterSuggestL();
  const base=Math.min(24,Math.max(4,Math.round(litri*4))); // bicchieri da 250 ml
  return base+(hard?2:0);}

/* ═══════════════════════════════════════════════════════════════
   5. STREAK 🔥 (giorni in target consecutivi) — congelata in vacanza
   ═══════════════════════════════════════════════════════════════ */
function dayInTarget(di){const e=eatenOfDay(di);
  return e.k>0&&deficitOfDay(di)>=0&&extrasKcal(di)<=300;}
function isHard(dISO){return !!(S.hardDays&&S.hardDays[dISO]);}
function bumpStreak(){const y=new Date();y.setDate(y.getDate()-1);y.setHours(12,0,0,0);
  const yIso=iso(y);if(S.streak.last===yIso)return;
  if(S.ui.vacanza||isHard(yIso)){S.streak.last=yIso;save();return;} // vacanza o giornata difficile: congela
  const prev=new Date(y);prev.setDate(prev.getDate()-1);
  if(dayInTarget(wd(y))){S.streak.count=(S.streak.last===iso(prev)||S.streak.count===0)?S.streak.count+1:1;
    if(S.streak.count>0&&S.streak.count%7===0)setTimeout(()=>{confetti();toast("🔥 "+S.streak.count+" giorni in target di fila!");},600);}
  else S.streak.count=0;
  S.streak.last=yIso;save();}

function trackUsage(tok,err){const t=new Date().toISOString().slice(0,10);
  if(S.usage.day!==t){S.usage.day=t;S.usage.calls=0;S.usage.tokens=0;S.usage.errors=0;}

const wait=ms=>new Promise(r=>setTimeout(r,ms));

/* Chiamata Gemini robusta: fino a 3 tentativi per modello con backoff su 429/503/rete;
   passa al modello successivo su 404/quota; errori tipizzati per messaggi chiari. */
async function geminiCall(prompt,imgs){
  const key=(S.ai&&S.ai.key||"").trim();if(!key)throw new Error("nokey");
  const parts=[];
  (imgs||[]).forEach(im=>parts.push({inline_data:{mime_type:im.mime||"image/jpeg",data:im.b64}}));
  parts.push({text:prompt});
  aiBusy();
  try{
  let lastErr=null;
  for(const m of gemModels()){
    for(let attempt=0;attempt<3;attempt++){
      try{
        const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),25000);
        let r;
        try{r=await fetch("https://generativelanguage.googleapis.com/v1beta/models/"+m+":generateContent?key="+encodeURIComponent(key),{
          method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts}]}),signal:ctrl.signal});}
        finally{clearTimeout(to);}
        if(r.status===429){lastErr=new Error("quota");break;}              // quota: cambia modello
        if(r.status===404){lastErr=new Error("modello");break;}            // modello assente: cambia
        if(r.status===503||r.status===500){lastErr=new Error("busy");await wait(800*(attempt+1));continue;} // sovraccarico: riprova
        if(r.status===400){throw new Error("badkey");}                     // chiave/permessi
        if(!r.ok)throw new Error("HTTP "+r.status);
        const j=await r.json();
        if(j.promptFeedback&&j.promptFeedback.blockReason)throw new Error("blocked");
        const txt=(j.candidates&&j.candidates[0]&&j.candidates[0].content.parts.map(p=>p.text||"").join(""))||"";
        trackUsage((j.usageMetadata&&j.usageMetadata.totalTokenCount)||0,false);
        return txt;
      }catch(e){lastErr=e;
        const msg=String(e.message||e);
        if(e.name==="AbortError"||/Failed to fetch|NetworkError|load failed/i.test(msg)){await wait(700*(attempt+1));continue;} // rete: riprova
        if(/quota|modello/.test(msg))break; // gestiti sopra
        break; // badkey/blocked/altro: non riprovare, prova prossimo modello
      }
    }
  }
  trackUsage(0,true);
  throw lastErr||new Error("errore");
  }finally{aiDone();}}
const aiOn=()=>!!(S.ai&&S.ai.key);
async function aiAsk(prompt){return geminiCall(prompt);}
async function aiAskVision(prompt,imgs){return geminiCall(prompt,imgs);}
/* Scatta/scegli una foto e ridimensionala (max 1024px, JPEG) per contenere i token */
function snapPhoto(){return new Promise((res,rej)=>{
  const inp=document.createElement("input");inp.type="file";inp.accept="image/*";inp.capture="environment";
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return rej(new Error("annullato"));
    const img=new Image();img.onload=()=>{
      const MAX=1024,sc=Math.min(1,MAX/Math.max(img.width,img.height));
      const c=document.createElement("canvas");c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      res({b64:c.toDataURL("image/jpeg",0.82).split(",")[1],mime:"image/jpeg"});
      URL.revokeObjectURL(img.src);};
    img.onerror=()=>rej(new Error("immagine non leggibile"));
    img.src=URL.createObjectURL(f);};
  inp.click();});}

function currentSlot(){const h=new Date().getHours();
  return h<11?"colazione":h<15?"pranzo":h<18?"merenda":"cena";}
/* Surplus accumulato finora: quanto hai mangiato in PIÙ rispetto al pianificato
   dei pasti già consumati (extra e modifiche compresi). >0 = sei sopra. */
function surplusOfDay(di){let plannedDone=0;
  dayItems(di).forEach(it=>{const st=S.week.days[it.pdi].meals[it.mi];
    if(st.done&&!st.skip){plannedDone+=mealOpt(it.pdi,it.mi).k;}});
  return eatenOfDay(di).k-plannedDone;}
/* Il pasto in piano di questo momento, con target COMPENSATO dal surplus:
   se hai già accumulato calorie extra, il target scende (le proteine no). */
function targetMealOf(di,key){
  let base=null;
  if(key){const[pdi,mi]=key.split("_").map(Number);
    if(PLAN[pdi]&&PLAN[pdi].meals[mi]){const o=mealOpt(pdi,mi);
      base={slot:(S.week.days[pdi].meals[mi].movedAs||PLAN[pdi].meals[mi].n),k:o.k,p:o.p,pdi,mi};}}
  if(!base){
    const map={colazione:["Colazione","Metà mattina"],pranzo:["Pranzo"],merenda:["Metà pomeriggio","Aperitivo"],cena:["Cena","Dopo cena"]};
    const slots=map[currentSlot()];
    for(const s of slots){const it=dayItems(di).find(x=>x.slot===s&&!S.week.days[x.pdi].meals[x.mi].done);
      if(it){const o=mealOpt(it.pdi,it.mi);base={slot:s,k:o.k,p:o.p,pdi:it.pdi,mi:it.mi};break;}}}
  if(!base){const plan=plannedOfDay(di),eat=eatenOfDay(di);
    base={slot:currentSlot(),k:Math.max(300,plan.k-eat.k),p:30};}
  const sur=Math.max(0,surplusOfDay(di));
  base.sur=sur;base.kAdj=Math.max(200,base.k-sur);
  return base;}

  if(sg<=50)return alert("Ieri non risulta un eccesso da recuperare.");

  const mains=dayItems(toDi).filter(it=>{const st=S.week.days[it.pdi].meals[it.mi];
    return !st.done&&!st.skip&&PLAN[it.pdi].meals[it.mi].type==="norm"&&/Pranzo|Cena/i.test(it.slot);});
  if(!mains.length)return alert("Non ci sono pranzo/cena ancora da consumare da alleggerire.");
  const list=mains.map(it=>{const o=mealOpt(it.pdi,it.mi);return {slot:it.slot,desc:o.d,kcal:o.k,prot:o.p};});
  try{
    const t=await aiAsk('Ieri ho ecceduto di '+sg+' kcal. Alleggerisci i pasti principali di OGGI per recuperare circa '+sg+' kcal totali, riducendo carboidrati e grassi (MAI le proteine), piatti realistici con grammature, senza scendere sotto ~300 kcal a pasto. Pasti principali di oggi: '+JSON.stringify(list)+'. '+dietStr()+' Rispondi SOLO JSON array: [{"slot":"...","desc":"...","kcal":n,"prot":n}]');

    if(!confirm(msg+"\n\nOK = applica a pranzo e cena di oggi"))return;
    arr.forEach(a=>{const it=mains.find(r=>r.slot===a.slot);if(it)
      S.week.days[it.pdi].meals[it.mi].custom={d:a.desc+" (recupero)",k:Math.round(a.kcal),p:Math.round(a.prot)};});
    S.week.days[toDi].rebalancedFrom=fromDi;save();render(cur);
    alert("Fatto: pranzo e cena di oggi alleggeriti per recuperare l'eccesso di ieri.");
  }catch(e){aiFail(e);}};

/* ═══════════════════════════════════════════════════════════════
   9. PAGINA PIANO
   ═══════════════════════════════════════════════════════════════ */
/* Il piano è un MODELLO statico: niente spunte, niente extra (quelli stanno in
   Oggi). Le modifiche fatte qui (opzione / ✏️ / 🎲) sono PERMANENTI: restano
   effettive anche nelle settimane successive, perché vivono in S.permMeals. */
function templateOpt(pdi,mi){const perm=S.permMeals[pdi+"_"+mi];if(perm)return perm;return PLAN[pdi].meals[mi].o[0];}
function plannedTemplateOfDay(di){let k=0,p=0,c=0,f=0;PLAN[di].meals.forEach((m,mi)=>{const o=templateOpt(di,mi);k+=o.k;p+=o.p;c+=(o.c||0);f+=(o.f||0);});return{k,p,c,f};}
function mealCardStatic(pdi,mi){const m=PLAN[pdi].meals[mi];const o=templateOpt(pdi,mi);
  const permObj=S.permMeals[pdi+"_"+mi];const isCustom=!!permObj;
  let h=`<div class="meal"><div class="mbody">
    <div class="mtop"><span class="mname">${esc(m.n)}</span><span class="mtime">${m.t}</span></div>
    <div class="mdesc">${esc(o.d)}</div>
    <div class="mkcal">~${o.k} kcal · ${o.p} g P${o.c!=null?` · ${o.c} g C`:""}${o.f!=null?` · ${o.f} g G`:""} ${isCustom?'<span class="badge ai">modificato</span>':""}</div>`;
  if(m.o.length>1){h+=`<div class="mopts">`+m.o.map((x,oi)=>{
      const sel=isCustom?(permObj.d===x.d):(oi===0);
      return `<button class="${sel?"sel":""}" onclick="setPermOpt(${pdi},${mi},${oi})">Opzione ${oi+1}</button>`;}).join("")+`</div>`;}
  h+=`<div class="mtools" style="margin-top:4px">
    <button class="ibtn" title="Modifica permanente" onclick="editMealPerm(${pdi},${mi})">✏️</button>
    <button class="ibtn" title="Alternativa AI a parità di macro (permanente)" onclick="altMealPerm(${pdi},${mi})">🎲</button>`;
  if(isCustom)h+=`<button class="ibtn" title="Ripristina originale" onclick="resetPerm(${pdi},${mi})">↩️</button>`;
  h+=`</div></div></div>`;return h;}
window.setPermOpt=(d,m,oi)=>{const o=PLAN[d].meals[m].o[oi];
  if(oi===0)delete S.permMeals[d+"_"+m];else S.permMeals[d+"_"+m]={d:o.d,k:o.k,p:o.p,c:o.c!=null?o.c:null,f:o.f!=null?o.f:null};
  save();render("piano");};
window.resetPerm=(d,m)=>{delete S.permMeals[d+"_"+m];save();render("piano");};
window.editMealPerm=async(d,m)=>{const o=templateOpt(d,m);const nd=prompt("Modifica permanente del piano (resta effettiva sempre):",o.d);
  if(nd==null||!nd.trim())return;let k=o.k,p=o.p,c=o.c,f=o.f;
  if(aiOn()&&confirm("Vuoi che l'AI ristimi kcal e macro del pasto modificato?")){
    try{const t=await aiAsk('Stima calorie e macro di questo pasto: "'+nd+'". Rispondi SOLO JSON: {"kcal":numero,"prot":numero,"carb":numero,"gras":numero}');
      const j=parseAIJSON(t);k=Math.round(j.kcal);p=Math.round(j.prot);c=Math.round(j.carb)||null;f=Math.round(j.gras)||null;}catch(e){aiFail(e);return;}}
  S.permMeals[d+"_"+m]={d:nd.trim(),k,p,c,f};save();render("piano");};
window.altMealPerm=async(d,m)=>{if(!aiOn())return aiFail(new Error("nokey"));const o=templateOpt(d,m);
  try{const t=await aiAsk('Genera UN piatto completamente diverso da "'+o.d+'" ma con circa '+o.k+' kcal e '+o.p+' g di proteine. '+dietStr()+' Ingredienti comuni in Italia con grammature. Rispondi SOLO JSON: {"piatto":"descrizione con grammature","kcal":numero,"prot":numero,"carb":numero,"gras":numero}');
    const j=parseAIJSON(t);
    if(!confirm("Alternativa permanente:\n"+j.piatto+"\n~"+Math.round(j.kcal)+" kcal · ~"+Math.round(j.prot)+" g P\n\nOK = usala sempre nel piano"))return;
    S.permMeals[d+"_"+m]={d:j.piatto,k:Math.round(j.kcal),p:Math.round(j.prot),c:Math.round(j.carb)||null,f:Math.round(j.gras)||null};save();render("piano");}catch(e){aiFail(e);}};
function renderPiano(){const el=document.getElementById("pg-piano");const ti=wd(new Date());
  let h=`<div class="card"><h2>La tua settimana</h2>
  <div class="hint">Questo è il tuo <b>piano</b>: un modello fisso. Le modifiche qui (opzione · ✏️ · 🎲) restano <b>sempre effettive</b>, anche nelle settimane successive. Spunte, extra e tracciamento del giorno si fanno in <b>Oggi</b>.</div></div>`;
  PLAN.forEach((d,di)=>{
    h+=`<div class="dayname">${d.day}${di===ti?'<span class="todaytag">OGGI</span>':""}</div><div class="dayctx">${d.ctx}</div>`;
    d.meals.forEach((m,mi)=>h+=mealCardStatic(di,mi));
    const pl=plannedTemplateOfDay(di);
    h+=`<div class="daytotal">Pianificato: <span>~${pl.k} kcal · ${pl.p} g P · ${pl.c} g C · ${pl.f} g G</span></div>`;
  });
  el.innerHTML=h;}

function ring(pct,def){const r=72,c=2*Math.PI*r,off=c*(1-Math.min(1,pct));
  return `<div class="ringwrap"><svg width="170" height="170">
    <circle cx="85" cy="85" r="${r}" fill="none" stroke="var(--linea)" stroke-width="14"/>
    <circle cx="85" cy="85" r="${r}" fill="none" stroke="${def>=0?"#2F7D3B":"#B23B3B"}" stroke-width="14" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset .5s"/></svg>
    <div class="ringnum"><div class="v ${def>=0?"def":"sur"}">${def>=0?"−":"+"}${Math.abs(def)}</div>
    <div class="l">${def>=0?"kcal di deficit":"kcal di surplus"}</div></div></div>`;}
function stars(di,field){let h=`<div class="stars">`;
  for(let i=1;i<=5;i++)h+=`<span class="${S.week.days[di][field]>=i?"on":""}" onclick="setStar(${di},'${field}',${i})">⭐</span>`;
  return h+`</div>`;}
window.setStar=(di,f,v)=>{S.week.days[di][f]=(S.week.days[di][f]===v?0:v);save();render("oggi");};
function renderOggi(){const el=document.getElementById("pg-oggi");const di=viewIdx();
  const eat=eatenOfDay(di),burn=burnedOfDay(di),t=tdee(),def=t+burn-eat.k,target=t+burn;
  let h="";
  if(needWeekBanner())h+=`<div class="card" style="border-left:4px solid var(--mensa);display:flex;flex-wrap:wrap;gap:10px;align-items:center">
    <div style="flex:1;font-size:13.5px">📅 <b>Nuova settimana!</b> Controlla il recap della scorsa e, se è tutto a posto, convalidala. <b>Dopo il salvataggio non sarà più modificabile.</b></div>
    <button class="btn small" onclick="show('storico')">Vai al recap</button>
    <button class="ibtn" onclick="dismissWeek()" title="Nascondi per oggi">✕</button></div>`;
  if(needMorningBanner()){const um=unmarkedOfDay(yIdx()),nwk=S.week.days[yIdx()].workouts.length,ns=S.week.days[yIdx()].steps;
    const missMeals=um>0,missSport=(nwk===0||!ns);
    let reason;
    if(missMeals&&missSport)reason="Non hai completato alimentazione e sport.";
    else if(missMeals)reason="Manca ancora qualche pasto da completare.";
    else reason="Nessun allenamento o passi inseriti.";
    let txt="🌅 Ieri (<b>"+PLAN[yIdx()].day+"</b>): "+reason;
    h+=`<div class="card" style="border-left:4px solid var(--zaff);display:flex;flex-wrap:wrap;gap:10px;align-items:center">
    <div style="flex:1;font-size:13.5px">${txt}</div>
    <button class="btn ghost small" onclick="goYesterday()">Alimentazione</button>
    <button class="btn ghost small" onclick="goSportY()">Sport & Passi</button>
    <button class="btn small" onclick="dismissMorning()">Completa</button></div>`;}
  // 🔁 Recupero del giorno dopo: se ieri hai ecceduto (es. sgarro a cena), proponi di alleggerire oggi
  if(isToday()&&!S.ui.vacanza){const yi=yIdx(),ti=viewIdx(),ys=Math.round(surplusOfDay(yi));
    const alreadyReb=S.week.days[ti].rebalancedFrom===yi,dism=S.ui.dismissReb===iso(new Date());
    if(yi<ti&&ys>200&&!alreadyReb&&!dism){
      h+=`<div class="card" style="border-left:4px solid var(--rosso);display:flex;flex-wrap:wrap;gap:10px;align-items:center">
      <div style="flex:1;font-size:13.5px">🔁 Ieri hai ecceduto di ~<b>${ys} kcal</b> (es. sgarro a cena). Vuoi recuperare <b>oggi</b> alleggerendo pranzo e cena?</div>
      <button class="btn small" onclick="rebalanceNextDay(${yi},${ti})">Ribilancia oggi</button>
      <button class="ibtn" onclick="dismissReb()" title="Nascondi per oggi">✕</button></div>`;}}
  const _vd=iso(VIEW);
  if(!S.ui.vacanza)h+=`<div class="mtools" style="margin:0 0 8px">
    <button class="btn ghost small" onclick="toggleHardDay('${_vd}')">${isHard(_vd)?"✅ Giornata difficile — annulla":"🏳️ Segna giornata difficile"}</button>
    <button class="btn ghost small" onclick="markHardDays()">Settimana difficile…</button></div>`;
  if(S.ui.vacanza){
    h+=`<div class="gaugecard"><div style="font-size:40px">🏖️</div><h2>Modalità vacanza</h2>
    <div class="hint">Deficit e serie 🔥 congelati. L'app resta un diario di annotazione: spunta e scrivi liberamente, senza giudizio. Disattiva la vacanza dalla pagina Io.</div>
    <div class="stat3"><div><div class="v">${eat.k}</div><div class="l">kcal segnate</div></div>
    <div><div class="v">${eat.p} g</div><div class="l">proteine</div></div>
    <div><div class="v">${burn}</div><div class="l">kcal sport</div></div></div>
    <div class="gnums" style="margin-top:8px"><span>${eat.p} g P</span><span>${eat.c} g C</span><span>${eat.f} g G</span></div></div>`;
  }else{
    h+=`<div class="gaugecard"><div class="hint" style="margin:0 0 2px">Bilancio di ${PLAN[di].day} ${isToday()?"":("("+VIEW.toLocaleDateString("it-IT")+")")}${isHard(_vd)?' · <span style="color:var(--zaff)">🏳️ giornata difficile (esclusa dalle medie)</span>':""}</div>
    ${ring(eat.k/Math.max(1,target),def)}
    <div class="gnums"><span>Mangiate <b>${eat.k}</b></span><span>Fabbisogno <b>${t}</b></span><span>Sport <b>+${burn}</b></span></div>
    <div class="gnums" style="margin-top:4px"><span>${eat.p} g P</span><span>${eat.c} g C</span><span>${eat.f} g G</span></div>
    <div class="stat3"><div><div class="v">${eat.p} g</div><div class="l">proteine</div></div>
    <div><div class="v">${skippedOfDay(di)}</div><div class="l">pasti saltati</div></div>
    <div><div class="v">🔥 ${S.streak.count}</div><div class="l">giorni in target</div></div></div></div>`;}
  // Acqua con obiettivo dinamico
  const goal=waterGoal(di);
  h+=`<div class="card"><h2>Acqua</h2><div class="water">`;
  for(let i=0;i<goal;i++)h+=`<span class="${i<S.week.days[di].water?"f":""}" onclick="setWater(${di},${i})">💧</span>`;

    <div class="mdesc">${esc(e.d)}</div><div class="mkcal">~${e.k} kcal · ${e.p||0} g P${e.c!=null?` · ${e.c} g C`:""}${e.f!=null?` · ${e.f} g G`:""}</div></div></div>`;});
  h+=`<div class="mtools" style="margin-top:4px">
    <button class="btn ghost small" onclick="addExtra(${di})">+ Extra</button>

  // Svuota-frigo
  h+=`<div class="card" style="margin-top:18px"><h2>🍲 Crea un piatto con quello che hai</h2>
  ${mealSelHtml("frTarget",di)}

    <button class="btn small" onclick="frCreate(${di})">🍲 Crea</button>

  </div>
  <div class="hint">Scatta PIÙ foto (frigo, congelatore, dispensa), poi "Crea": il piatto sarà tarato sul pasto di questo momento, compensando le calorie già accumulate oggi. In alternativa scrivi gli ingredienti.</div>

  <div class="aibox" id="fridgeOut" style="display:none"></div></div>`;

    <button class="btn ghost small" onclick="menuAI(${di})">Usa il testo</button>
  </div>
  <div class="hint">L'AI sceglie dal menù il piatto più COMPATIBILE con quello che dovresti mangiare adesso (stesso momento della giornata, kcal e proteine più vicine al tuo pasto in piano), più due riserve.</div>
  <textarea id="menuIn" placeholder="…oppure incolla qui il testo del menù"></textarea>
  <div class="aibox" id="menuOut" style="display:none"></div></div>`;
  el.innerHTML=h;

   ═══════════════════════════════════════════════════════════════ */
let scanner=null;
window.startScan=(di)=>{
  if(window._noScan||typeof Html5Qrcode==="undefined")return alert("Scanner non disponibile: serve internet al primo avvio per caricare la libreria.");
  document.getElementById("scanbox").style.display="block";
  scanner=new Html5Qrcode("scanreader");
  scanner.start({facingMode:"environment"},{fps:10,qrbox:{width:230,height:120}},
    async code=>{stopScan();
      try{
        const r=await fetch("https://world.openfoodfacts.org/api/v0/product/"+code+".json");
        const j=await r.json();
        if(j.status!==1)return alert("Prodotto non trovato su Open Food Facts. Inseriscilo a mano.");
        const nm=j.product.product_name||"Prodotto",nu=j.product.nutriments||{};
        const k100=Math.round(nu["energy-kcal_100g"]||0),p100=Math.round((nu["proteins_100g"]||0)*10)/10;
        const g=parseFloat(prompt(nm+"\n~"+k100+" kcal e "+p100+" g prot per 100 g.\nQuanti grammi ne hai mangiati?","30"))||0;
        if(!g)return;
        S.week.days[di].extras.push({d:nm+" "+g+"g",k:Math.round(k100*g/100),p:Math.round(p100*g/100)});
        save();render("oggi");
      }catch(e){alert("Errore di rete verso Open Food Facts.");}
    },()=>{}).catch(()=>alert("Fotocamera non disponibile (permessi o contesto non sicuro)."));};
window.stopScan=()=>{if(scanner){scanner.stop().catch(()=>{});scanner=null;}

/* Costruisce il link di ricerca: usa il modello personale se impostato
   (con {q} = termine pulito e codificato), altrimenti apre solo la home
   del sito (nessun link indovinato: Conad richiede prima il negozio). */
function conadLink(text){
  const q=encodeURIComponent(conadQ(text));
  if(S.conadTpl&&S.conadTpl.includes("{q}"))return safeUrl(S.conadTpl.replace("{q}",q));
  return "https://spesaonline.conad.it/";}
function conadQ(t){ // pulizia testo per la ricerca Conad
  return t.replace(/\(.*?\)/g,"").replace(/~|≈/g,"")
    .replace(/\b(crudi|crudo|crude|cruda|secca|secchi|freschi|fresco|SENZA|senza|surgelati|surgelata|opz\.?)\b/gi,"")
    .replace(/[0-9]+([.,][0-9]+)?\s*(g|kg|l|ml|pz)?/gi,"").replace(/[—–-].*$/,"")
    .replace(/\s+/g," ").trim();}
window.subAI=async(txt)=>{

function weekSummary(){
  const days=PLAN.map((d,di)=>{const e=eatenOfDay(di);
    return {day:d.day,eat:e.k,prot:e.p,c:e.c,f:e.f,burn:burnedOfDay(di),def:deficitOfDay(di),sk:skippedOfDay(di),
      sgarri:extrasKcal(di),sleep:S.week.days[di].sleep,relax:S.week.days[di].relax,feel:S.week.days[di].feel,
      note:S.week.days[di].note||"",workouts:S.week.days[di].workouts.map(w=>w.sport+" "+w.min+"'")}});
  days.forEach((d,di)=>d.completed=dayCompleted(di));
  const done=days.filter(d=>d.completed);
  const avg=a=>a.length?Math.round(a.reduce((x,y)=>x+y,0)/a.length):0;
  return {from:S.week.started,to:iso(new Date()),tdee:tdee(),weight:S.profile.w,nDone:done.length,
    avgEat:avg(done.map(d=>d.eat)),avgProt:avg(done.map(d=>d.prot)),avgDef:avg(done.map(d=>d.def)),
    totBurn:days.reduce((a,d)=>a+d.burn,0),days,ai:null};}

/* ── Modifica settimane passate ──────────────────────────────────────────
   Le settimane chiuse archiviano solo dati aggregati per giorno (kcal, prot,
   carbo, grassi, sport bruciato, sonno/relax/umore, note, allenamenti come
   testo): qui si possono correggere. Il deficit e le medie della settimana
   vengono RICALCOLATI da questi valori al salvataggio (stesso TDEE usato
   all'epoca, salvato in wk.tdee). Include un merge rapido degli allenamenti
   importati da Tapis per le date di questa settimana, se presenti in attesa
   (S.tapisWorkouts): una volta uniti qui, vengono tolti da lì per non essere
   conteggiati due volte nei grafici. */

/* ═══════════════════════════════════════════════════════════════
   ANALISI STORICO: periodi (giorno/settimana/mese/anno/manuale),
   grafici multi-metrica (calorie, peso, macro) + coaching AI
   con cronologia a tendina (solo l'ultima analisi resta visibile).
   ═══════════════════════════════════════════════════════════════ */
let AN={mode:"settimana"};
let ANCH={cal:null,weight:null,macro:null};
/* Tutti i giorni (storico + settimana in corso) con data reale calcolata */
function flattenDiet(){
  const out=[];
  S.history.forEach(w=>{(w.days||[]).forEach((d,i)=>{
    const dt=new Date(w.from+"T12:00:00");dt.setDate(dt.getDate()+i);
    out.push({date:iso(dt),eat:d.eat||0,prot:d.prot||0,c:d.c||0,f:d.f||0,def:d.def||0,burn:d.burn||0,
      sleep:d.sleep||0,relax:d.relax||0,feel:d.feel||0,note:d.note||"",workouts:d.workouts||[],
      sgarri:d.sgarri||0,completed:!!d.completed,hard:isHard(iso(dt))});});});
  const wkStart=new Date(S.week.started+"T12:00:00"),today=new Date();today.setHours(12,0,0,0);
  PLAN.forEach((pd,di)=>{
    const dt=new Date(wkStart);dt.setDate(dt.getDate()+di);
    if(dt>today)return;
    const e=eatenOfDay(di);
    out.push({date:iso(dt),eat:e.k,prot:e.p,c:e.c||0,f:e.f||0,def:deficitOfDay(di),burn:burnedOfDay(di),
      sleep:S.week.days[di].sleep||0,relax:S.week.days[di].relax||0,feel:S.week.days[di].feel||0,
      note:S.week.days[di].note||"",workouts:S.week.days[di].workouts.map(w=>w.sport+" "+w.min+"'"),
      sgarri:extrasKcal(di),completed:dayCompleted(di),hard:isHard(iso(dt))});});
  // Allenamenti importati da Tapis per date passate (archivio): li conteggiamo
  // nel dispendio e nel deficit del giorno e li mostriamo tra gli allenamenti,
  // senza aver toccato i riepiloghi settimanali già salvati.
  if(S.tapisWorkouts)out.forEach(o=>{const tw=S.tapisWorkouts[o.date];
    if(tw&&tw.length){let add=0;tw.forEach(w=>{add+=workoutKcal(w);o.workouts=o.workouts.concat([w.sport+" "+w.min+"'"]);});
      o.burn=(o.burn||0)+add;o.def=(o.def||0)+add;}});
  out.sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);
  return out;}
/* Quante colonne mostrare: le calcoliamo in base alla LARGHEZZA del grafico,
   puntando a ~12 (così i mesi mostrano di fatto l'ultimo anno "rolling"), ma
   adattandoci a schermi più larghi/stretti invece di usare un numero fisso. */
function bucketsToShow(){
  const el=document.getElementById("chAnCal");
  let w=el&&el.clientWidth?el.clientWidth:0;
  if(!w){const pg=document.querySelector(".page.active");w=(pg&&pg.clientWidth)||document.body.clientWidth||340;}
  const perCol=26; // px per colonna leggibile
  return Math.max(6,Math.min(24,Math.round(w/perCol)));}
function periodBounds(mode,n){
  if(!n)n=bucketsToShow();
  const today=new Date();today.setHours(12,0,0,0);
  const back=d=>{const x=new Date(today);x.setDate(x.getDate()-d);return x;};
  if(mode==="giorno")return{from:back(n-1),to:today,bucket:"day"};
  if(mode==="settimana")return{from:back((n-1)*7),to:today,bucket:"week"};
  if(mode==="mese"){const f=new Date(today.getFullYear(),today.getMonth()-(n-1),1);f.setHours(12,0,0,0);return{from:f,to:today,bucket:"month"};}
  if(mode==="anno"){const f=new Date(today.getFullYear()-(n-1),0,1);f.setHours(12,0,0,0);return{from:f,to:today,bucket:"year"};}
  const f=document.getElementById("anFrom"),t=document.getElementById("anTo");
  const fromD=f&&f.value?new Date(f.value+"T12:00:00"):back(30);
  const toD=t&&t.value?new Date(t.value+"T12:00:00"):today;
  const days=(toD-fromD)/864e5;
  return{from:fromD,to:toD,bucket:days>75?"month":"day"};}
function bucketKey(d,bucket){
  if(bucket==="day")return d.date;
  if(bucket==="year")return d.date.slice(0,4);
  if(bucket==="month")return d.date.slice(0,7);
  const dt=new Date(d.date+"T12:00:00");const day=(dt.getDay()+6)%7;dt.setDate(dt.getDate()-day);
  return iso(dt);}
function bucketLabel(key,bucket){
  if(bucket==="year")return key;
  if(bucket==="month"){const p=key.split("-");return new Date(+p[0],+p[1]-1,1).toLocaleDateString("it-IT",{month:"short",year:"2-digit"});}
  const dt=new Date(key+"T12:00:00");
  return dt.toLocaleDateString("it-IT",{day:"numeric",month:"short"});}
function aggregateDiet(mode){
  const {from,to,bucket}=periodBounds(mode);
  const all=flattenDiet().filter(d=>{const dt=new Date(d.date+"T12:00:00");return dt>=from&&dt<=to;});
  const buckets={};
  all.forEach(d=>{const k=bucketKey(d,bucket);(buckets[k]=buckets[k]||[]).push(d);});
  const keys=Object.keys(buckets).sort();
  const rows=keys.map(k=>{const arr=buckets[k];const n=arr.length;
    const avg=fld=>Math.round(arr.reduce((a,x)=>a+(x[fld]||0),0)/n);
    return{key:k,label:bucketLabel(k,bucket),n,eat:avg("eat"),prot:avg("prot"),c:avg("c"),f:avg("f"),def:avg("def"),burn:avg("burn")};});
  return {rows,all,from,to,bucket};}
function aggregateWeight(mode){
  const {from,to,bucket}=periodBounds(mode);
  const ws=S.profile.weights.filter(x=>{const dt=new Date(x.d);return dt>=from&&dt<=to;});
  if(bucket==="day")return ws.map(x=>({label:new Date(x.d).toLocaleDateString("it-IT",{day:"numeric",month:"short"}),w:x.w,fat:x.fat}));
  const buckets={};
  ws.forEach(x=>{const dstr=iso(new Date(x.d));let k;
    if(bucket==="year")k=dstr.slice(0,4);else if(bucket==="month")k=dstr.slice(0,7);
    else{const dt=new Date(dstr+"T12:00:00");const day=(dt.getDay()+6)%7;dt.setDate(dt.getDate()-day);k=iso(dt);}
    (buckets[k]=buckets[k]||[]).push(x);});
  const keys=Object.keys(buckets).sort();
  return keys.map(k=>{const arr=buckets[k];const n=arr.length;
    const avgw=arr.reduce((a,x)=>a+x.w,0)/n;
    const fats=arr.filter(x=>x.fat!=null);const avgf=fats.length?fats.reduce((a,x)=>a+x.fat,0)/fats.length:null;
    return{label:bucketLabel(k,bucket),w:Math.round(avgw*10)/10,fat:avgf!=null?Math.round(avgf*10)/10:null};});}

      {label:"Carboidrati (g)",data:rows.map(r=>r.c),tension:.3,borderColor:"#C77A15",pointRadius:2},
      {label:"Grassi (g)",data:rows.map(r=>r.f),tension:.3,borderColor:"#2F5FA6",pointRadius:2}]},

window.drawAnalysis=drawAnalysis;
/* 🎯 Grafico proiezione: curva ideale non lineare (dalla prima pesata reale)
   verso l'obiettivo, sovrapposta al peso reale; mostra ETA da oggi e il delta. */
let GOALCH=null;
function drawGoalProjection(){
  const txt=document.getElementById("projText"),cv=document.getElementById("chGoalProj");
  if(!cv)return;
  const p=S.profile;
  if(GOALCH){GOALCH.destroy();GOALCH=null;}
  if(!p.goalW||!p.w){if(txt)txt.textContent="Imposta peso attuale e obiettivo peso in Io per vedere la proiezione.";return;}
  if(window._noChart||typeof Chart==="undefined"){if(txt)txt.textContent="Grafico non disponibile offline (Chart.js si carica da internet).";return;}
  const W=(p.weights||[]).filter(x=>x.w).slice().sort((a,b)=>new Date(a.d)-new Date(b.d));
  const anchorW=W.length?W[0].w:p.w,anchorDate=W.length?new Date(W[0].d):new Date();
  const sim=simulateWeightDescent(anchorW,anchorDate);   // curva ideale dal primo dato reale
  const simNow=simulateWeightDescent(p.w,new Date());     // ETA da adesso
  // Timeline unificata (per giorno) tra pesate reali e punti proiettati
  const realByKey={};W.forEach(x=>{realByKey[iso(new Date(x.d))]=x.w;});
  const projByKey={};if(sim)sim.points.forEach(pt=>{projByKey[iso(pt.d)]=pt.w;});
  const keys=Array.from(new Set([...Object.keys(realByKey),...Object.keys(projByKey)])).sort();
  if(!keys.length){if(txt)txt.textContent="Aggiungi almeno una pesata per vedere la proiezione.";return;}
  const labels=keys.map(k=>new Date(k+"T12:00:00").toLocaleDateString("it-IT",{day:"numeric",month:"short",year:"2-digit"}));
  const realData=keys.map(k=>realByKey[k]!=null?realByKey[k]:null);
  const projData=keys.map(k=>projByKey[k]!=null?projByKey[k]:null);
  const goalData=keys.map(()=>p.goalW);
  // Media mobile a 7 giorni del peso reale (smussa le oscillazioni di acqua/glicogeno)
  const mavgByKey={};W.forEach(x=>{const dt=new Date(x.d).getTime();
    const win=W.filter(y=>{const t=new Date(y.d).getTime();return t<=dt&&t>=dt-7*864e5;});
    mavgByKey[iso(new Date(x.d))]=Math.round(win.reduce((a,y)=>a+y.w,0)/win.length*10)/10;});
  const mavgData=keys.map(k=>mavgByKey[k]!=null?mavgByKey[k]:null);
  GOALCH=new Chart(cv,{type:"line",
    data:{labels,datasets:[
      {label:"Proiezione ideale",data:projData,borderColor:"#2F5FA6",borderDash:[6,4],pointRadius:0,tension:.25,spanGaps:true},
      {label:"Peso reale",data:realData,borderColor:"#9CC3A6",backgroundColor:"#9CC3A6",pointRadius:2,tension:.2,spanGaps:true},
      {label:"Media 7 gg",data:mavgData,borderColor:"#2F7D3B",borderWidth:2,pointRadius:0,tension:.3,spanGaps:true},
      {label:"Obiettivo",data:goalData,borderColor:"#C77A15",borderDash:[3,3],pointRadius:0}
    ]},
    options:{plugins:{legend:{labels:{boxWidth:11,font:{size:10}}}},
      scales:{x:{ticks:{font:{size:9},maxTicksLimit:8}},y:{ticks:{font:{size:9}}}}}});
  if(txt){const parts=[];
    if(simNow){if(simNow.stalled)parts.push("Con dieta e obiettivi attuali il deficit si annulla prima di "+p.goalW+" kg: servirebbe mangiare meno o muoversi di più.");
      else parts.push("Stima: <b>"+p.goalW+" kg</b> intorno al <b>"+simNow.etaDate.toLocaleDateString("it-IT",{day:"numeric",month:"long",year:"numeric"})+"</b> (~"+simNow.etaDays+" giorni), ritmo non lineare.");}
    else parts.push("Sei già all'obiettivo o sotto: nessuna discesa da proiettare.");
    // Delta reale-vs-ideale + tendenza (il divario si allarga o si chiude?)
    let worsening=false;
    if(W.length){const last=W[W.length-1],proj=projectedWeightAt(last.d);
      if(proj!=null){const delta=Math.round((last.w-proj)*10)/10;
        const deltas=W.map(x=>{const pr=projectedWeightAt(x.d);return pr!=null?(x.w-pr):null;}).filter(v=>v!=null);
        let trend="";
        if(deltas.length>=3){const r3=deltas.slice(-3),diff=r3[r3.length-1]-r3[0];
          if(diff>0.3){trend=" — divario in <b>aumento</b> ⚠️";worsening=true;}
          else if(diff<-0.3)trend=" — divario in <b>diminuzione</b> ✅";
          else trend=" — divario <b>stabile</b>";}
        parts.push("Delta: reale "+last.w+" kg vs ideale "+proj+" kg → "+(delta<=0?("<b>"+Math.abs(delta)+" kg in anticipo</b>"):("<b>"+delta+" kg in ritardo</b>"))+trend+".");}}
    if(worsening)parts.push("Il divario peggiora da qualche pesata: conviene chiedere all'AI un'analisi qui sotto per capire cosa aggiustare.");
    txt.innerHTML=parts.join(" ");}}
window.drawGoalProjection=drawGoalProjection;
/* 🔎 #1 — Correlazioni: cosa fa andare meglio/peggio deficit e sgarri.
   Confronta gruppi di giorni (sonno alto/basso, con/senza allenamento, umore
   alto/basso), escludendo i giorni difficili e quelli senza pasti registrati. */
function computeCorrelations(){
  const days=flattenDiet().filter(d=>!d.hard&&(d.eat||0)>0);
  if(days.length<6)return {enough:false,n:days.length};
  const mean=arr=>arr.length?Math.round(arr.reduce((a,x)=>a+x,0)/arr.length):null;
  const goodSleep=days.filter(d=>d.sleep>=4),badSleep=days.filter(d=>d.sleep&&d.sleep<=2);
  const wDays=days.filter(d=>(d.burn||0)>150),rDays=days.filter(d=>(d.burn||0)<=150);
  const goodMood=days.filter(d=>d.feel>=4),badMood=days.filter(d=>d.feel&&d.feel<=2);
  return {enough:true,n:days.length,
    sonno:{n_alto:goodSleep.length,n_basso:badSleep.length,alto_def:mean(goodSleep.map(d=>d.def)),basso_def:mean(badSleep.map(d=>d.def)),alto_sgarri:mean(goodSleep.map(d=>d.sgarri)),basso_sgarri:mean(badSleep.map(d=>d.sgarri))},
    allenamento:{n_con:wDays.length,n_senza:rDays.length,con_def:mean(wDays.map(d=>d.def)),senza_def:mean(rDays.map(d=>d.def)),con_sgarri:mean(wDays.map(d=>d.sgarri)),senza_sgarri:mean(rDays.map(d=>d.sgarri))},
    umore:{n_alto:goodMood.length,n_basso:badMood.length,alto_def:mean(goodMood.map(d=>d.def)),basso_def:mean(badMood.map(d=>d.def)),alto_sgarri:mean(goodMood.map(d=>d.sgarri)),basso_sgarri:mean(badMood.map(d=>d.sgarri))}};}
function correlationsSummaryHtml(){
  const c=computeCorrelations();
  if(!c.enough)return `<div class="hint">Servono almeno ~6 giorni con pasti registrati (esclusi i difficili) per calcolare i pattern: ne hai ${c.n}.</div>`;

/* ── 💬 Chiedi all'AI: contesto con dieta PIANIFICATA vs dati REALI ── */
/* Riepilogo della dieta pianificata (cosa mangeresti seguendo il piano): media
   sui 7 giorni del piano. Serve per le proiezioni quando i pasti reali non sono
   ancora stati registrati (altrimenti i giorni "vuoti" darebbero deficit ~ TDEE). */
function plannedDietSummary(){
  let pk=0,pp=0,pc=0,pf=0;for(let di=0;di<7;di++){const o=plannedTemplateOfDay(di);pk+=o.k;pp+=o.p;pc+=(o.c||0);pf+=(o.f||0);}
  return {kcal_giorno:Math.round(pk/7),proteine_g:Math.round(pp/7),carboidrati_g:Math.round(pc/7),grassi_g:Math.round(pf/7)};}
/* Sport + passi: MEDIA GIORNALIERA vera sul periodo tracciato (i giorni di
   riposo contano come 0), NON il valore grezzo di un singolo giorno — che
   gonfierebbe il deficit. Riporta anche quanti giorni compongono la media, così
   l'AI sa se il campione è affidabile (con 1-2 giorni lo sport è occasionale). */
function activityDailyAvg(recent){
  const nDays=recent.length;
  const totBurn=recent.reduce((a,x)=>a+(x.burn||0),0);
  const activeDays=recent.filter(x=>(x.burn||0)>0).length;
  return {giorni_considerati:nDays,giorni_con_attivita:activeDays,
    media_giornaliera_kcal:nDays?Math.round(totBurn/nDays):0,campione_sufficiente:nDays>=7};}
function buildDiaryContext(){
  const all=flattenDiet();
  const recentAll=all.slice(-30);
  const hardCount=recentAll.filter(d=>d.hard).length;
  const recent=recentAll.filter(d=>!d.hard); // le giornate difficili non sporcano le medie
  const avgOf=(arr,f)=>arr.length?Math.round(arr.reduce((a,x)=>a+(x[f]||0),0)/arr.length):0;
  // REALE: solo i giorni in cui i pasti sono stati davvero registrati (eat>0).
  // I giorni senza pasti segnati mostrerebbero deficit ~ TDEE e falserebbero tutto.
  const withMeals=recent.filter(d=>(d.eat||0)>0);
  const TDEE=tdee();
  const plan=plannedDietSummary();
  // Deficit da DIETA (parte affidabile): TDEE − intake pianificato (senza sport).
  const deficitDieta=TDEE-plan.kcal_giorno;
  // Sport/passi come MEDIA GIORNALIERA (non il dato puro di oggi).
  const act=activityDailyAvg(recent);
  const sportAvg=act.media_giornaliera_kcal;
  // Nel deficit teorico lo sport si aggiunge SOLO se il campione è sufficiente,
  // altrimenti col dato di 1-2 giorni sballerebbe la stima.
  const deficitTeorico=deficitDieta+(act.campione_sufficiente?sportAvg:0);
  const realDeficit=withMeals.length?avgOf(withMeals,"def"):null;
  const workoutsCount={};recent.forEach(d=>(d.workouts||[]).forEach(w=>{const s=String(w).split(" ")[0];if(s)workoutsCount[s]=(workoutsCount[s]||0)+1;}));
  // Ritmo peso osservato (kg/settimana) dallo storico pesate, se abbastanza dati
  let rateKgWeek=null;const W=(S.profile.weights||[]).filter(x=>x.w).slice(-10);
  if(W.length>=2){const days=(new Date(W[W.length-1].d)-new Date(W[0].d))/864e5;if(days>=5)rateKgWeek=Math.round((W[W.length-1].w-W[0].w)/days*7*100)/100;}
  const kgToGoal=(S.profile.goalW&&S.profile.w)?Math.round((S.profile.w-S.profile.goalW)*10)/10:null;
  return {
    obiettivo_peso_kg:S.profile.goalW||null,
    peso_attuale_kg:S.profile.w||null,
    kg_da_perdere:kgToGoal,
    tdee_kcal:TDEE,
    dieta_pianificata:{kcal_giorno:plan.kcal_giorno,proteine_g:plan.proteine_g,carboidrati_g:plan.carboidrati_g,grassi_g:plan.grassi_g,
      deficit_dieta_giorno:deficitDieta,
      sport_passi_media_giornaliera_kcal:sportAvg,
      giorni_considerati_per_sport:act.giorni_considerati,giorni_con_attivita:act.giorni_con_attivita,campione_sport_sufficiente:act.campione_sufficiente,
      deficit_teorico_giorno:deficitTeorico,
      spiegazione:"Deficit da dieta = TDEE("+TDEE+") − intake("+plan.kcal_giorno+") = "+deficitDieta+" kcal/giorno. Sport+passi vanno aggiunti come MEDIA GIORNALIERA ("+sportAvg+" kcal su "+act.giorni_considerati+" giorni, riposo incluso), non col valore di un singolo giorno; con pochi giorni consideralo occasionale. Deficit teorico = "+deficitTeorico+" kcal/giorno."},
    dati_reali:{giorni_con_pasti_registrati:withMeals.length,
      kcal_medie:withMeals.length?avgOf(withMeals,"eat"):null,
      proteine_medie_g:withMeals.length?avgOf(withMeals,"prot"):null,
      carboidrati_medi_g:withMeals.length?avgOf(withMeals,"c"):null,
      grassi_medi_g:withMeals.length?avgOf(withMeals,"f"):null,
      deficit_medio_reale_kcal:realDeficit,
      ritmo_peso_kg_settimana:rateKgWeek,
      giornate_difficili_escluse:hardCount},
    sonno_medio:avgOf(recent,"sleep")||null,relax_medio:avgOf(recent,"relax")||null,umore_medio:avgOf(recent,"feel")||null,
    allenamenti_per_tipo:workoutsCount,
    obiettivi:{passi_giorno:S.profile.goalSteps||null,
      allenamenti_settimana:(S.profile.goalWorkoutList||[]).map(g=>({sport:g.sport,volte_settimana:g.perWeek,minuti:g.min})),
      dispendio_extra_medio_giornaliero_kcal:plannedActivityBurnFor(S.profile.w||70)},
    proiezione:(()=>{const s=simulateWeightDescent(S.profile.w,new Date());if(!s)return null;
      const Wt=(S.profile.weights||[]).filter(x=>x.w).slice().sort((a,b)=>new Date(a.d)-new Date(b.d));
      let delta=null,ideale=null;if(Wt.length){const last=Wt[Wt.length-1];ideale=projectedWeightAt(last.d);if(ideale!=null)delta=Math.round((last.w-ideale)*10)/10;}
      return {data_stimata:s.stalled?null:iso(s.etaDate),giorni_stimati:s.stalled?null:s.etaDays,deficit_iniziale_giorno:s.dailyDeficitStart,stallo:s.stalled,
        peso_reale_ultimo:Wt.length?Wt[Wt.length-1].w:null,peso_ideale_stessa_data:ideale,delta_kg_vs_ideale:delta,
        nota_delta:"delta>0 = sei indietro rispetto al piano; delta<0 = sei in anticipo"};})(),
    resoconti_settimanali:S.history.slice(-4).map(w=>({periodo:new Date(w.from).toLocaleDateString("it-IT")+"→"+new Date(w.to).toLocaleDateString("it-IT"),kcal_medie:w.avgEat,deficit_medio:w.avgDef,peso:w.weight}))
  };}

/* Composizione in kg derivata da peso + percentuali. Il "resto" della massa
   magra non è "liquidi": è acqua extra-muscolare, ossa e organi. */
function compLine(p){const fat=parseFloat(p.fatp),mus=parseFloat(p.musp);
  if(!(fat>0))return "";
  const gK=(p.w*fat/100),lbmK=p.w-gK;
  let s="La tua composizione: <b>magra "+lbmK.toFixed(1)+" kg</b> · <b>grasso "+gK.toFixed(1)+" kg</b>";
  if(mus>0){const mK=p.w*mus/100,rest=lbmK-mK;
    s+=" — della magra: muscolo "+mK.toFixed(1)+" kg, il resto ("+rest.toFixed(1)+" kg) è acqua extra-muscolare, ossa e organi";}
  return `<div class="hint" style="margin:2px 0 6px">${s}. I calcoli (Katch-McArdle) usano la magra derivata dalla % di grasso.</div>`;}
/* Proiezione verso l'obiettivo: regressione lineare sulle ultime pesate */
function goalProj(){const p=S.profile,ws=p.weights.slice(-8);
  if(!p.goalW||ws.length<2)return "";
  const t0=new Date(ws[0].d).getTime(),days=(new Date(ws[ws.length-1].d).getTime()-t0)/864e5;
  if(days<5)return "";
  const xs=ws.map(x=>(new Date(x.d).getTime()-t0)/864e5),ys=ws.map(x=>x.w);
  const n=xs.length,mx=xs.reduce((a,b)=>a+b)/n,my=ys.reduce((a,b)=>a+b)/n;
  let num=0,den=0;xs.forEach((x,i)=>{num+=(x-mx)*(ys[i]-my);den+=(x-mx)**2;});
  const slope=den?num/den:0; // kg/giorno
  if(slope>=-0.005)return "Il peso al momento non sta scendendo: la proiezione verso l'obiettivo apparirà quando ci sarà un trend in discesa.";
  if(ys[ys.length-1]<=p.goalW)return "🎉 Obiettivo raggiunto!";
  const dLeft=(ys[ys.length-1]-p.goalW)/(-slope);
  const eta=new Date(Date.now()+dLeft*864e5);
  return "Al ritmo attuale (~"+(slope*7).toFixed(1).replace("-","−")+" kg/settimana) dovresti raggiungere <b>"+p.goalW+" kg</b> intorno al <b>"+eta.toLocaleDateString("it-IT",{day:"numeric",month:"long",year:"numeric"})+"</b>. Stima indicativa: il ritmo rallenta man mano che scendi.";}

  if(b<30)return{ok:true,label:"sovrappeso",msg:"Ancora sopra la fascia normopeso: obiettivo sensato."};

/* ═══════════════════════════════════════════════════════════════
   16. GOOGLE DRIVE SYNC (GSI + Drive REST, scope drive.appdata)
       Funziona solo da origine http/https registrata nel progetto.
   ═══════════════════════════════════════════════════════════════ */
let DTOKEN=null,tokenClient=null,driveReauthed=false;
/* Cache del token d'accesso Drive: dopo il primo consenso, entro la sua durata
   (~1h) l'app riusa il token salvato senza chiedere di nuovo l'accesso, anche
   dopo un riavvio. Alla scadenza si rinnova in silenzio. */
const DTOK_KEY="diario_dtoken";
// Questo dispositivo ha già completato una sincronizzazione con Drive? Serve a
// distinguere il PRIMO collegamento di un nuovo dispositivo (dove non bisogna
// mai spingere un profilo vuoto sopra un backup con dati veri di un altro
// dispositivo) dalle sincronizzazioni successive (dove basta confrontare i
// timestamp di contenuto).
const SYNCED_ONCE_KEY="diario_synced_once";
function hasRealLocalContent(){
  return !!(S.profile&&S.profile.dob) || (S.history&&S.history.length>0) || (S.profile&&S.profile.weights&&S.profile.weights.length>0);
}
function driveSaveToken(t){try{if(t&&t.access_token){DTOKEN=t.access_token;
  const exp=Date.now()+(((+t.expires_in||3600)-90)*1000);
  localStorage.setItem(DTOK_KEY,JSON.stringify({tok:t.access_token,exp}));}}catch(e){}}
function driveCachedToken(){try{const c=JSON.parse(localStorage.getItem(DTOK_KEY)||"null");
  if(c&&c.tok&&c.exp&&Date.now()<c.exp)return c.tok;}catch(e){}return null;}
function driveClearToken(){DTOKEN=null;try{localStorage.removeItem(DTOK_KEY);}catch(e){}}
/* Riacquisizione silenziosa del token (nessun popup se la sessione Google è
   attiva e il consenso è già stato dato in passato su questo dispositivo). */
function driveSilentAuth(){
  loadGSI(()=>{try{
    tokenClient=google.accounts.oauth2.initTokenClient({client_id:S.drive.cid,
      scope:"https://www.googleapis.com/auth/drive.appdata",
      callback:async t=>{if(t&&t.access_token){driveSaveToken(t);await driveSyncOnStart();
        const st=document.getElementById("driveStatus");if(st)st.textContent="✅ Sincronizzato con Drive.";}},
      error_callback:()=>{}});
    tokenClient.requestAccessToken({prompt:""});
  }catch(e){}});}
function loadGSI(cb){if(window.google&&google.accounts)return cb();
  const s=document.createElement("script");s.src="https://accounts.google.com/gsi/client";
  s.onload=cb;s.onerror=()=>alert("Impossibile caricare Google Identity (offline?).");document.head.appendChild(s);}

  loadGSI(()=>{

      scope:"https://www.googleapis.com/auth/drive.appdata",

        document.getElementById("driveStatus").textContent="✅ Connesso. Sincronizzo…";
        await driveSyncOnStart();render("io");}});
    tokenClient.requestAccessToken();});};
async function driveFind(){
  const r=await fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%27diario_backup.json%27&fields=files(id,modifiedTime)",
    {headers:{Authorization:"Bearer "+DTOKEN}});

  const j=await r.json();return (j.files&&j.files[0])||null;}
window.driveUpload=async()=>{
  if(!DTOKEN)return alert("Connettiti prima a Drive.");
  try{const f=await driveFind();
    const meta={name:"diario_backup.json",parents:f?undefined:["appDataFolder"]};
    const boundary="-------diario";const body=
      "--"+boundary+"\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n"+JSON.stringify(meta)+
      "\r\n--"+boundary+"\r\nContent-Type: application/json\r\n\r\n"+JSON.stringify(S)+"\r\n--"+boundary+"--";
    const url="https://www.googleapis.com/upload/drive/v3/files"+(f?"/"+f.id:"")+"?uploadType=multipart";
    await fetch(url,{method:f?"PATCH":"POST",
      headers:{Authorization:"Bearer "+DTOKEN,"Content-Type":"multipart/related; boundary="+boundary},body});
    const st=document.getElementById("driveStatus");if(st)st.textContent="✅ Salvato su Drive alle "+new Date().toLocaleTimeString("it-IT");
    try{localStorage.setItem(SYNCED_ONCE_KEY,"1");}catch(e2){}
  }catch(e){alert("Errore Drive: "+e.message);}};
/* Avvio: riconnessione silenziosa se già autorizzato su questo dispositivo.
   1) se ho un token valido in cache lo riuso senza contattare Google (nessun
      popup, nessun "accesso a Drive"); 2) altrimenti provo il rinnovo silenzioso. */
function tryDriveAuto(){
  if(!(S.drive.on&&S.drive.cid)||location.protocol==="file:")return;
  const cached=driveCachedToken();
  if(cached){DTOKEN=cached;
    driveSyncOnStart().then(()=>{const st=document.getElementById("driveStatus");if(st)st.textContent="✅ Sincronizzato con Drive.";}).catch(()=>{});
    return;}
  driveSilentAuth();}

window.driveImport=async()=>{
  if(!DTOKEN)return alert("Connettiti prima a Drive.");

    if(!f)return alert("Nessun backup trovato su Drive.");
    if(!confirm("Importo il backup da Drive del "+new Date(f.modifiedTime).toLocaleString("it-IT")+"? Sovrascrive i dati locali."))return;
    const r=await fetch("https://www.googleapis.com/drive/v3/files/"+f.id+"?alt=media",{headers:{Authorization:"Bearer "+DTOKEN}});
    S=await r.json();localStorage.setItem(KEY,JSON.stringify(S));try{localStorage.setItem(SYNCED_ONCE_KEY,"1");}catch(e2){}location.reload();
  }catch(e){alert("Errore importazione: "+e.message);}};
/* Import allenamenti da Tapis. Due strade, perché le app possono NON avere lo
   stesso CLIENT_ID (in tal caso non condividono la cartella dati privata su
   Drive e non possono leggersi a vicenda):
   1) da Drive: funziona solo se stesso account E stesso CLIENT_ID;
   2) da file .json: funziona SEMPRE (esporta il backup da Tapis → Io → "Esporta
      backup", poi qui scegli il file). È la via giusta con due client diversi.
   In entrambi i casi si sceglie da quale data importare; gli allenamenti del
   periodo scelto vengono aggiunti alla settimana corrente e, per le date più
   vecchie, salvati a parte (S.tapisWorkouts) così contano anche nello storico e
   nelle analisi, senza toccare i riepiloghi settimanali già salvati. */
function applyTapisImport(tapis){
  const hist=(tapis&&tapis.history)||[];
  if(!hist.length){alert("Nessun allenamento trovato nel backup di Tapis.");return;}
  const dates=hist.map(s=>new Date(s.dateISO||s.date||0)).filter(d=>!isNaN(d.getTime())).sort((a,b)=>a-b);
  const earliest=dates.length?iso(dates[0]):iso(new Date());
  const ds=prompt("Trovati "+hist.length+" allenamenti in Tapis.\nImportare a partire da quale data? (AAAA-MM-GG)\n\nIl più vecchio è del "+earliest+". Lascia questa data per prenderli tutti.",earliest);
  if(ds==null)return;
  const from=new Date((ds||earliest)+"T00:00:00");
  const wkStart=new Date(S.week.started+"T12:00:00");
  S.tapisWorkouts=S.tapisWorkouts||{};
  let added=0,archived=0;
  hist.forEach(s=>{
    const dt=new Date(s.dateISO||s.date||0);if(isNaN(dt.getTime()))return;
    if(dt<from)return;
    const min=Math.max(1,Math.round((+s.durationSec||0)/60));
    const spd=+s.avgSpeed||0;
    const sport=spd>=7?"Corsa":"Camminata";
    const int=spd>=9?"alta":spd>=6?"media":"bassa";
    const key=iso(dt);
    const dayIdx=Math.round((new Date(key+"T12:00:00")-wkStart)/864e5);
    if(dayIdx>=0&&dayIdx<=6){ // settimana corrente → nel diario, così si vede in Sport/Oggi
      if(S.week.days[dayIdx].workouts.some(w=>w._tapis&&w.sport===sport&&w.min===min))return;
      S.week.days[dayIdx].workouts.push({sport,min,int,_tapis:true});added++;
    }else{ // date più vecchie → archivio Tapis (contano in analisi/storico)
      const arr=S.tapisWorkouts[key]=S.tapisWorkouts[key]||[];
      if(arr.some(w=>w.sport===sport&&w.min===min))return;
      arr.push({sport,min,int});archived++;
    }});
  save();render(cur);
  alert("Import da Tapis completato: "+added+" nella settimana corrente"+(archived?(" · "+archived+" nello storico"):"")+".");}
window.importTapisWorkouts=async()=>{

    if(r.status===401){driveClearToken();return alert("Sessione Drive scaduta: riconnettiti e riprova.");}
    const j=await r.json();f=j.files&&j.files[0];}catch(e){return alert("Errore Drive: "+e.message);}
  if(!f)return alert("Non trovo i dati di Tapis nella cartella Drive condivisa.\n\nSuccede quando Tapis e Nutri usano CLIENT_ID diversi: in quel caso le due cartelle dati sono separate. Usa invece \"Importa da file Tapis\": esporta il backup da Tapis (Io → Esporta backup) e caricalo qui.");

window.driveDelete=async(silent)=>{

async function driveSyncOnStart(){ // confronta i timestamp DI CONTENUTO e allinea in silenzio
  try{const f=await driveFind();if(!f){try{localStorage.setItem(SYNCED_ONCE_KEY,"1");}catch(e2){}return driveUpload();}
    // Scarico il contenuto e confronto remote.meta.updated con S.meta.updated:
    // sono entrambi scritti dallo stesso save(), quindi sullo STESSO dispositivo
    // combaciano (niente più falso avviso "versione più recente" a ogni avvio).
    // Non uso f.modifiedTime (ora del file sul server), che è sempre leggermente
    // successiva al contenuto e faceva scattare l'avviso ogni volta.
    const r=await fetch("https://www.googleapis.com/drive/v3/files/"+f.id+"?alt=media",{headers:{Authorization:"Bearer "+DTOKEN}});
    if(r.status===401){driveClearToken();throw new Error("auth");}
    const remote=await r.json();
    const rT=new Date((remote&&remote.meta&&remote.meta.updated)||0).getTime();
    const lT=new Date((S&&S.meta&&S.meta.updated)||0).getTime();
    const firstSyncOnThisDevice=!localStorage.getItem(SYNCED_ONCE_KEY);

    if(firstSyncOnThisDevice){
      // Primo collegamento di QUESTO dispositivo: un dispositivo appena aperto
      // non ha un timestamp di contenuto significativo (è solo il momento in
      // cui il profilo vuoto è stato creato), quindi non va MAI usato per
      // decidere di sovrascrivere un backup che può contenere i dati veri di
      // un altro dispositivo — è esattamente il bug che impediva la
      // sincronizzazione tra telefono e tablet. Se qui non c'è nulla di
      // reale, adottiamo sempre il backup in silenzio; se invece questo
      // dispositivo ha già dati suoi mai sincronizzati, chiediamo una sola volta.
      if(!hasRealLocalContent()){
        S=remote;localStorage.setItem(KEY,JSON.stringify(S));
        try{localStorage.setItem(SYNCED_ONCE_KEY,"1");}catch(e2){}
        location.reload();return;
      }
      const useRemote=confirm("Questo dispositivo non si è mai sincronizzato con Drive. È già presente un backup del "+
        new Date(remote.meta&&remote.meta.updated||f.modifiedTime).toLocaleString("it-IT")+

      try{localStorage.setItem(SYNCED_ONCE_KEY,"1");}catch(e2){}
      if(useRemote){S=remote;localStorage.setItem(KEY,JSON.stringify(S));location.reload();}
      else{await driveUpload();}
      return;
    }

    if(rT>lT+2000){ // il remoto è davvero più recente (modifica da un altro dispositivo): lo adotto in silenzio
      S=remote;localStorage.setItem(KEY,JSON.stringify(S));location.reload();

  }catch(e){ if(String(e&&e.message)==="auth"&&!driveReauthed){driveReauthed=true;driveSilentAuth();} }}

function renderHeader(){
  document.getElementById("hTitle").textContent="Nutri"+(S.ui.vacanza?" 🏖️":"");
  const d=document.getElementById("hDate");
  d.innerHTML=fmtDate(VIEW)+(isToday()?"":"<small>tocca per tornare a oggi</small>");
  document.getElementById("hStreak").textContent="🔥 "+S.streak.count;}
/* Banner (non popup) per gli allenamenti di ieri dimenticati */
function yIdx(){const y=new Date();y.setDate(y.getDate()-1);return wd(y);}
function unmarkedOfDay(di){return dayItems(di).filter(it=>{const st=S.week.days[it.pdi].meals[it.mi];return !st.done&&!st.skip;}).length;}
function dayCompleted(di){return dayItems(di).length>0&&unmarkedOfDay(di)===0;}
function needMorningBanner(){
  if(S.ui.vacanza)return false;
  if(S.ui.dismissMorning===iso(new Date()))return false;
  const Y=S.week.days[yIdx()];return unmarkedOfDay(yIdx())>0||Y.workouts.length===0||!Y.steps;}
/* Settimana "scaduta": è iniziata prima del lunedì corrente e va convalidata */
function weekStale(){const m=new Date();m.setHours(12,0,0,0);m.setDate(m.getDate()-wd(m));return S.week.started<iso(m);}
function needWeekBanner(){return weekStale()&&S.ui.dismissWeek!==iso(new Date());}

      '<button id="install-no" aria-label="Chiudi" style="background:transparent;color:#d6e6da;border:0;font-size:18px;cursor:pointer;padding:4px 6px">✕</button>';
    document.body.appendChild(b);
    document.getElementById("install-no").onclick=()=>{try{localStorage.setItem(KEY_DISMISS,String(Date.now()));}catch(e){}b.remove();};
    document.getElementById("install-yes").onclick=async()=>{
      if(deferredPrompt){b.remove();deferredPrompt.prompt();try{await deferredPrompt.userChoice;}catch(e){}deferredPrompt=null;}
      else{alert('Per installare: apri il menu del browser (⋮) e scegli "Installa app" oppure "Aggiungi a schermata Home".');}
    };
  }
  window.addEventListener("beforeinstallprompt",function(e){
    e.preventDefault();deferredPrompt=e;
    let dis=0;try{dis=+localStorage.getItem(KEY_DISMISS)||0;}catch(e2){}
    if(Date.now()-dis>7*24*3600*1000)showBanner();
  });
  window.addEventListener("appinstalled",function(){const b=document.getElementById("install-banner");if(b)b.remove();deferredPrompt=null;try{localStorage.removeItem(KEY_DISMISS);}catch(e){}});
})();
applyTheme();bumpStreak();renderHeader();tryDriveAuto();
show(S.profile.dob?"oggi":"io");
</script>
</body>
</html>
