<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js" integrity="sha384-c9d8RFSL+u3exBOJ4Yp3HUJXS4znl9f+z66d1y54ig+ea249SpqR+w1wyvXz/lk+" crossorigin="anonymous" defer onerror="window._noScan=1"></script>

<style>
/* ══════════════════════════════════════════════════════════════
   NUTRY UI 2.0 — design system moderno
   Glass cards, gradienti animati, micro-interazioni, reveal on
   scroll, dock di navigazione flottante, zoom sui grafici.
   Tutti i selettori originali sono preservati.
   ══════════════════════════════════════════════════════════════ */
:root{
  --bosco:#0E5132; --salvia:#16A34A; --menta:#E9F9EE; --crema:#F2F6F1; --card:#FFFFFF;
  --ink:#152218; --grigio:#5F7263; --linea:#DEEAE0;
  --zaff:#EA8A1F; --zaffbg:#FFF4E3; --mensa:#2563EB; --mensabg:#EAF1FE;
  --rosso:#DC4444; --rossobg:#FDECEC; --ok:#16A34A; --okbg:#E9F9EE;
  --grad:linear-gradient(135deg,#16A34A,#0E5132);
  --gradz:linear-gradient(135deg,#F5B142,#EA8A1F);
  --gradm:linear-gradient(135deg,#4F8DF7,#2563EB);
  --glass:rgba(255,255,255,.72);
  --shadow:0 1px 2px rgba(14,60,30,.05),0 8px 24px -6px rgba(14,60,30,.10);
  --shadow-lift:0 2px 4px rgba(14,60,30,.06),0 18px 44px -10px rgba(14,60,30,.18);
  --hdr1:#0A3B22; --hdr2:#16A34A; --hdr3:#0E7A57;
  --r-lg:20px; --r-md:14px; --r-sm:10px;
  --ease:cubic-bezier(.22,1,.36,1);
}
html[data-theme="dark"]{
  --bosco:#8FE3A8; --salvia:#3ECF6E; --menta:#12301C; --crema:#0B120D; --card:#131E15;
  --ink:#E8F3E9; --grigio:#93A896; --linea:#243527;
  --zaff:#F2A94F; --zaffbg:#2C2110; --mensa:#7FA9F2; --mensabg:#131E31;
  --rosso:#EF8B8B; --rossobg:#2F1717; --ok:#3ECF6E; --okbg:#12301C;
  --glass:rgba(19,30,21,.72);
  --shadow:0 1px 2px rgba(0,0,0,.5),0 10px 28px -6px rgba(0,0,0,.45);
  --shadow-lift:0 2px 4px rgba(0,0,0,.5),0 20px 48px -10px rgba(0,0,0,.6);
  --hdr1:#071F12; --hdr2:#1C7A3E; --hdr3:#0D4A34;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--crema);color:var(--ink);font-size:15px;padding-bottom:96px;transition:background .3s,color .3s;position:relative;min-height:100vh}
/* sfondo vivo: blob sfocati che fluttuano lentissimi */
/* v5.1: nessun blob animato/sfocato in sfondo (batteria) */
body::before,body::after{display:none!important}


h1,h2,.dayname,.ringnum{font-family:'Fraunces',Georgia,'Noto Serif',serif}
::selection{background:var(--salvia);color:#fff}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--linea);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:var(--grigio)}
/* ══ HEADER: aurora animata + shrink allo scroll ══ */
header{background:linear-gradient(115deg,var(--hdr1),var(--hdr2),var(--hdr3),var(--hdr1));background-size:320% 320%;color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:50;box-shadow:0 6px 24px -8px rgba(4,26,12,.55);transition:padding .3s var(--ease)}
header.scrolled{padding:8px 16px 7px}

.hrow{display:flex;align-items:center;justify-content:space-between;gap:8px}
header h1{font-size:18px;font-weight:700;letter-spacing:.2px}
.logo-badge{display:inline-flex;align-items:center;gap:8px;color:#fff;font-weight:900;font-size:20px;letter-spacing:-.4px;line-height:1.15);transition:transform .25s var(--ease)}
.logo-badge:hover{transform:rotate(-2deg) scale(1.05)}
.hbtns{display:flex;gap:6px;align-items:center}
.hbtn{border:0;background:rgba(255,255,255,.16);color:#fff;border-radius:11px;padding:7px 10px;font-size:15px;cursor:pointer;transition:background .2s,transform .15s var(--ease)}
.hbtn:hover{background:rgba(255,255,255,.28);transform:translateY(-1px)}
.hbtn:active{transform:scale(.92)}
.streak{background:rgba(255,255,255,.16);border-radius:11px;padding:7px 10px;font-size:13px;font-weight:700}

/* ══ Scorrimento date ══ */
.datebar{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:9px}
.datebar button{border:0;background:rgba(255,255,255,.18);color:#fff;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;transition:transform .18s var(--ease),background .2s}
.datebar button:hover{background:rgba(255,255,255,.32);transform:scale(1.12)}
.datebar button:active{transform:scale(.88)}
.datebar .dt{font-size:13px;text-transform:capitalize;min-width:190px;text-align:center;cursor:pointer;transition:opacity .2s}
.datebar .dt:hover{opacity:.85}
.datebar .dt small{display:block;font-size:10px;opacity:.8}
/* ══ PAGINE: transizione slide+fade ══ */
.page{display:none;padding:16px;max-width:640px;margin:0 auto}
.page.active{display:block}

/* reveal on scroll (attivato da JS: body.fx) */
/* ══ NAV: dock flottante in vetro ══ */
.tabs{position:fixed;bottom:10px;left:6px;right:6px;background:var(--card);border:1px solid var(--linea);display:flex;z-index:60;padding:6px;border-radius:24px;box-shadow:var(--shadow-lift);margin-bottom:env(safe-area-inset-bottom)}
.tabs button{flex:1;min-width:0;border:0;background:none;padding:8px 1px 6px;font-size:9.6px;letter-spacing:-.01em;white-space:nowrap;color:var(--grigio);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-radius:18px;transition:background .25s,color .25s,transform .2s var(--ease);position:relative}
.tabs button .ic{font-size:20px;line-height:1;transition:transform .3s var(--ease)}
.tabs button:hover .ic{transform:translateY(-2px)}
.tabs button:active{transform:scale(.93)}
.tabs button.on{color:#fff;font-weight:700;background:var(--grad);box-shadow:0 6px 16px -4px rgba(22,163,74,.55)}

/* ══ CARD: vetro + lift al hover ══ */
.card{background:var(--card);border:1px solid var(--linea);border-radius:var(--r-lg);padding:16px;margin-bottom:14px;box-shadow:var(--shadow);transition:transform .3s var(--ease),box-shadow .3s var(--ease)}

.card h2{font-size:16.5px;color:var(--bosco);margin-bottom:10px;letter-spacing:.1px}
.dayname{font-size:23px;color:var(--bosco);margin:24px 0 2px;display:flex;align-items:center;gap:9px}
.dayctx{font-size:12px;color:var(--grigio);font-style:italic;margin-bottom:10px}
/* ══ PASTI ══ */
.meal{background:var(--card);border:1px solid var(--linea);border-left:4px solid var(--salvia);border-radius:16px;padding:13px 14px;margin-bottom:11px;display:flex;gap:12px;align-items:flex-start;box-shadow:var(--shadow);transition:transform .3s var(--ease),box-shadow .3s var(--ease),opacity .4s}

.meal.free{border-left-color:var(--zaff);background:linear-gradient(135deg,var(--zaffbg),var(--card))}
.meal.mensa{border-left-color:var(--mensa);background:linear-gradient(135deg,var(--mensabg),var(--card))}
.meal.done{opacity:.55;filter:saturate(.7)}.meal.done .mdesc{text-decoration:line-through}
.meal.skip{opacity:.55;border-left-color:var(--rosso)}
.meal.skip .mdesc{text-decoration:line-through;color:var(--rosso)}
.chk{min-width:30px;height:30px;margin-top:1px;border:2px solid var(--salvia);border-radius:50%;background:var(--card);cursor:pointer;font-size:15px;line-height:26px;text-align:center;color:#fff;transition:transform .2s var(--ease),background .25s,box-shadow .25s}
.chk:hover{transform:scale(1.1)}
.chk:active{transform:scale(.82)}
.meal.free .chk{border-color:var(--zaff)}
.chk.c{background:var(--salvia);border-color:var(--salvia);box-shadow:0 0 0 5px color-mix(in srgb,var(--salvia) 18%,transparent)}
.meal.free .chk.c{background:var(--zaff);border-color:var(--zaff);box-shadow:0 0 0 5px color-mix(in srgb,var(--zaff) 18%,transparent)}
.chk.s{background:var(--rosso)!important;border-color:var(--rosso)!important}


.mbody{flex:1;min-width:0}
.mtop{display:flex;justify-content:space-between;gap:6px;font-size:12px;margin-bottom:2px}
.mname{font-weight:700;color:var(--bosco)}
.meal.free .mname{color:var(--zaff)}
.meal.mensa .mname{color:var(--mensa)}
.meal.skip .mname{color:var(--rosso)}
.mtime{color:var(--grigio)}
.mdesc{font-size:13.5px;line-height:1.5}
.mkcal{font-size:12px;font-weight:700;color:var(--salvia);margin-top:3px}
.mopts{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
.mopts button,.chipbtn{border:1.5px solid var(--linea);background:var(--card);border-radius:20px;padding:5px 12px;font-size:11.5px;cursor:pointer;color:var(--grigio);transition:all .2s var(--ease)}
.mopts button:hover,.chipbtn:hover{border-color:var(--salvia);color:var(--salvia);transform:translateY(-1px)}
.mopts button.sel{border-color:var(--zaff);color:var(--zaff);font-weight:700;background:var(--zaffbg)}
.mtools{margin-top:10px;display:flex;gap:8px;row-gap:8px;align-items:center;flex-wrap:wrap}
.mtools .btn{margin-top:0}
.mtools select{border:1px solid var(--linea);border-radius:10px;padding:7px 9px;font-size:11.5px;color:var(--grigio);background:var(--card);flex:1 1 40%;min-width:120px}
.badge{font-size:10.5px;background:var(--okbg);color:var(--ok);border-radius:8px;padding:3px 9px;font-weight:700}
.badge.moved{background:var(--rossobg);color:var(--rosso)}
.badge.ai{background:var(--mensabg);color:var(--mensa)}
.legend{display:flex;gap:12px;font-size:12px;color:var(--grigio);margin-top:6px;flex-wrap:wrap}
.legend b{font-size:14px}
.daytotal{font-size:13px;font-weight:700;color:var(--bosco);padding:6px 2px 14px}
.daytotal span{color:var(--salvia)}
/* ══ FORM ══ */
textarea,input[type=text],input[type=number],input[type=date],input[type=password],select{width:100%;border:1.5px solid var(--linea);border-radius:12px;padding:10px 11px;font-size:14px;font-family:inherit;background:var(--card);color:var(--ink);transition:border-color .2s,box-shadow .2s}
textarea:focus,input:focus,select:focus{border-color:var(--salvia);box-shadow:0 0 0 4px color-mix(in srgb,var(--salvia) 14%,transparent);outline:none}
textarea{min-height:54px;resize:vertical}
label{font-size:12px;font-weight:700;color:var(--grigio);display:block;margin:10px 0 4px}
/* ══ BOTTONI: gradiente + lift ══ */
.btn{display:inline-block;border:0;background:var(--grad);color:#fff;border-radius:13px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;box-shadow:0 6px 18px -6px rgba(22,163,74,.55);transition:transform .22s var(--ease),box-shadow .25s,filter .2s;position:relative;overflow:hidden}
.btn::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.35) 50%,transparent 70%);transform:translateX(-120%);transition:transform .6s var(--ease)}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 26px -8px rgba(22,163,74,.65)}
.btn:hover::after{transform:translateX(120%)}
.btn:active{transform:scale(.96)}
html[data-theme="dark"] .btn{color:#04170B}
.btn.ghost{background:var(--card);color:var(--salvia);border:1.5px solid var(--salvia);box-shadow:none}
.btn.ghost:hover{background:var(--menta)}
.btn.warn{background:linear-gradient(135deg,#F06060,#DC4444);box-shadow:0 6px 18px -6px rgba(220,68,68,.55)}
.btn.small{padding:7px 13px;font-size:12.5px;margin-top:4px}
.row2{display:flex;gap:10px}.row2>*{flex:1;min-width:0}
.row3{display:flex;gap:10px}.row3>*{flex:1;min-width:0}
label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* ══ SPESA ══ */
.shopcat{font-weight:700;color:#fff;background:var(--grad);background-size:200% 200%;border-radius:16px 16px 0 0;padding:10px 14px;font-size:13.5px;margin-top:14px;letter-spacing:.2px}
.shopitems{background:var(--card);border:1px solid var(--linea);border-top:0;border-radius:0 0 16px 16px;padding:4px 0;box-shadow:var(--shadow)}
.shopitem{display:flex;align-items:center;gap:9px;padding:10px 14px;border-bottom:1px solid var(--linea);font-size:13.5px;transition:background .2s,opacity .3s}
.shopitem:hover{background:color-mix(in srgb,var(--menta) 55%,transparent)}
.shopitem:last-child{border-bottom:0}
.shopitem.c{opacity:.42}.shopitem.c .st{text-decoration:line-through}
.shopitem .box{min-width:23px;height:23px;border:2px solid var(--salvia);border-radius:8px;text-align:center;line-height:19px;color:#fff;font-size:13px;cursor:pointer;flex-shrink:0;transition:transform .2s var(--ease),background .25s}
.shopitem .box:active{transform:scale(.8)}
.shopitem.c .box{background:var(--salvia)}
.shopitem .st{flex:1;cursor:pointer}
.ibtn{border:1px solid var(--linea);background:var(--card);border-radius:9px;padding:4px 8px;font-size:13px;cursor:pointer;flex-shrink:0;transition:transform .18s var(--ease),border-color .2s,color .2s;text-decoration:none;color:var(--ink)}
.ibtn:hover{transform:translateY(-1px) scale(1.06);border-color:var(--salvia)}
.ibtn:active{transform:scale(.9)}
/* ══ GAUGE / STATISTICHE ══ */
.gaugecard{background:var(--card);border:1px solid var(--linea);border-radius:22px;padding:18px;margin-bottom:13px;box-shadow:var(--shadow);text-align:center;transition:transform .3s var(--ease),box-shadow .3s var(--ease)}

.ringwrap{position:relative;width:176px;height:176px;margin:4px auto}
.ringwrap svg{transform:rotate(-90deg))}
.ringwrap svg circle{transition:stroke-dashoffset 1s var(--ease),stroke .4s}
.ringnum{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center}
.ringnum .v{font-size:31px;font-weight:800}

.ringnum .v.def{color:var(--salvia)}.ringnum .v.sur{color:var(--rosso)}
.ringnum .l{font-size:11px;color:var(--grigio);margin-top:2px}
.stat3{display:flex;gap:9px;margin-top:12px}
.stat3>div{flex:1;background:var(--menta);border-radius:14px;padding:10px 4px;text-align:center;transition:transform .25s var(--ease),box-shadow .25s}
.stat3>div:hover{transform:translateY(-2px) scale(1.03);box-shadow:var(--shadow)}
.stat3 .v{font-weight:800;font-size:16px;color:var(--bosco)}
.stat3 .l{font-size:10.5px;color:var(--grigio)}
.gnums{display:flex;justify-content:space-around;font-size:12px;color:var(--grigio);margin-top:8px}
.gnums b{color:var(--ink)}
.wline{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--linea);font-size:13.5px;gap:8px;transition:background .2s}
.wline:last-child{border-bottom:0}
.wline .del{color:var(--rosso);cursor:pointer;font-weight:700;padding:0 7px;transition:transform .15s var(--ease)}
.wline .del:hover{transform:scale(1.25)}
.water{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}
.water span{width:34px;height:38px;border:2px solid #B7CFEA;border-radius:8px 8px 13px 13px;cursor:pointer;font-size:17px;text-align:center;line-height:35px;transition:all .28s var(--ease)}
.water span:hover{transform:translateY(-3px)}
.water span.f{background:linear-gradient(180deg,#EAF4FF,#C8E1FB);border-color:var(--mensa);transform:translateY(-3px);box-shadow:0 6px 12px -4px rgba(37,99,235,.35)}

html[data-theme="dark"] .water span.f{background:#1E3350}
.stars{display:flex;gap:5px;font-size:23px;cursor:pointer;user-select:none}
.stars span{filter:grayscale(1);opacity:.4;transition:all .25s var(--ease)}
.stars span:hover{transform:scale(1.25) rotate(8deg)}
.stars span.on{filter:none;opacity:1}

.hint{font-size:12px;color:var(--grigio);margin-top:7px;line-height:1.55}
.gtable{width:100%;font-size:13px}
.gtable td{padding:6px 6px;vertical-align:top;border-bottom:1px solid var(--linea)}
.gtable td:first-child{width:64px;text-align:center;font-size:17px}
.pbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 8px;padding:9px 13px;border-radius:14px;
  background:var(--menta);border-left:4px solid var(--salvia);cursor:pointer;font-size:12.5px}
.pbar.libero{background:var(--zaffbg);border-left-color:var(--zaff)}
.pbar.none{background:var(--card);border-left-color:var(--linea);color:var(--grigio)}
.pbar .pl{font-weight:700;color:var(--bosco)}
.pbar.none .pl{color:var(--grigio);font-weight:600}
.pbar .pd{color:var(--grigio)}
.pbar .pv{margin-left:auto;font-weight:700;color:var(--bosco)}
.pbar .pv+.pv{margin-left:0}
.pbar .pv.ok{color:var(--salvia)}
.pbar .pv.up{color:var(--rosso)}
.gsec{font-weight:700;color:var(--bosco);margin:10px 0 2px;font-size:13.5px}
.aibox{background:var(--mensabg);border:1px solid var(--linea);border-radius:14px;padding:12px;margin-top:9px;font-size:13.5px;line-height:1.5;white-space:pre-wrap}
.histweek{border:1px solid var(--linea);border-radius:16px;background:var(--card);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .3s}
.histweek:hover{box-shadow:var(--shadow-lift)}
.histweek .hh{padding:12px 14px;display:flex;justify-content:space-between;cursor:pointer;font-weight:700;color:var(--bosco);font-size:14px;transition:background .2s}
.histweek .hh:hover{background:color-mix(in srgb,var(--menta) 50%,transparent)}
.histweek .hb{display:none;padding:0 14px 12px;font-size:13px}
.histweek.open .hb{display:block}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{padding:6px 4px;border-bottom:1px solid var(--linea);text-align:left}
th{color:var(--grigio);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
td.n{text-align:right;font-variant-numeric:tabular-nums}
tr{transition:background .15s}
tbody tr:hover,table tr:hover td{background:color-mix(in srgb,var(--menta) 40%,transparent)}
.pill{display:inline-block;font-size:11px;border-radius:14px;padding:3px 10px;background:var(--okbg);color:var(--ok);font-weight:700;margin:2px 3px 0 0}
.todaytag{background:var(--gradz);color:#fff;border-radius:8px;font-size:10.5px;padding:3px 9px;font-family:system-ui;font-weight:700;box-shadow:0 3px 8px -2px rgba(234,138,31,.5)}
/* ══ GRAFICI: zoomabili ══ */
canvas{max-width:100%;cursor:zoom-in;border-radius:10px;transition:transform .25s var(--ease)}

#zoomOv{position:fixed;inset:0;background:rgba(6,14,8,.88);z-index:120;display:none;align-items:center;justify-content:center;overflow:hidden;touch-action:none}
#zoomOv.on{display:flex}

#zoomOv img{max-width:96vw;max-height:82vh;background:#fff;border-radius:14px;box-shadow:0 30px 80px -20px rgba(0,0,0,.8);transform-origin:center;cursor:grab;user-select:none;-webkit-user-drag:none}
html[data-theme="dark"] #zoomOv img{background:#131E15}

#zoomOv .ztools{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);display:flex;gap:8px;background:var(--card);border:1px solid var(--linea);border-radius:20px;padding:8px;box-shadow:var(--shadow-lift)}
#zoomOv .ztools button{border:0;background:var(--card);color:var(--ink);border-radius:12px;width:44px;height:40px;font-size:17px;cursor:pointer;transition:transform .18s var(--ease),background .2s}
#zoomOv .ztools button:hover{transform:scale(1.1);background:var(--menta)}
#zoomOv .zhint{position:fixed;top:calc(16px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);color:#fff;font-size:12px;opacity:.8;background:rgba(0,0,0,.35);border-radius:14px;padding:6px 13px}
#scanbox{display:none;margin-top:10px}
#scanreader{width:100%;border-radius:14px;overflow:hidden}
#aiSpin{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(96px + env(safe-area-inset-bottom));z-index:90;background:var(--card);border:1px solid var(--linea);box-shadow:var(--shadow-lift);border-radius:24px;padding:10px 16px;display:none;align-items:center;gap:10px;font-size:13px;color:var(--bosco);font-weight:700}
#aiSpin.on{display:flex}
/* rotella dell'AI: unica animazione rimasta, gira SOLO mentre l'AI lavora */
@keyframes nspin{to{transform:rotate(360deg)}}
#aiSpin .sp{width:17px;height:17px;border-radius:50%;border:2.5px solid var(--linea);border-top-color:var(--salvia);animation:nspin .8s linear infinite}
@media(prefers-reduced-motion:reduce){#aiSpin .sp{animation:none}}
#toast{position:fixed;left:50%;transform:translateX(-50%) translateY(-16px) scale(.9);top:78px;z-index:96;background:var(--grad);color:#fff;border-radius:22px;padding:11px 20px;font-size:13.5px;font-weight:700;opacity:0;pointer-events:none;transition:all .4s var(--ease);box-shadow:0 12px 30px -8px rgba(22,163,74,.6)}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:97;overflow:hidden}
#confetti span{position:absolute;width:9px;height:9px;border-radius:2px;top:-12px}
/* ══ MODALI ══ */
table.rules{table-layout:fixed}
table.rules td{vertical-align:middle}
table.rules td:first-child{white-space:normal;width:30%;font-weight:600;color:var(--ink)}
table.rules td.rd{font-size:12.5px;line-height:1.45;color:var(--grigio)}
table.rules td.rc{width:154px;text-align:right;white-space:nowrap}
table.rules .rv{width:96px;display:inline-block;margin:0;padding:7px 8px;font-size:13.5px;text-align:right;vertical-align:middle}
table.rules select.rv{width:150px;text-align:left;padding:7px 6px}
table.rules .ru{font-size:11.5px;color:var(--grigio);margin-left:5px}
table.rules .rout{font-family:inherit;font-weight:700;color:var(--salvia);font-size:14.5px}
@media(max-width:520px){
  table.rules,table.rules tbody,table.rules tr,table.rules td{display:block;width:auto}
  table.rules tr{padding:11px 0;border-bottom:1px solid var(--linea)}
  table.rules tr:last-child{border-bottom:0}
  table.rules td{border:0;padding:2px 0}
  table.rules td.rc{text-align:left;width:auto;margin-top:6px}
  table.rules select.rv{width:100%;max-width:260px}
}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal{position:fixed;inset:0;background:rgba(6,14,8,.55);z-index:95;display:flex;align-items:center;justify-content:center;padding:16px}
.modal .mcard{width:100%;max-width:530px;max-height:86vh;overflow:auto;background:var(--card);border:1px solid var(--linea);border-radius:22px;padding:18px;box-shadow:var(--shadow-lift)}

.optbtn{display:block;width:100%;text-align:left;border:2px solid var(--linea);border-radius:14px;padding:12px 13px;margin-top:9px;background:var(--card);cursor:pointer;font-size:13px;line-height:1.45;color:var(--ink);transition:all .22s var(--ease)}
.optbtn:hover{border-color:var(--salvia);transform:translateX(3px)}
.optbtn.sel{border-color:var(--salvia);background:var(--menta);box-shadow:0 4px 14px -6px rgba(22,163,74,.4)}
.optbtn b{color:var(--bosco)}


button:focus-visible,select:focus-visible,input:focus-visible,.chk:focus-visible{outline:2.5px solid var(--mensa);outline-offset:2px}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{transition:none!important}#confetti{display:none}}
@media(min-width:700px){.tabs{max-width:620px;left:50%;right:auto;transform:translateX(-50%)}}
/* ══════════ STAMPA: Report per il nutrizionista ══════════ */
@media print{
  body{padding:0;background:#fff;color:#000}
  body::before,body::after{display:none}
  header,.tabs,.btn,.ibtn,.chipbtn,.datebar,#scanbox,#zoomOv{display:none!important}
  .page{display:none!important}
  #printreport{display:block!important;padding:20px;font-size:12px}
  #printreport h1{font-size:20px;margin-bottom:4px}
  #printreport h2{font-size:15px;margin:14px 0 6px}
  #printreport table{font-size:11px}
  .card,.histweek{box-shadow:none;border:1px solid #ccc;background:#fff}
}
#printreport{display:none}
</style>

<body>

<header>
  <div class="hrow">
    <div style="display:flex;align-items:center;gap:9px;min-width:0;">
      <span class="logo-badge"><span id="hTitle">Nutry</span></span><span id="hVer" style="font-size:10px;opacity:.75;margin-left:6px;font-family:system-ui;vertical-align:top"></span>
    </div>
    <div class="hbtns">
      <span class="streak" id="hStreak" title="Giorni in target consecutivi">🔥 0</span>
      <button class="hbtn" onclick="show('guida')" title="Guida rapida">❓</button>
    </div>
  </div>
  <!-- Scorrimento date: frecce per navigare i giorni -->
  <div class="datebar">
    <button onclick="shiftDay(-1)" aria-label="Giorno precedente">‹</button>
    <div class="dt" id="hDate" onclick="goToday()" title="Tocca per tornare a oggi"></div>
    <button onclick="shiftDay(1)" aria-label="Giorno successivo">›</button>
  </div>
</header>

<div class="page" id="pg-oggi"></div>
<div class="page" id="pg-piano"></div>
<div class="page" id="pg-spesa"></div>
<div class="page" id="pg-sport"></div>
<div class="page" id="pg-storico"></div>
<div class="page" id="pg-io"></div>
<div class="page" id="pg-regole"></div>
<div class="page" id="pg-guida"></div>
<div class="page" id="pg-setup"></div>
<div id="printreport"></div>

<div id="aiSpin"><span class="sp"></span>L'AI sta lavorando…</div>
<div id="toast"></div>
<div id="confetti"></div>

<nav class="tabs">
  <button data-p="oggi"><span class="ic">☀️</span>Oggi</button>
  <button data-p="piano"><span class="ic">🍽️</span>Piano</button>
  <button data-p="spesa"><span class="ic">🛒</span>Spesa</button>
  <button data-p="sport"><span class="ic">🏃</span>Sport</button>
  <button data-p="storico"><span class="ic">📚</span>Storico</button>
  <button data-p="regole"><span class="ic">📐</span>Regole</button>
  <button data-p="io"><span class="ic">👤</span>Io</button>
</nav>

<script>
"use strict";

/* ── FIBRE (g): stima per ogni opzione del piano, se non già indicata ──────────
   Euristica per ingrediente (verdura, legumi, patate, frutta, cereali, semi…).
   È volutamente approssimata: serve a dare un ordine di grandezza, mostrato
   ovunque come "g F" (grammi di fibra) accanto a P/C/G. */
function estFiberOf(d){const s=(d||"").toLowerCase();let f=0;const add=(re,g)=>{if(re.test(s))f+=g;};
  add(/insalata|valeriana|verdura cruda/,4);
  add(/verdura|verdure/,3);
  add(/piselli/,6);
  add(/patate|patata/,3);
  add(/avocado/,5);
  add(/frutti di bosco/,3);
  add(/\bfrutta\b|frutto/,2);
  add(/pane|crostini|crostino/,2);
  add(/quinoa|avena/,2);
  add(/pasta/,3);
  add(/zuppa/,4);
  add(/semi|noci|noce/,2);
  add(/pizza|burger|sushi|panino/,3);
  add(/cornetto/,1);
  return Math.min(22,Math.round(f));}
/* Stima ZUCCHERI (g) da una descrizione, quando non arrivano da AI o barcode.
   Sono gli zuccheri "semplici": frutta, latte/yogurt, dolci, bevande. */
function estSugarOf(d){const s=(d||"").toLowerCase();let z=0;const add=(re,g)=>{if(re.test(s))z+=g;};
  add(/banana/,14); add(/mela|pera|arancia|kiwi|pesca|albicocc/,12);
  add(/uva|fichi|datteri|mango/,16); add(/frutti di bosco|fragole|lampon/,7);
  add(/\bfrutta\b|frutto/,10); add(/succo|spremuta/,18);
  add(/marmellata|miele|confettura|sciroppo/,12);
  add(/yogurt/,8); add(/\blatte\b/,10); add(/ricotta|fiocchi di latte/,4);
  add(/biscott|cornetto|brioche|torta|crostata|merendina/,14);
  add(/cioccolat|nutella|caramell|confetti|gelato|dolce|dessert|budino/,18);
  add(/bibita|cola|aranciata|tè freddo|the freddo|energy/,22);
  add(/birra/,3); add(/vino/,2);
  add(/pomodor|carote|cipoll/,3);
  return Math.min(80,Math.round(z));}

function age(){if(!S.profile.dob)return 0;const b=new Date(S.profile.dob),n=new Date();
  let a=n.getFullYear()-b.getFullYear();if(n<new Date(n.getFullYear(),b.getMonth(),b.getDate()))a--;return a;}
/* Metabolismo basale. Tre formule selezionabili nelle Regole:
   • auto      → Katch-McArdle se conosci la % di grasso, altrimenti Mifflin
   • mifflin   → sempre su peso/altezza/età (la più usata)
   • katch     → solo su massa magra (richiede la % di grasso)
   • harris    → Harris-Benedict rivista, tende a stimare un filo più alto */
function bmrFormula(){return S.profile.bmrF||"auto";}
function bmr(){const p=S.profile;
  if(!(+p.w>0)||!(+p.h>0))return 0; // profilo non ancora compilato
  const fat=parseFloat(p.fatp);
  const lbm=fat>0?p.w*(1-fat/100):parseFloat(p.lbm); // magra in kg dalla % di grasso
  const F=bmrFormula();
  const mifflin=()=>{const b=10*p.w+6.25*p.h-5*age();return Math.round(p.gender==="m"?b+5:b-161);};
  const katch=()=>lbm>0?Math.round(370+21.6*lbm):mifflin();
  const harris=()=>Math.round(p.gender==="m"
    ?88.36+13.4*p.w+4.8*p.h-5.7*age()
    :447.6+9.2*p.w+3.1*p.h-4.3*age());
  if(F==="mifflin")return mifflin();
  if(F==="katch")return katch();
  if(F==="harris")return harris();
  return lbm>0?katch():mifflin();}
function tdee(){ // fabbisogno: BMR×attività + correzione sui PASSI BASE
  // Riferimento: 3000 passi base (quelli che fai comunque). Se in Io imposti
  // un valore diverso, il fabbisogno si aggiusta di conseguenza.
  const base=(+S.profile.baseSteps>0)?+S.profile.baseSteps:3000;
  return Math.round(bmr()*S.profile.act+(base-3000)*S.profile.w*0.00045);}
function allSports(){return SPORTS_DEFAULT.concat(S.customSports);}
/* kcal di un allenamento = (MET netto) × peso corporeo × ore.
   MET netto = MET dell'attività, corretto per l'intensità, MENO 1: quel "1" è
   il metabolismo a riposo, che nel tuo fabbisogno è GIÀ contato. Senza questa
   sottrazione ogni allenamento risulta più generoso del reale (è l'errore
   classico dei calcolatori online). Il peso corporeo è il moltiplicatore
   principale: a parità di sport, più pesi più consumi. */
function metNet(sport,intensity){
  const sp=allSports().find(s=>s.name===sport)||{met:6};
  return Math.max(0.5,sp.met*(INT[intensity]||1)-1);}
function metMode(){return S.profile.metMode||"netto";}
function metUsed(sport,intensity){
  const sp=allSports().find(s=>s.name===sport)||{met:6};
  const m=sp.met*(INT[intensity]||1);
  return metMode()==="lordo"?m:Math.max(0.5,m-1);}
function workoutKcal(w){return Math.round(metUsed(w.sport,w.int)*S.profile.w*((+w.min||0)/60));}
function mealOpt(pdi,mi){const st=S.week.days[pdi].meals[mi];
  if(st.custom)return st.custom; // override AI/manuale della settimana
  const perm=S.permMeals[pdi+"_"+mi];
  if(perm&&st.opt===0)return perm; // override permanente sull'opzione base
  return PLAN[pdi].meals[mi].o[st.opt]||PLAN[pdi].meals[mi].o[0];}
function assignedDay(pdi,mi){const st=S.week.days[pdi].meals[mi];return st.movedTo===-1?pdi:st.movedTo;}
function dayItems(di){const items=[];
  PLAN.forEach((pd,pdi)=>pd.meals.forEach((m,mi)=>{if(assignedDay(pdi,mi)===di){
    const st=S.week.days[pdi].meals[mi];const slot=st.movedAs||m.n;
    items.push({pdi,mi,slot,ord:SLOTS.indexOf(slot)<0?9:SLOTS.indexOf(slot)});}}));
  items.sort((a,b)=>a.ord-b.ord);return items;}
function eatenOfDay(di){let k=0,p=0,c=0,f=0,fib=0,z=0;
  dayItems(di).forEach(it=>{const st=S.week.days[it.pdi].meals[it.mi];
    if(st.done&&!st.skip){const o=mealOpt(it.pdi,it.mi);k+=o.k;p+=o.p;c+=o.c||0;f+=o.f||0;fib+=o.fib||0;z+=o.z||0;}});
  S.week.days[di].extras.forEach(e=>{if(e.st==="skip")return; // extra saltato: non conta
    k+=e.k;p+=e.p||0;c+=e.c||0;f+=e.f||0;fib+=e.fib||0;z+=e.z||0;});return{k,p,c,f,fib,z};}
function extrasKcal(di){return S.week.days[di].extras.reduce((a,e)=>a+(e.st==="skip"?0:e.k),0);}
function skippedOfDay(di){return dayItems(di).filter(it=>S.week.days[it.pdi].meals[it.mi].skip).length;}
/* Opzione di PIANO di un pasto: quella prevista dal piano (o l'override
   permanente), MAI la modifica temporanea della settimana (ribilancio, foto,
   barcode, matita). Serve a tenere il "pianificato" del giorno FISSO e a
   confrontarlo con quello realmente mangiato. */
function planOpt(pdi,mi){const st=S.week.days[pdi].meals[mi];
  const perm=S.permMeals[pdi+"_"+mi];
  if(perm&&st.opt===0)return perm;
  return PLAN[pdi].meals[mi].o[st.opt]||PLAN[pdi].meals[mi].o[0];}
function plannedOfDay(di){let k=0,p=0,c=0,f=0,fib=0,z=0;
  dayItems(di).forEach(it=>{const o=planOpt(it.pdi,it.mi);
    k+=o.k;p+=o.p;c+=o.c||0;f+=o.f||0;fib+=o.fib||0;z+=o.z||0;});return{k,p,c,f,fib,z};}

/* ── Obiettivi passi/allenamenti e PROIEZIONE non lineare del peso ──────────
   Man mano che si dimagrisce il BMR cala (dipende dal peso), quindi il deficit
   si riduce e il calo rallenta: la discesa NON è lineare. Simuliamo giorno per
   giorno ricalcolando BMR sul peso corrente. Sport e passi vengono dagli
   OBIETTIVI (media giornaliera), non dal singolo dato. */
function bmrForWeight(w){const p=S.profile;const fat=parseFloat(p.fatp);
  const lbm=fat>0?w*(1-fat/100):parseFloat(p.lbm);
  if(lbm>0)return Math.round(370+21.6*lbm);
  const base=10*w+6.25*p.h-5*age();return Math.round(p.gender==="m"?base+5:base-161);}
function stepsBurnFor(steps,w){return Math.round(((+steps||0)-5000)*w*0.00045);}
function workoutBurnFor(sport,min,intensity,w){ // stessa formula usata ovunque
  return Math.round(metUsed(sport,intensity)*w*((+min||0)/60));}
/* Dispendio EXTRA medio giornaliero dagli obiettivi (passi/giorno + lista allenamenti/sett) */
function plannedActivityBurnFor(w){let b=0;const p=S.profile;
  (p.goalWorkoutList||[]).forEach(g=>{if(g.sport&&g.perWeek)b+=Math.round(workoutBurnFor(g.sport,g.min||30,"media",w)*g.perWeek/7);});
  return b;}
/* Simulazione della discesa del peso a partire da (startW,startDate) fino
   all'obiettivo, con deficit = TDEE(peso) + attività pianificata − intake dieta.
   Ritorna i punti (campionati ~settimanalmente), i giorni stimati e la data. */
function simulateWeightDescent(startW,startDate){
  const p=S.profile,goal=p.goalW;
  startW=startW||p.w;const start=startDate?new Date(startDate):new Date();start.setHours(12,0,0,0);
  if(!goal||!startW||startW<=goal)return null;
  const intake=plannedDietSummary().kcal_giorno;
  const dailyDeficitStart=Math.round(bmrForWeight(startW)*p.act)+plannedActivityBurnFor(startW)-intake;
  let w=startW;const pts=[{d:new Date(start),w:Math.round(w*10)/10}];
  let day=0;const MAX=3650;let stalled=false;
  while(w>goal&&day<MAX){day++;
    const def=Math.round(bmrForWeight(w)*p.act)+plannedActivityBurnFor(w)-intake;
    if(def<=0){stalled=true;break;}
    w-=def/7700;if(w<goal)w=goal;
    if(day%7===0||w<=goal){const dt=new Date(start);dt.setDate(dt.getDate()+day);pts.push({d:dt,w:Math.round(w*10)/10});}}
  const reached=w<=goal+0.05&&!stalled;
  const etaDate=new Date(start);etaDate.setDate(etaDate.getDate()+day);
  return {points:pts,etaDays:day,etaDate,reached,stalled,dailyDeficitStart,intake};}
/* Peso "ideale" proiettato a una certa data, partendo dalla prima pesata reale */
function projectedWeightAt(dateISO){
  const W=(S.profile.weights||[]).filter(x=>x.w).slice().sort((a,b)=>new Date(a.d)-new Date(b.d));
  if(!W.length)return null;
  const sim=simulateWeightDescent(W[0].w,W[0].d);if(!sim)return null;
  const target=new Date(dateISO).getTime();let best=sim.points[0];
  sim.points.forEach(pt=>{if(pt.d.getTime()<=target)best=pt;});
  return best?best.w:null;}
/* Proposta obiettivo acqua in base al peso (~35 ml/kg), in litri, arrotondata a 0,5 L */
function waterSuggestL(){return Math.min(5,Math.max(1.5,Math.round(S.profile.w*0.035*2)/2));}
/* Obiettivo acqua: l'utente lo sceglie in IO (litri/giorno); se non impostato
   si usa la proposta in base al peso. +2 bicchieri se allenamento intenso o >45'.
   1 bicchiere = 250 ml. */
function waterGoal(di){const hard=S.week.days[di].workouts.some(w=>w.int==="alta"||w.min>45);
  const litri=(+S.profile.waterGoalL>0)?+S.profile.waterGoalL:waterSuggestL();
  const base=Math.min(24,Math.max(4,Math.round(litri*4))); // bicchieri da 250 ml
  return base+(hard?2:0);}

/* Chiamata Gemini robusta: fino a 3 tentativi per modello con backoff su 429/503/rete;
   passa al modello successivo su 404/quota; errori tipizzati per messaggi chiari. */
async function geminiCall(prompt,imgs){
  const key=(S.ai&&S.ai.key||"").trim();if(!key)throw new Error("nokey");
  const parts=[];
  (imgs||[]).forEach(im=>parts.push({inline_data:{mime_type:im.mime||"image/jpeg",data:im.b64}}));
  parts.push({text:prompt});
  aiBusy();
  try{
  let lastErr=null;
  for(const m of gemModels()){
    for(let attempt=0;attempt<3;attempt++){
      try{
        const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),25000);
        let r;
        try{r=await fetch("https://generativelanguage.googleapis.com/v1beta/models/"+m+":generateContent?key="+encodeURIComponent(key),{
          method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts}]}),signal:ctrl.signal});}
        finally{clearTimeout(to);}
        if(r.status===429){lastErr=new Error("quota");break;}              // quota: cambia modello
        if(r.status===404){lastErr=new Error("modello");break;}            // modello assente: cambia
        if(r.status===503||r.status===500){lastErr=new Error("busy");await wait(800*(attempt+1));continue;} // sovraccarico: riprova
        if(r.status===400){throw new Error("badkey");}                     // chiave/permessi
        if(!r.ok)throw new Error("HTTP "+r.status);
        const j=await r.json();
        if(j.promptFeedback&&j.promptFeedback.blockReason)throw new Error("blocked");
        const txt=(j.candidates&&j.candidates[0]&&j.candidates[0].content.parts.map(p=>p.text||"").join(""))||"";
        trackUsage((j.usageMetadata&&j.usageMetadata.totalTokenCount)||0,false);
        return txt;
      }catch(e){lastErr=e;
        const msg=String(e.message||e);
        if(e.name==="AbortError"||/Failed to fetch|NetworkError|load failed/i.test(msg)){await wait(700*(attempt+1));continue;} // rete: riprova
        if(/quota|modello/.test(msg))break; // gestiti sopra
        break; // badkey/blocked/altro: non riprovare, prova prossimo modello
      }
    }
  }
  trackUsage(0,true);
  throw lastErr||new Error("errore");
  }finally{aiDone();}}

/* Scatta/scegli una foto e ridimensionala (max 1024px, JPEG) per contenere i token */
function snapPhoto(){return new Promise((res,rej)=>{
  const inp=document.createElement("input");inp.type="file";inp.accept="image/*";inp.capture="environment";
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return rej(new Error("annullato"));
    const img=new Image();img.onload=()=>{
      const MAX=1024,sc=Math.min(1,MAX/Math.max(img.width,img.height));
      const c=document.createElement("canvas");c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      res({b64:c.toDataURL("image/jpeg",0.82).split(",")[1],mime:"image/jpeg"});
      URL.revokeObjectURL(img.src);};
    img.onerror=()=>rej(new Error("immagine non leggibile"));
    img.src=URL.createObjectURL(f);};
  inp.click();});}

  dayItems(di).forEach(it=>{const st=S.week.days[it.pdi].meals[it.mi];

/* Il pasto in piano di questo momento, con target COMPENSATO dal surplus:
   se hai già accumulato calorie extra, il target scende (le proteine no). */
function targetMealOf(di,key){
  let base=null;
  if(key){const[pdi,mi]=key.split("_").map(Number);
    if(PLAN[pdi]&&PLAN[pdi].meals[mi]){const o=mealOpt(pdi,mi);
      base={slot:(S.week.days[pdi].meals[mi].movedAs||PLAN[pdi].meals[mi].n),k:o.k,p:o.p,pdi,mi};}}
  if(!base){
    const map={colazione:["Colazione","Metà mattina"],pranzo:["Pranzo"],merenda:["Metà pomeriggio","Aperitivo"],cena:["Cena","Dopo cena"]};
    const slots=map[currentSlot()];
    for(const s of slots){const it=dayItems(di).find(x=>x.slot===s&&!S.week.days[x.pdi].meals[x.mi].done);
      if(it){const o=mealOpt(it.pdi,it.mi);base={slot:s,k:o.k,p:o.p,pdi:it.pdi,mi:it.mi};break;}}}
  if(!base){const plan=plannedOfDay(di),eat=eatenOfDay(di);
    base={slot:currentSlot(),k:Math.max(300,plan.k-eat.k),p:30};}
  const sur=Math.max(0,surplusOfDay(di));
  base.sur=sur;base.kAdj=Math.max(200,base.k-sur);
  return base;}

/* ── SCAMBIO PASTI v5: bidirezionale e automatico ─────────────────
   Se sposti il pranzo di mercoledì alla cena di venerdì, l'app mette
   AUTOMATICAMENTE la cena di venerdì al pranzo di mercoledì: uno
   scambio solo, senza dover ricordare cosa hai preso da dove. */
function findCounterpart(toDi,slot,excludePdi,excludeMi){
  // trova il pasto che occupa (toDi, slot) in questo momento
  for(let pdi=0;pdi<7;pdi++)for(let mi=0;mi<PLAN[pdi].meals.length;mi++){
    if(pdi===excludePdi&&mi===excludeMi)continue;
    const st=S.week.days[pdi].meals[mi];const m=PLAN[pdi].meals[mi];
    const effDay=(st.movedTo!==-1&&st.movedTo!=null)?st.movedTo:pdi;
    const effSlot=st.movedAs||m.n;
    if(effDay===toDi&&effSlot===slot)return{pdi,mi};}
  return null;}
function applyMove(pdi,mi){
  const st=S.week.days[pdi].meals[mi];const m=PLAN[pdi].meals[mi];
  const toDi=(st.movedTo!==-1&&st.movedTo!=null)?st.movedTo:pdi;
  const toSlot=st.movedAs||m.n;
  if(toDi===pdi&&toSlot===m.n){save();render(cur);return;} // tornato a casa: niente scambio
  const other=findCounterpart(toDi,toSlot,pdi,mi);
  if(other){ // scambio SEMPRE automatico: mai due pasti sullo stesso slot
    const ost=S.week.days[other.pdi].meals[other.mi];
    if(!ost.done&&!ost.skip){
      ost.movedTo=(pdi===other.pdi)?-1:pdi;ost.movedAs=m.n;
      toast("🔄 Scambiati: "+m.n+" ⇄ "+PLAN[other.pdi].meals[other.mi].n+" (🔙 per annullare)");}}
  save();render(cur);}
/* 🔙 Riporta il pasto (e il suo gemello scambiato) al giorno di origine */
window.unmoveMeal=(pdi,mi)=>{
  const st=S.week.days[pdi].meals[mi];const m=PLAN[pdi].meals[mi];
  // il gemello è chi ora occupa la MIA posizione originale
  const twin=findCounterpart(pdi,m.n,pdi,mi);
  st.movedTo=-1;st.movedAs=null;
  if(twin){const tst=S.week.days[twin.pdi].meals[twin.mi];
    tst.movedTo=-1;tst.movedAs=null;} // sempre: l'altro pasto è invisibile da qui
  save();render(cur);toast("Pasti riportati al giorno di origine ✓");}

window.checkByPhoto=async(di)=>{

    const t=await aiAskVision('Ecco la FOTO di ciò che ho appena mangiato. Questi sono i pasti del mio piano di OGGI ancora da spuntare: '+JSON.stringify(list)+'. Determina a QUALE corrisponde (usa il valore esatto del campo "slot") oppure "extra" se non corrisponde a nessuno. Stima kcal e proteine REALI dalla foto. Rispondi SOLO JSON: {"slot":"<slot o extra>","nome":"nome breve del piatto","kcal":numero,"prot":numero}',[ph]);

  }catch(e){if(e.message!=="annullato")aiFail(e);}};
window.rebalance=async(di)=>{
  /* v5.0.3 — logica a BUDGET, idempotente:
     budget residuo = kcal pianificate della giornata − kcal già mangiate;
     eccesso = pianificato dei pasti RIMANENTI − budget residuo.
     Se eccesso ≤ 50 non si tocca nulla (cliccare due volte non ri-taglia). */
  const dayPlan=plannedOfDay(di).k;                 // la "giornata tipo"
  const eaten=eatenOfDay(di).k;                     // mangiato finora (pasti ✓ + extra)
  const remaining=dayItems(di).filter(it=>{const st=S.week.days[it.pdi].meals[it.mi];
    return !st.done&&!st.skip&&PLAN[it.pdi].meals[it.mi].type==="norm";});
  const remPlanned=remaining.reduce((a,it)=>a+mealOpt(it.pdi,it.mi).k,0);
  const budget=dayPlan-eaten;
  const excess=Math.round(remPlanned-budget);
  if(!remaining.length)return alert("Non ci sono pasti normali ancora da consumare da ribilanciare.");
  if(excess<=50)return alert("✅ Sei in linea con la giornata: pasti rimanenti ~"+remPlanned+" kcal, budget residuo ~"+Math.max(0,budget)+" kcal (su "+dayPlan+" pianificate). Nessun ribilanciamento necessario.");
  if(!aiOn())return aiFail(new Error("nokey"));
  const list=remaining.map(it=>{const o=mealOpt(it.pdi,it.mi);return {slot:it.slot,desc:o.d,kcal:o.k,prot:o.p};});
  const targetRem=Math.max(remaining.length*minMealKcal(),budget); // mai sotto ~250 kcal/pasto
  try{
    const t=await aiAsk('Devo restare dentro un budget di circa '+Math.round(targetRem)+' kcal TOTALI per questi pasti rimanenti di oggi (ora sommano '+remPlanned+' kcal): '+JSON.stringify(list)+'. REGOLE OBBLIGATORIE: (1) usa i valori nutrizionali REALI degli alimenti nelle quantità che scrivi, mai numeri adattati per far tornare il conto; (2) per ridurre parti sempre ABBASSANDO LE GRAMMATURE degli ingredienti (es. "pasta 80g"→"pasta 60g"); (3) SOLO se il pasto così diventa poco saziante, sostituisci un ingrediente con uno più leggero e voluminoso (es. parte dei carboidrati con verdure); (4) è vietato lasciare la descrizione uguale abbassando solo i numeri; (5) NESSUN pasto va eliminato o ridotto sotto ~250 kcal: meglio restare un poco sopra il budget. Riduci carboidrati e grassi, MAI le proteine. La SOMMA delle kcal proposte deve essere vicina a '+Math.round(targetRem)+'. '+dietStr()+' Rispondi SOLO JSON array: [{"slot":"...","desc":"descrizione COMPLETA con le nuove grammature","kcal":n,"prot":n}]');
    const arr=parseAIJSON(t);
    // scarta le proposte "furbe": kcal più basse ma descrizione identica = barare
    const valid=arr.filter(a=>{const it=remaining.find(r=>r.slot===a.slot);if(!it)return false;
      const o=mealOpt(it.pdi,it.mi);
      return String(a.desc).trim()!==String(o.d).trim()||Math.round(a.kcal)>=o.k;});
    if(!valid.length)return alert("L'AI non ha proposto grammature nuove valide: riprova.");
    let msg="Ribilanciamento (budget residuo ~"+Math.max(0,budget)+" kcal, eccesso "+excess+" kcal):\n";
    valid.forEach(a=>{const it=remaining.find(r=>r.slot===a.slot);const o=mealOpt(it.pdi,it.mi);
      msg+="\n• "+a.slot+" ("+o.k+"→"+Math.round(a.kcal)+" kcal): "+a.desc+" (~"+a.prot+"p)";});
    if(!confirm(msg+"\n\nOK = applica ai pasti rimanenti"))return;
    valid.forEach(a=>{const it=remaining.find(r=>r.slot===a.slot);if(it)
      S.week.days[it.pdi].meals[it.mi].custom={d:a.desc+" (ribilanciato)",k:Math.round(a.kcal),p:Math.round(a.prot)};});
    save();render(cur);
  }catch(e){aiFail(e);}};
/* 🔁 Recupero del GIORNO SUCCESSIVO: alleggerisce pranzo e cena di toDi per
   assorbire l'eccesso (surplus) di fromDi. Avvisa, propone e applica solo se
   l'utente conferma. Segna il giorno come già ribilanciato per non insistere. */
window.rebalanceNextDay=async(fromDi,toDi)=>{
  // eccesso del giorno passato = mangiato − pianificato dell'INTERA giornata
  const sg=Math.max(0,Math.round(eatenOfDay(fromDi).k-plannedOfDay(fromDi).k));
  if(sg<=50)return alert("✅ "+PLAN[fromDi].day+" non risulta sforato (mangiate "+eatenOfDay(fromDi).k+" su "+plannedOfDay(fromDi).k+" pianificate): pasti di oggi invariati.");
  if(!aiOn())return aiFail(new Error("nokey"));
  const mains=dayItems(toDi).filter(it=>{const st=S.week.days[it.pdi].meals[it.mi];
    return !st.done&&!st.skip&&PLAN[it.pdi].meals[it.mi].type==="norm";});
  if(!mains.length)return alert("Non ci sono pasti ancora da consumare da alleggerire.");
  const list=mains.map(it=>{const o=mealOpt(it.pdi,it.mi);return {slot:it.slot,desc:o.d,kcal:o.k,prot:o.p};});
  const remPlanned=list.reduce((a,x)=>a+x.kcal,0);
  const targetRem=Math.max(mains.length*minMealKcal(),remPlanned-sg);
  try{
    const t=await aiAsk('Ieri ho ecceduto di '+sg+' kcal. Alleggerisci i pasti di OGGI ancora da consumare (ora sommano '+remPlanned+' kcal) portandone la SOMMA vicino a '+Math.round(targetRem)+' kcal. REGOLE OBBLIGATORIE: (1) i valori nutrizionali devono essere quelli REALI degli alimenti nelle quantità che scrivi, mai adattati per far tornare il conto; (2) per ridurre le kcal RISCRIVI il pasto: prima sostituisci ingredienti con alternative più leggere, e se non basta ABBASSA LE GRAMMATURE (es. "riso 90g"→"riso 60g") o togli componenti; (3) è vietato lasciare la descrizione uguale abbassando solo i numeri; (4) se col cibo scelto non riesci a rientrare nel totale, riduci ancora le quantità: meglio un totale leggermente diverso ma VERO che numeri falsi. Riduci carboidrati e grassi (MAI le proteine), senza scendere sotto ~250 kcal a pasto. Pasti: '+JSON.stringify(list)+'. '+dietStr()+' Rispondi SOLO JSON array: [{"slot":"...","desc":"descrizione COMPLETA con le nuove grammature","kcal":n,"prot":n}]');
    const arr=parseAIJSON(t);
    const valid=arr.filter(a=>{const it=mains.find(r=>r.slot===a.slot);if(!it)return false;
      const o=mealOpt(it.pdi,it.mi);
      return String(a.desc).trim()!==String(o.d).trim()||Math.round(a.kcal)>=o.k;});
    if(!valid.length)return alert("L'AI non ha proposto grammature nuove valide: riprova.");
    let msg="Recupero dello sforo di "+PLAN[fromDi].day+" (~"+sg+" kcal):\n";
    valid.forEach(a=>{const it=mains.find(r=>r.slot===a.slot);const o=mealOpt(it.pdi,it.mi);
      msg+="\n• "+a.slot+" ("+o.k+"→"+Math.round(a.kcal)+" kcal): "+a.desc+" (~"+a.prot+"p)";});
    if(!confirm(msg+"\n\nOK = applica ai pasti di oggi"))return;
    valid.forEach(a=>{const it=mains.find(r=>r.slot===a.slot);if(it)
      S.week.days[it.pdi].meals[it.mi].custom={d:a.desc+" (recupero)",k:Math.round(a.kcal),p:Math.round(a.prot)};});
    S.week.days[toDi].rebalancedFrom=fromDi;save();render(cur);
    alert("Fatto: pasti di oggi alleggeriti per recuperare lo sforo di "+PLAN[fromDi].day+".");
  }catch(e){aiFail(e);}};
/* ═══ RGP — Recupero dei giorni precedenti (v5.2) ═══════════════════
   Principi:
   • SOGLIA DI TOLLERANZA: sotto una certa quota lo sforo non si recupera
     (rientra nell'errore di stima delle porzioni). Default: 10% del
     pianificato del giorno, con un minimo di 150 kcal — regolabile in Io.
   • MAI GIORNI DI DIGIUNO: in un giorno si recupera al massimo una quota
     del pianificato (default 25%), e i pasti non scendono sotto ~250 kcal.
     Se lo sforo è grande, il resto si recupera nei giorni successivi.
   • Recupero PARZIALE tracciato: ogni giorno sforato ricorda quanto è già
     stato recuperato, così non si conta due volte. */
function minMealKcal(){return (S.profile.minMeal!=null?+S.profile.minMeal:250);}
function rgpThresh(di){ // kcal sotto le quali NON vale la pena recuperare
  const pct=(S.profile.rgpPct!=null?+S.profile.rgpPct:10);
  const min=(S.profile.rgpMin!=null?+S.profile.rgpMin:150);
  return Math.max(min,Math.round(plannedOfDay(di).k*pct/100));}
function rgpCapPct(){return (S.profile.rgpCap!=null?+S.profile.rgpCap:25);}
function rgpCapMax(){return (S.profile.rgpCapMax!=null?+S.profile.rgpCapMax:400);}
function overOfDay(di){return Math.round(eatenOfDay(di).k-plannedOfDay(di).k);}
function residualOfDay(di){ // sforo ancora da recuperare (al netto di quanto già fatto)
  return Math.max(0,overOfDay(di)-(S.week.days[di].rgpRecovered||0));}
function rgpDays(di){
  const out=[];
  const maxD=Math.max(1,Math.min(7,+S.profile.rgpDays||5));
  for(let d=di-1;d>=0&&out.length<maxD;d--){ // giorni precedenti considerati (Regole)
    const res=residualOfDay(d),th=rgpThresh(d);
    out.push({di:d,over:overOfDay(d),res,th,tracked:eatenOfDay(d).k>0,
      done:(S.week.days[d].rgpRecovered||0)>0&&res<th,
      todo:eatenOfDay(d).k>0&&res>=th});}
  return out;}
function rgpRowHTML(di){
  const days=rgpDays(di);if(!days.length)return "";
  const over=days.filter(d=>d.todo);
  const tot=over.reduce((a,d)=>a+d.res,0);
  const lbl=`<span style="font-size:12.5px;color:var(--grigio);font-weight:700;margin-left:auto" title="RGP — Recupero dei giorni precedenti">Recupero</span>`;
  if(!over.length)return lbl+`<span class="badge" title="Nessuno degli ultimi 5 giorni supera la soglia di recupero (impostabile in Io)">✅ niente da recuperare</span>`;
  const opts=[`<option value="all" selected>Tutti · +${tot} kcal</option>`]
    .concat(over.map(d=>`<option value="${d.di}">${PLAN[d.di].day} · +${d.res} kcal</option>`)).join("");
  return lbl+`<select id="rgpSel" style="max-width:150px;min-width:110px;font-size:12px;flex-shrink:1" title="Calorie ancora da recuperare degli ultimi 5 giorni">${opts}</select>
  <button class="btn small" style="white-space:nowrap;flex-shrink:0" onclick="rgpRun(${di})" title="Alleggerisce i pasti di oggi non ancora spuntati, senza mai farti saltare un pasto">⚖️ Recupera</button>`;}
window.rgpRun=async(toDi)=>{
  const el=document.getElementById("rgpSel");const v=el?el.value:"";
  const over=rgpDays(toDi).filter(d=>d.todo);
  const sel=(v==="all")?over.map(d=>d.di):(v===""?[]:[+v]);
  if(!sel.length)return alert("Nella tendina Recupero scegli cosa recuperare.");
  const tot=sel.reduce((a,d)=>a+residualOfDay(d),0);
  if(!tot)return alert("✅ Non c'è nulla da recuperare: pasti di oggi invariati.");
  if(!aiOn())return aiFail(new Error("nokey"));
  const mains=dayItems(toDi).filter(it=>{const st=S.week.days[it.pdi].meals[it.mi];
    return !st.done&&!st.skip&&PLAN[it.pdi].meals[it.mi].type==="norm";});
  if(!mains.length)return alert("Non ci sono pasti di oggi ancora da consumare da alleggerire.");
  const list=mains.map(it=>{const o=mealOpt(it.pdi,it.mi);return {slot:it.slot,desc:o.d,kcal:o.k,prot:o.p};});
  const remPlanned=list.reduce((a,x)=>a+x.kcal,0);
  // tetto giornaliero: mai più di X% del pianificato, e mai sotto ~250 kcal a pasto
  const capDay=Math.min(Math.round(plannedOfDay(toDi).k*rgpCapPct()/100),rgpCapMax());
  const floor=mains.length*minMealKcal();
  const cut=Math.max(0,Math.min(tot,capDay,remPlanned-floor));
  if(cut<50)return alert("Oggi non c'è margine per recuperare senza farti saltare un pasto (restano "+mains.length+" pasti da ~"+Math.round(remPlanned/mains.length)+" kcal). Meglio rimandare a domani.");
  const targetRem=remPlanned-cut;
  const nomi=sel.map(d=>PLAN[d].day).join(", ");
  try{
    const t=await aiAsk('Devo recuperare '+cut+' kcal di sforo dei giorni '+nomi+' alleggerendo i pasti di OGGI ancora da consumare (ora sommano '+remPlanned+' kcal): la loro SOMMA deve arrivare vicino a '+targetRem+' kcal. REGOLE OBBLIGATORIE: (1) usa i valori nutrizionali REALI degli alimenti nelle quantità che scrivi, mai numeri adattati per far tornare il conto; (2) per ridurre parti sempre ABBASSANDO LE GRAMMATURE degli ingredienti (es. "riso 90g"→"riso 60g"); (3) SOLO se il pasto così diventa poco saziante, sostituisci un ingrediente con uno più leggero e voluminoso (es. parte del riso con verdure); (4) è vietato lasciare la descrizione uguale abbassando solo i numeri; (5) NESSUN pasto va eliminato o ridotto sotto ~250 kcal: meglio recuperare meno del richiesto. Riduci carboidrati e grassi, MAI le proteine. Pasti: '+JSON.stringify(list)+'. '+dietStr()+' Rispondi SOLO JSON array: [{"slot":"...","desc":"descrizione COMPLETA con le nuove grammature","kcal":n,"prot":n}]');
    const arr=parseAIJSON(t);
    const valid=arr.filter(a=>{const it=mains.find(r=>r.slot===a.slot);if(!it)return false;
      const o=mealOpt(it.pdi,it.mi);
      return String(a.desc).trim()!==String(o.d).trim()||Math.round(a.kcal)>=o.k;});
    if(!valid.length)return alert("L'AI non ha proposto grammature nuove valide: riprova.");
    let applied=0;
    valid.forEach(a=>{const it=mains.find(r=>r.slot===a.slot);const o=mealOpt(it.pdi,it.mi);
      applied+=Math.max(0,o.k-Math.round(a.kcal));});
    let msg="Recupero da "+nomi+" — "+applied+" kcal di alleggerimento oggi";
    if(applied<tot)msg+=" (restano ~"+(tot-applied)+" kcal, le recuperi nei prossimi giorni)";
    msg+=":\n";
    valid.forEach(a=>{const it=mains.find(r=>r.slot===a.slot);const o=mealOpt(it.pdi,it.mi);
      msg+="\n• "+a.slot+" ("+o.k+"→"+Math.round(a.kcal)+" kcal): "+a.desc;});
    if(!confirm(msg+"\n\nOK = applica ai pasti di oggi"))return;
    valid.forEach(a=>{const it=mains.find(r=>r.slot===a.slot);if(it)
      S.week.days[it.pdi].meals[it.mi].custom={d:a.desc+" (recupero)",k:Math.round(a.kcal),p:Math.round(a.prot)};});
    // ripartisci il recuperato sui giorni scelti, dal più vecchio
    let rest=applied;
    sel.slice().sort((a,b)=>a-b).forEach(d=>{if(rest<=0)return;
      const q=Math.min(rest,residualOfDay(d));
      S.week.days[d].rgpRecovered=(S.week.days[d].rgpRecovered||0)+q;rest-=q;});
    save();render(cur);
  }catch(e){aiFail(e);}};

/* Il piano è un MODELLO statico: niente spunte, niente extra (quelli stanno in
   Oggi). Le modifiche fatte qui (opzione / ✏️ / 🎲) sono PERMANENTI: restano
   effettive anche nelle settimane successive, perché vivono in S.permMeals. */
function templateOpt(pdi,mi){const perm=S.permMeals[pdi+"_"+mi];if(perm)return perm;return PLAN[pdi].meals[mi].o[0];}
function plannedTemplateOfDay(di){let k=0,p=0,c=0,f=0,fib=0,z=0;PLAN[di].meals.forEach((m,mi)=>{const o=templateOpt(di,mi);k+=o.k;p+=o.p;c+=(o.c||0);f+=(o.f||0);fib+=(o.fib||0);z+=(o.z||0);});return{k,p,c,f,fib,z};}
function mealCardStatic(pdi,mi){const m=PLAN[pdi].meals[mi];const o=templateOpt(pdi,mi);
  const permObj=S.permMeals[pdi+"_"+mi];const isCustom=!!permObj;
  let h=`<div class="meal"><div class="mbody">
    <div class="mtop"><span class="mname">${esc(m.n)}</span><span class="mtime">${m.t.replace(/\s*\(portatile\)/,"")}</span></div>
    <div class="mdesc">${esc(o.d)}</div>
    <div class="mkcal">~${o.k} kcal · ${o.p} g P${o.c!=null?` · ${o.c} g C`:""}${o.f!=null?` · ${o.f} g G`:""}${o.fib!=null?` · ${o.fib} g F`:""}${o.z!=null?` · ${o.z} g Z`:""} ${isCustom?'<span class="badge ai">modificato</span>':""}</div>`;
  if(m.o.length>1){h+=`<div class="mopts">`+m.o.map((x,oi)=>{
      const sel=isCustom?(permObj.d===x.d):(oi===0);
      return `<button class="${sel?"sel":""}" onclick="setPermOpt(${pdi},${mi},${oi})">Opzione ${oi+1}</button>`;}).join("")+`</div>`;}
  h+=`<div class="mtools" style="margin-top:4px">
    <button class="ibtn" title="Modifica permanente" onclick="editMealPerm(${pdi},${mi})">✏️</button>
    <button class="ibtn" title="Alternativa AI a parità di macro (permanente)" onclick="altMealPerm(${pdi},${mi})">🎲</button>`;
  if(isCustom)h+=`<button class="ibtn" title="Ripristina originale" onclick="resetPerm(${pdi},${mi})">↩️</button>`;
  h+=`</div></div></div>`;return h;}
window.setPermOpt=(d,m,oi)=>{const o=PLAN[d].meals[m].o[oi];
  if(oi===0)delete S.permMeals[d+"_"+m];else S.permMeals[d+"_"+m]={d:o.d,k:o.k,p:o.p,c:o.c!=null?o.c:null,f:o.f!=null?o.f:null};
  save();render("piano");};
window.resetPerm=(d,m)=>{delete S.permMeals[d+"_"+m];save();render("piano");};
window.editMealPerm=async(d,m)=>{const o=templateOpt(d,m);const nd=prompt("Modifica permanente del piano (resta effettiva sempre):",o.d);
  if(nd==null||!nd.trim())return;let k=o.k,p=o.p,c=o.c,f=o.f;
  if(aiOn()&&confirm("Vuoi che l'AI ristimi kcal e macro del pasto modificato?")){
    try{const t=await aiAsk('Stima calorie e macro di questo pasto: "'+nd+'". Rispondi SOLO JSON: {"kcal":numero,"prot":numero,"carb":numero,"gras":numero}');
      const j=parseAIJSON(t);k=Math.round(j.kcal);p=Math.round(j.prot);c=Math.round(j.carb)||null;f=Math.round(j.gras)||null;}catch(e){aiFail(e);return;}}
  S.permMeals[d+"_"+m]={d:nd.trim(),k,p,c,f};save();render("piano");};
window.altMealPerm=async(d,m)=>{if(!aiOn())return aiFail(new Error("nokey"));const o=templateOpt(d,m);
  try{const t=await aiAsk('Genera UN piatto completamente diverso da "'+o.d+'" ma con circa '+o.k+' kcal e '+o.p+' g di proteine. '+dietStr()+' Ingredienti comuni in Italia con grammature. Rispondi SOLO JSON: {"piatto":"descrizione con grammature","kcal":numero,"prot":numero,"carb":numero,"gras":numero}');
    const j=parseAIJSON(t);
    if(!confirm("Alternativa permanente:\n"+j.piatto+"\n~"+Math.round(j.kcal)+" kcal · ~"+Math.round(j.prot)+" g P\n\nOK = usala sempre nel piano"))return;
    S.permMeals[d+"_"+m]={d:j.piatto,k:Math.round(j.kcal),p:Math.round(j.prot),c:Math.round(j.carb)||null,f:Math.round(j.gras)||null};save();render("piano");}catch(e){aiFail(e);}};
function renderPiano(){const el=document.getElementById("pg-piano");const ti=wd(new Date());
  let h=`<div class="card"><h2>La tua settimana</h2>
  <div class="hint">Questo è il tuo <b>piano</b>: un modello fisso. Le modifiche qui (opzione · ✏️ · 🎲) restano <b>sempre effettive</b>, anche nelle settimane successive. Spunte, extra e tracciamento del giorno si fanno in <b>Oggi</b>. Il piano <b>non cambia</b> quando ribilanci o correggi un pasto in Oggi: resta il riferimento con cui confrontare quello che mangi davvero.</div>

function ring(pct,def){const r=72,c=2*Math.PI*r,off=c*(1-Math.min(1,pct));
  return `<div class="ringwrap"><svg width="170" height="170">
    <circle cx="85" cy="85" r="${r}" fill="none" stroke="var(--linea)" stroke-width="14"/>
    <circle cx="85" cy="85" r="${r}" fill="none" stroke="${def>=0?"#2F7D3B":"#B23B3B"}" stroke-width="14" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset .5s"/></svg>
    <div class="ringnum"><div class="v ${def>=0?"def":"sur"}">${def>=0?"−":"+"}${Math.abs(def)}</div>
    <div class="l">${def>=0?"kcal di deficit":"kcal di surplus"}</div></div></div>`;}
function stars(di,field){let h=`<div class="stars">`;
  for(let i=1;i<=5;i++)h+=`<span class="${S.week.days[di][field]>=i?"on":""}" onclick="setStar(${di},'${field}',${i})">⭐</span>`;

  <div class="mtools"><button class="btn ghost small" onclick="menuAI(${di})">Usa il testo</button></div>
  <div class="aibox" id="menuOut" style="display:none"></div></div>`;
  el.innerHTML=h;

  ["fridgeOut","menuOut"].forEach(id=>{const b=document.getElementById(id);

window.setWater=(d,i)=>{S.week.days[d].water=(S.week.days[d].water===i+1?i:i+1);save();render("oggi");};

/* ═══════════════════════════════════════════════════════════════
   11. SCANNER BARCODE v5 (Html5-Qrcode + Open Food Facts)
   Più prodotti nella stessa sessione: scansiona → si accodano →
   modifichi i grammi → confermi la SOMMA. Il totale finisce nel
   pasto scelto (come "modificato") oppure come extra.
   ═══════════════════════════════════════════════════════════════ */
let scanner=null;
let SCANQ=null; // {di, pdi, mi, items:[{name,k100,p100,c100,f100,fib100,g}]}
window.scanStart=(di,pdi,mi,ei)=>{
  if(window._noScan||typeof Html5Qrcode==="undefined")return alert("Scanner non disponibile: serve internet al primo avvio per caricare la libreria.");
  SCANQ={di,pdi:(pdi!=null?pdi:null),mi:(mi!=null?mi:null),ei:(ei!=null?ei:null),items:[]};
  renderScanQ();scanOne();};
window.startScan=(di)=>scanStart(di,null,null); // compatibilità
function scanOne(){
  const box=document.getElementById("scanLive");if(box)box.style.display="block";
  try{scanner=new Html5Qrcode("scanreader2");}catch(_){return;}
  scanner.start({facingMode:"environment"},{fps:10,qrbox:{width:230,height:120}},
    async code=>{await stopCam();
      try{
        const r=await fetch("https://world.openfoodfacts.org/api/v0/product/"+code+".json");
        const j=await r.json();
        if(j.status!==1){alert("Prodotto non trovato su Open Food Facts. Aggiungilo a mano con ＋.");renderScanQ();return;}
        const nm=j.product.product_name||"Prodotto",nu=j.product.nutriments||{};
        SCANQ.items.push({name:nm,
          k100:Math.round(nu["energy-kcal_100g"]||0),
          p100:Math.round((nu["proteins_100g"]||0)*10)/10,
          c100:Math.round((nu["carbohydrates_100g"]||0)*10)/10,
          f100:Math.round((nu["fat_100g"]||0)*10)/10,
          fib100:Math.round((nu["fiber_100g"]||0)*10)/10,
          z100:Math.round((nu["sugars_100g"]||0)*10)/10,
          g:100});
        renderScanQ();
      }catch(e){alert("Errore di rete verso Open Food Facts.");renderScanQ();}
    },()=>{}).catch(()=>{alert("Fotocamera non disponibile (permessi o contesto non sicuro).");});}
async function stopCam(){if(scanner){try{await scanner.stop();}catch(_){}scanner=null;}
  const b=document.getElementById("scanLive");if(b)b.style.display="none";}
window.stopScan=()=>{stopCam();const b=document.getElementById("scanbox");if(b)b.style.display="none";};
function scanTotals(){let k=0,p=0,c=0,f=0,fib=0,z=0;
  SCANQ.items.forEach(it=>{const r=it.g/100;k+=it.k100*r;p+=it.p100*r;c+=it.c100*r;f+=it.f100*r;fib+=(it.fib100||0)*r;z+=(it.z100||0)*r;});
  return{k:Math.round(k),p:Math.round(p),c:Math.round(c),f:Math.round(f),fib:Math.round(fib),z:Math.round(z)};}
window.scanG=(i,v)=>{SCANQ.items[i].g=Math.max(0,parseFloat(v)||0);renderScanQ(true);};
window.scanDel=(i)=>{SCANQ.items.splice(i,1);renderScanQ();};
window.scanManual=()=>{const n=prompt("Nome prodotto:");if(!n)return;
  const k=parseFloat(prompt("kcal per 100 g:","100"))||0,p=parseFloat(prompt("proteine per 100 g:","5"))||0;
  SCANQ.items.push({name:n,k100:k,p100:p,c100:0,f100:0,fib100:0,z100:0,g:100});renderScanQ();};
window.scanMore=()=>{renderScanQ();scanOne();};
window.scanConfirm=()=>{
  if(!SCANQ.items.length)return alert("Nessun prodotto in lista.");
  const t=scanTotals();
  const desc=SCANQ.items.map(it=>it.name+" "+it.g+"g").join(" + ");
  if(SCANQ.pdi!=null&&SCANQ.mi!=null){ // dentro un pasto: aggiorna il pasto (spunta a te)
    S.week.days[SCANQ.pdi].meals[SCANQ.mi].custom={d:desc+" (da barcode)",k:t.k,p:t.p,c:t.c,f:t.f,fib:t.fib,z:t.z};
    toast("Pasto aggiornato dai barcode ✓");
  }else if(SCANQ.ei!=null&&S.week.days[SCANQ.di].extras[SCANQ.ei]){ // dentro un extra: lo compila
    Object.assign(S.week.days[SCANQ.di].extras[SCANQ.ei],{d:desc,k:t.k,p:t.p,c:t.c,f:t.f,fib:t.fib,z:t.z});
    toast("Extra compilato dai barcode ✓");
  }else{
    S.week.days[SCANQ.di].extras.push({d:desc,k:t.k,p:t.p,c:t.c,f:t.f,fib:t.fib,z:t.z,st:"done"});
    toast("Extra aggiunto dai barcode ✓");}
  closeScanQ();save();render(cur);};
window.closeScanQ=()=>{stopCam();SCANQ=null;const m=document.getElementById("scanM");if(m)m.remove();};
function renderScanQ(){
  let m=document.getElementById("scanM");
  if(!m){m=document.createElement("div");m.id="scanM";m.className="modal";document.body.appendChild(m);}
  const t=SCANQ.items.length?scanTotals():null;
  let inner=`<div class="mcard"><h2 style="color:var(--bosco);font-size:16px">📷 Barcode — ${SCANQ.pdi!=null?"per il pasto "+esc(PLAN[SCANQ.pdi].meals[SCANQ.mi].n):(SCANQ.ei!=null?"per questo extra":"come extra")}</h2>
  <div class="hint">Scansiona <b>più prodotti</b> uno dopo l'altro, correggi i <b>grammi</b> e conferma la <b>somma</b>.</div>
  <div id="scanLive" style="display:none;margin-top:8px"><div id="scanreader2" style="width:100%;border-radius:14px;overflow:hidden"></div>
  <button class="btn warn small" onclick="stopCam();renderScanQ()">Ferma fotocamera</button></div>`;
  SCANQ.items.forEach((it,i)=>{inner+=`<div class="wline"><span style="flex:1">${esc(it.name)}<br><small style="color:var(--grigio)">${it.k100} kcal · ${it.p100} g P /100g</small></span>
    <input type="number" value="${it.g}" style="width:74px" onchange="scanG(${i},this.value)"> <small>g</small>
    <span class="del" onclick="scanDel(${i})">✕</span></div>`;});
  if(t)inner+=`<div class="daytotal" style="padding-top:8px">Totale: <span>~${t.k} kcal · ${t.p} g P · ${t.c} g C · ${t.f} g G · ${t.fib} g F · ${t.z} g Z</span></div>`;
  inner+=`<div class="mtools" style="margin-top:10px">
    <button class="btn ghost small" onclick="scanMore()">📷 Scansiona ${SCANQ.items.length?"un altro":""}</button>
    <button class="btn ghost small" onclick="scanManual()">＋ A mano</button></div>
  <div class="mtools" style="margin-top:8px">
    <button class="btn small" onclick="scanConfirm()">✅ Conferma somma</button>
    <button class="btn warn small" onclick="closeScanQ()">Annulla</button></div></div>`;
  m.innerHTML=inner;}

/* ═══════════════════════════════════════════════════════════════
   12. PAGINA SPESA (link supermercato, sostituzioni AI, prodotti salvati, WhatsApp)
   ═══════════════════════════════════════════════════════════════ */
/* Costruisce il link di ricerca: usa il modello personale se impostato
   (con {q} = termine pulito e codificato), altrimenti apre solo la home
   del sito del TUO supermercato (nessun link indovinato). */
function shopLink(text){
  const q=encodeURIComponent(shopQ(text));
  if(S.shopTpl&&S.shopTpl.includes("{q}"))return safeUrl(S.shopTpl.replace("{q}",q));
  return "";}
function shopQ(t){ // pulizia testo per la ricerca sul sito del supermercato
  return t.replace(/\(.*?\)/g,"").replace(/~|≈/g,"")
    .replace(/\b(crudi|crudo|crude|cruda|secca|secchi|freschi|fresco|SENZA|senza|surgelati|surgelata|opz\.?)\b/gi,"")
    .replace(/[0-9]+([.,][0-9]+)?\s*(g|kg|l|ml|pz)?/gi,"").replace(/[—–-].*$/,"")
    .replace(/\s+/g," ").trim();}
window.subAI=async(txt)=>{
  if(!aiOn())return aiFail(new Error("nokey"));
  try{const t=await aiAsk('Al supermercato è esaurito: "'+txt+'". Suggerisci 2-3 alternative acquistabili in un supermercato italiano, coerenti con una dieta senza lattosio, senza aglio/cipolla/pomodoro e basso FODMAP. Elenco brevissimo, testo semplice.');
    alert("Alternative per: "+txt+"\n\n"+t);}catch(e){aiFail(e);}};
const SHOPCUR=()=>S.customShop&&S.customShop.length?S.customShop:SHOP;
/* Genera la lista della spesa dal piano attuale (per i piani personalizzati) */
window.genShop=async()=>{
  if(!aiOn())return aiFail(new Error("nokey"));
  if(!confirm("Genero la lista della spesa dal piano attuale? Sostituisce quella corrente."))return;
  try{
    const meals=PLAN.map(d=>d.meals.filter(m=>m.type==="norm").map(m=>m.o[0].d)).flat();
    const t=await aiAsk("Da questi pasti settimanali crea una lista della spesa per UNA persona, raggruppata in 5-7 categorie con quantita totali stimate. Pasti: "+JSON.stringify(meals)+' Rispondi SOLO JSON: [["CATEGORIA",["voce 1","voce 2"]],...]');
    const arr=parseAIJSON(t);
    if(!Array.isArray(arr)||!arr.length)throw new Error("formato");
    S.customShop=arr.map(x=>[String(x[0]),x[1].map(String)]);S.shop={};save();render("spesa");
  }catch(e){aiFail(e);}};

/* ═══════════════════════════════════════════════════════════════
   SPESA DAL PIANO (senza AI): calcola la lista considerando per ogni
   pasto UNA SOLA opzione — sempre quella "a casa" (mai mensa, mai il
   LIBERO che prevede di mangiare fuori). Così se poi mangi fuori, la
   roba avanzata resta buona per la settimana dopo. Sincronizzazione
   con anteprima delle differenze e conferma esplicita.
   ═══════════════════════════════════════════════════════════════ */
/* Opzione "a casa" di un pasto per la spesa (o null se si mangia fuori) */
function homeOptForShop(m){
  if(!m||!m.o||!m.o.length)return null;
  if(m.type==="mensa")return null; // pranzo in mensa: nessun ingrediente da comprare
  if(m.type==="free"){ // tra le due opzioni scegli quella NON "fuori"
    const home=m.o.find(o=>!/^\s*(libero|mensa)\b/i.test(o.d||""));
    return home||null;
  }
  return m.o[0];
}
/* Categoria della spesa in base a parole chiave dell'ingrediente */
function shopCatOf(s){s=(s||"").toLowerCase();
  if(/kefir|yogurt/.test(s))return "KEFIR / YOGURT";
  if(/pollo|salmone|branzino|vitello|prosciutto|tonno|uova|uovo|fiocchi di latte|caprino|scamorza|parmigiano|piselli|carne|pesce/.test(s))return "PROTEINE";
  if(/patate|patata|quinoa|pasta|pane|crostini|crostino|zuppa|gelato|cornetto|riso|avena/.test(s))return "CARBOIDRATI";
  if(/insalata|valeriana|verdura|verdure|carote|cetriol|cipollotto|rucola|spinaci/.test(s))return "VERDURA";
  if(/frutta|frutto|frutti di bosco|limone|mela|banana/.test(s))return "FRUTTA";
  if(/evo|olio|semi|noci|noce|avocado|olive|tisana|tisane/.test(s))return "GRASSI, SEMI, DISPENSA";
  return "ALTRO";
}
/* Pulisce un pezzo di descrizione ("Pollo 200g" ecc.) */
function cleanIngredient(x){return (x||"").replace(/^\s*(libero|mensa)\s*:\s*/i,"").replace(/\s+/g," ").trim();}
/* Chiave per de-duplicare ingredienti simili ignorando le grammature */
function ingrKey(x){return cleanIngredient(x).toLowerCase().replace(/\d+[.,]?\d*\s*(g|kg|ml|l|gr|scatolette?|pallina)?/g,"").replace(/[^a-zàèéìòù ]/g,"").replace(/\s+/g," ").trim();}
/* Costruisce la lista della spesa dal piano (opzioni a casa) */
function buildShopFromPlan(){
  const byCat={};const order=["PROTEINE","KEFIR / YOGURT","CARBOIDRATI","VERDURA","FRUTTA","GRASSI, SEMI, DISPENSA","ALTRO"];
  const seen={};
  PLAN.forEach(function(d){d.meals.forEach(function(m){
    const o=homeOptForShop(m);if(!o)return;
    (o.d||"").split("+").forEach(function(part){
      const ing=cleanIngredient(part);if(!ing)return;
      const key=ingrKey(ing);if(!key||seen[key])return;seen[key]=true;
      const cat=shopCatOf(ing);(byCat[cat]=byCat[cat]||[]).push(ing);
    });
  });});
  const out=[];order.forEach(cat=>{if(byCat[cat]&&byCat[cat].length)out.push([cat,byCat[cat]]);});
  Object.keys(byCat).forEach(cat=>{if(!order.includes(cat))out.push([cat,byCat[cat]]);});
  return out;
}
/* Insieme normalizzato di tutte le voci di una lista, per confrontarle */
function shopItemSet(arr){const m={};(arr||[]).forEach(([,items])=>items.forEach(it=>{m[ingrKey(it)]=it;}));return m;}
/* Sincronizza la lista con il piano: mostra le differenze e chiede conferma */
window.syncShopFromPlan=()=>{
  const next=buildShopFromPlan();
  if(!next.length)return alert("Nessun ingrediente ricavabile dal piano.");
  const cur=shopItemSet(SHOPCUR());const nw=shopItemSet(next);
  const added=Object.keys(nw).filter(k=>!cur[k]).map(k=>nw[k]);
  const removed=Object.keys(cur).filter(k=>!nw[k]).map(k=>cur[k]);
  let m=document.getElementById("syncM");
  if(!m){m=document.createElement("div");m.id="syncM";m.className="modal";document.body.appendChild(m);}
  let inner=`<div class="mcard"><h2 style="color:var(--bosco);font-size:16px">🔄 Sincronizza la spesa col piano</h2>
    <div class="hint" style="margin-top:4px">Calcolata considerando <b>una sola opzione per pasto</b>, sempre quella a casa (mai mensa/fuori). Ecco cosa cambierebbe rispetto alla lista attuale:</div>`;
  if(!added.length&&!removed.length)inner+=`<div class="hint" style="margin-top:8px">Nessuna differenza: la lista è già allineata al piano ✓</div>`;
  if(added.length){inner+=`<div class="shopcat" style="color:var(--bosco)">➕ Da aggiungere (${added.length})</div><div class="shopitems">`;
    added.forEach(x=>inner+=`<div class="shopitem"><span class="st">${esc(x)}</span></div>`);inner+=`</div>`;}
  if(removed.length){inner+=`<div class="shopcat" style="color:var(--rosso)">➖ Non più nel piano (${removed.length})</div><div class="shopitems">`;
    removed.forEach(x=>inner+=`<div class="shopitem"><span class="st">${esc(x)}</span></div>`);inner+=`</div>`;}
  inner+=`<div class="hint" style="margin-top:8px">La lista completa risultante avrà ${next.reduce((a,c)=>a+c[1].length,0)} voci in ${next.length} categorie.</div>
    <div class="mtools" style="margin-top:12px">
      <button class="btn small" onclick="applyShopSync()">✅ Applica</button>
      <button class="btn ghost small" onclick="document.getElementById('syncM').remove()">Annulla</button></div></div>`;
  m.innerHTML=inner;
  window._pendingShop=next;
};
window.applyShopSync=()=>{if(!window._pendingShop)return;
  S.customShop=window._pendingShop.map(x=>[String(x[0]),x[1].map(String)]);
  S.shop={};window._pendingShop=null;save();
  const el=document.getElementById("syncM");if(el)el.remove();
  render("spesa");toast("Lista sincronizzata col piano ✓");};
/* Rende la lista modificabile: alla prima modifica copia quella corrente */
function ensureCustomShop(){if(!S.customShop||!S.customShop.length)S.customShop=SHOPCUR().map(x=>[String(x[0]),x[1].slice()]);}
window.removeShopItem=(ci,ii)=>{ensureCustomShop();const cat=S.customShop[ci];if(!cat)return;
  cat[1].splice(ii,1);if(!cat[1].length)S.customShop.splice(ci,1);S.shop={};save();render("spesa");};
window.addShopItem=(ci)=>{ensureCustomShop();const cat=S.customShop[ci];if(!cat)return;
  const v=prompt("Aggiungi un prodotto a “"+cat[0]+"”");if(!v||!v.trim())return;
  cat[1].push(v.trim());save();render("spesa");};
window.addShopCat=()=>{ensureCustomShop();const c=prompt("Nome della nuova categoria (es. SNACK)");if(!c||!c.trim())return;
  const first=prompt("Primo prodotto della categoria")||"";
  S.customShop.push([c.trim().toUpperCase(),first.trim()?[first.trim()]:[]]);save();render("spesa");};
window.resetShopToPlan=()=>{if(!confirm("Ripristino la lista originale del piano? Le modifiche manuali andranno perse."))return;
  S.customShop=null;S.shop={};save();render("spesa");};

function renderSpesa(){const el=document.getElementById("pg-spesa");
  let h=`<div class="card"><h2>🔗 Link di ricerca del tuo supermercato</h2>
  <div class="hint">I supermercati online di solito richiedono prima la scelta del negozio, quindi non esiste un link universale. Vai sul sito del <b>tuo</b> supermercato, cerca un prodotto qualsiasi, copia l'indirizzo ottenuto e incollalo qui sotto sostituendo il termine cercato con <b>{q}</b>.</div>

  if(S.customPlan)h+=`<div class="card"><div class="hint">Piano personalizzato attivo: la lista qui sotto ${S.customShop?"è stata generata/modificata dal tuo piano":"è ancora quella del piano originale"}.</div><button class="btn ghost small" onclick="genShop()">🛒 ${S.customShop?"Rigenera":"Genera"} lista dal piano (AI)</button></div>`;

        <button class="ibtn" title="Alternativa AI" onclick="subAI('${it.replace(/'/g,"\\'")}')">🤖</button>

  h+=`<div class="mtools" style="margin-top:8px"><button class="btn ghost small" onclick="addShopCat()">+ Nuova categoria</button>`;
  if(S.customShop)h+=`<button class="btn ghost small" onclick="resetShopToPlan()">↩️ Ripristina dal piano</button>`;

window.saveShopTpl=()=>{const v=document.getElementById("cTpl").value.trim();
  if(v&&!v.includes("{q}"))return alert("Il modello deve contenere {q} al posto del termine cercato.");
  S.shopTpl=v;save();alert(v?"Modello salvato: i link ora puntano al tuo negozio.":"Modello rimosso: senza modello i link di ricerca non sono attivi.");render("spesa");};
window.tglShop=id=>{S.shop[id]=!S.shop[id];save();render("spesa");};
window.resetShop=()=>{S.shop={};save();render("spesa");};
window.addLink=()=>{const n=prompt("Nome prodotto (es. Kefir XYZ 500g)");if(!n)return;
  const u=safeUrl(prompt("Incolla il link del prodotto sul sito del supermercato"));if(!u)return alert("Link non valido: deve iniziare con http(s)://");
  S.links.push({n,u});save();render("spesa");};
window.delLink=i=>{S.links.splice(i,1);save();render("spesa");};
window.waShop=()=>{let t="🛒 *Spesa della settimana*%0A";
  SHOPCUR().forEach(([cat,items],ci)=>{const rest=items.filter((x,ii)=>!S.shop[ci+"_"+ii]);
    if(rest.length){t+="%0A*"+cat+"*%0A";rest.forEach(x=>t+="• "+encodeURIComponent(x)+"%0A");}});
  window.open("https://wa.me/?text="+t,"_blank");};

/* ═══════════════════════════════════════════════════════════════

       check TDEE), grafici Chart.js, WhatsApp, Report PDF
