<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<!-- ══════════ SICUREZZA: Content-Security-Policy ══════════
     Limita da dove possono arrivare script e verso dove l'app può connettersi.
     Anche in caso di iniezione, i dati non possono uscire verso domini estranei. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self' blob: data:; script-src 'unsafe-inline' https://cdn.jsdelivr.net https://accounts.google.com; style-src 'unsafe-inline'; img-src 'self' data: blob:; connect-src https://generativelanguage.googleapis.com https://world.openfoodfacts.org https://www.googleapis.com https://accounts.google.com http://localhost:11434 http://127.0.0.1:11434; frame-src https://accounts.google.com; worker-src blob:; media-src 'self' blob:; object-src 'none'; base-uri 'none'">
<title>Il mio Diario — Dieta & Sport</title>

<!-- ══════════ LIBRERIE CDN con SRI (integrità verificata): se il file
     servito non corrisponde all'hash, il browser lo RIFIUTA. ══════════ -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.js" integrity="sha384-tgbB5AKnszdcfwcZtTfuhR3Ko1XZdlDfsLtkxiiAZiVkkXCkFmp+FQFh+V/UTo54" crossorigin="anonymous" defer onerror="window._noChart=1"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js" integrity="sha384-c9d8RFSL+u3exBOJ4Yp3HUJXS4znl9f+z66d1y54ig+ea249SpqR+w1wyvXz/lk+" crossorigin="anonymous" defer onerror="window._noScan=1"></script>

<style>
/* ══════════ TEMA: variabili per chiaro e scuro ══════════ */
:root{
  --bosco:#14532D; --salvia:#2F7D3B; --menta:#E7F2E4; --crema:#F4F7F2; --card:#FFFFFF;
  --ink:#1E2A1E; --grigio:#68755F; --linea:#DFE8DB;
  --zaff:#C77A15; --zaffbg:#FCF1DF; --mensa:#2F5FA6; --mensabg:#EAF0FA;
  --rosso:#B23B3B; --rossobg:#F9ECEC; --ok:#2F7D3B; --okbg:#E7F2E4;
  --shadow:0 1px 3px rgba(20,40,20,.08),0 4px 14px rgba(20,40,20,.06);
  --hdr1:#0F3D20; --hdr2:#2F7D3B;
}
html[data-theme="dark"]{
  --bosco:#8FD3A0; --salvia:#5FB870; --menta:#173420; --crema:#0F1712; --card:#18241B;
  --ink:#E7F0E7; --grigio:#9DB09B; --linea:#2A3B2D;
  --zaff:#E8A44C; --zaffbg:#2E2413; --mensa:#7FA7E0; --mensabg:#16202F;
  --rosso:#E08484; --rossobg:#301A1A; --ok:#5FB870; --okbg:#173420;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 4px 14px rgba(0,0,0,.3);
  --hdr1:#0B2413; --hdr2:#1E5A2E;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--crema);color:var(--ink);font-size:15px;padding-bottom:78px;transition:background .25s,color .25s}
h1,h2,.dayname,.ringnum{font-family:Georgia,'Noto Serif',serif}
header{background:linear-gradient(130deg,var(--hdr1),var(--hdr2));color:#fff;padding:12px 14px 10px;position:sticky;top:0;z-index:50;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.hrow{display:flex;align-items:center;justify-content:space-between;gap:8px}
header h1{font-size:18px;font-weight:700}
.hbtns{display:flex;gap:6px;align-items:center}
.hbtn{border:0;background:rgba(255,255,255,.15);color:#fff;border-radius:9px;padding:6px 9px;font-size:15px;cursor:pointer}
.streak{background:rgba(255,255,255,.15);border-radius:9px;padding:6px 9px;font-size:13px;font-weight:700}
/* ══ Scorrimento date ══ */
.datebar{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:8px}
.datebar button{border:0;background:rgba(255,255,255,.18);color:#fff;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer}
.datebar .dt{font-size:13px;text-transform:capitalize;min-width:190px;text-align:center;cursor:pointer}
.datebar .dt small{display:block;font-size:10px;opacity:.8}
.page{display:none;padding:15px;max-width:640px;margin:0 auto}
.page.active{display:block;animation:fadein .18s ease}
@keyframes fadein{from{opacity:.4;transform:translateY(4px)}to{opacity:1;transform:none}}
.tabs{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--linea);display:flex;z-index:60;padding:4px 4px calc(4px + env(safe-area-inset-bottom))}
.tabs button{flex:1;border:0;background:none;padding:7px 2px 5px;font-size:10.5px;color:var(--grigio);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-radius:12px}
.tabs button .ic{font-size:19px;line-height:1}
.tabs button.on{color:var(--bosco);font-weight:700;background:var(--menta)}
.card{background:var(--card);border:1px solid var(--linea);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.card h2{font-size:16px;color:var(--bosco);margin-bottom:8px}
.dayname{font-size:22px;color:var(--bosco);margin:18px 0 1px;display:flex;align-items:center;gap:8px}
.dayctx{font-size:12px;color:var(--grigio);font-style:italic;margin-bottom:9px}
.meal{background:var(--card);border:1px solid var(--linea);border-left:4px solid var(--salvia);border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;gap:11px;align-items:flex-start;box-shadow:var(--shadow)}
.meal.free{border-left-color:var(--zaff);background:var(--zaffbg)}
.meal.mensa{border-left-color:var(--mensa);background:var(--mensabg)}
.meal.done{opacity:.6}.meal.done .mdesc{text-decoration:line-through}
.meal.skip{opacity:.6;border-left-color:var(--rosso)}
.meal.skip .mdesc{text-decoration:line-through;color:var(--rosso)}
.chk{min-width:28px;height:28px;border:2px solid var(--salvia);border-radius:50%;background:var(--card);cursor:pointer;font-size:15px;line-height:24px;text-align:center;color:#fff;transition:transform .1s}
.chk:active{transform:scale(.88)}
.meal.free .chk{border-color:var(--zaff)}
.chk.c{background:var(--salvia);border-color:var(--salvia)}
.meal.free .chk.c{background:var(--zaff);border-color:var(--zaff)}
.chk.s{background:var(--rosso)!important;border-color:var(--rosso)!important}
.mbody{flex:1;min-width:0}
.mtop{display:flex;justify-content:space-between;gap:6px;font-size:12px;margin-bottom:2px}
.mname{font-weight:700;color:var(--bosco)}
.meal.free .mname{color:var(--zaff)}
.meal.mensa .mname{color:var(--mensa)}
.meal.skip .mname{color:var(--rosso)}
.mtime{color:var(--grigio)}
.mdesc{font-size:13.5px;line-height:1.45}
.mkcal{font-size:12px;font-weight:700;color:var(--salvia);margin-top:3px}
.mopts{margin-top:7px;display:flex;flex-wrap:wrap;gap:5px}
.mopts button,.chipbtn{border:1.5px solid var(--linea);background:var(--card);border-radius:20px;padding:4px 11px;font-size:11.5px;cursor:pointer;color:var(--grigio)}
.mopts button.sel{border-color:var(--zaff);color:var(--zaff);font-weight:700}
.mtools{margin-top:7px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.mtools select{border:1px solid var(--linea);border-radius:8px;padding:4px 6px;font-size:11.5px;color:var(--grigio);background:var(--card);max-width:46%}
.badge{font-size:10.5px;background:var(--okbg);color:var(--ok);border-radius:7px;padding:2.5px 8px;font-weight:700}
.badge.moved{background:var(--rossobg);color:var(--rosso)}
.badge.ai{background:var(--mensabg);color:var(--mensa)}
.legend{display:flex;gap:12px;font-size:12px;color:var(--grigio);margin-top:6px;flex-wrap:wrap}
.legend b{font-size:14px}
.daytotal{font-size:13px;font-weight:700;color:var(--bosco);padding:4px 2px 8px}
.daytotal span{color:var(--salvia)}
textarea,input[type=text],input[type=number],input[type=date],input[type=password],select{width:100%;border:1px solid var(--linea);border-radius:10px;padding:9px;font-size:14px;font-family:inherit;background:var(--card);color:var(--ink)}
textarea{min-height:54px;resize:vertical}
label{font-size:12px;font-weight:700;color:var(--grigio);display:block;margin:8px 0 3px}
.btn{display:inline-block;border:0;background:var(--salvia);color:#fff;border-radius:11px;padding:10px 17px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;box-shadow:var(--shadow)}
html[data-theme="dark"] .btn{color:#0F1712}
.btn.ghost{background:var(--card);color:var(--salvia);border:1.5px solid var(--salvia);box-shadow:none}
.btn.warn{background:var(--rosso)}
.btn.small{padding:6px 12px;font-size:12.5px;margin-top:4px}
.row2{display:flex;gap:9px}.row2>*{flex:1}
.row3{display:flex;gap:7px}.row3>*{flex:1}
.shopcat{font-weight:700;color:#fff;background:linear-gradient(90deg,var(--hdr1),var(--hdr2));border-radius:11px 11px 0 0;padding:9px 13px;font-size:13.5px;margin-top:13px}
.shopitems{background:var(--card);border:1px solid var(--linea);border-top:0;border-radius:0 0 11px 11px;padding:4px 0;box-shadow:var(--shadow)}
.shopitem{display:flex;align-items:center;gap:9px;padding:9px 13px;border-bottom:1px solid var(--linea);font-size:13.5px}
.shopitem:last-child{border-bottom:0}
.shopitem.c{opacity:.45}.shopitem.c .st{text-decoration:line-through}
.shopitem .box{min-width:22px;height:22px;border:2px solid var(--salvia);border-radius:7px;text-align:center;line-height:18px;color:#fff;font-size:13px;cursor:pointer;flex-shrink:0}
.shopitem.c .box{background:var(--salvia)}
.shopitem .st{flex:1;cursor:pointer}
.ibtn{border:1px solid var(--linea);background:var(--card);border-radius:8px;padding:4px 7px;font-size:13px;cursor:pointer;flex-shrink:0}
.gaugecard{background:var(--card);border:1px solid var(--linea);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);text-align:center}
.ringwrap{position:relative;width:170px;height:170px;margin:4px auto}
.ringwrap svg{transform:rotate(-90deg)}
.ringnum{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center}
.ringnum .v{font-size:30px;font-weight:800}
.ringnum .v.def{color:var(--salvia)}.ringnum .v.sur{color:var(--rosso)}
.ringnum .l{font-size:11px;color:var(--grigio);margin-top:2px}
.stat3{display:flex;gap:8px;margin-top:12px}
.stat3>div{flex:1;background:var(--menta);border-radius:11px;padding:9px 4px;text-align:center}
.stat3 .v{font-weight:800;font-size:16px;color:var(--bosco)}
.stat3 .l{font-size:10.5px;color:var(--grigio)}
.gnums{display:flex;justify-content:space-around;font-size:12px;color:var(--grigio);margin-top:8px}
.gnums b{color:var(--ink)}
.wline{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--linea);font-size:13.5px;gap:8px}
.wline:last-child{border-bottom:0}
.wline .del{color:var(--rosso);cursor:pointer;font-weight:700;padding:0 7px}
.water{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}
.water span{width:32px;height:36px;border:2px solid #B7CFEA;border-radius:7px 7px 12px 12px;cursor:pointer;font-size:17px;text-align:center;line-height:33px;transition:all .12s}
.water span.f{background:#D6E7FA;border-color:var(--mensa);transform:translateY(-2px)}
html[data-theme="dark"] .water span.f{background:#1E3350}
.stars{display:flex;gap:4px;font-size:22px;cursor:pointer;user-select:none}
.stars span{filter:grayscale(1);opacity:.4}
.stars span.on{filter:none;opacity:1}
.hint{font-size:12px;color:var(--grigio);margin-top:5px;line-height:1.55}
.aibox{background:var(--mensabg);border:1px solid var(--linea);border-radius:11px;padding:11px;margin-top:9px;font-size:13.5px;line-height:1.5;white-space:pre-wrap}
.histweek{border:1px solid var(--linea);border-radius:12px;background:var(--card);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
.histweek .hh{padding:11px 13px;display:flex;justify-content:space-between;cursor:pointer;font-weight:700;color:var(--bosco);font-size:14px}
.histweek .hb{display:none;padding:0 13px 12px;font-size:13px}
.histweek.open .hb{display:block}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{padding:5px 4px;border-bottom:1px solid var(--linea);text-align:left}
th{color:var(--grigio);font-size:11px}
td.n{text-align:right;font-variant-numeric:tabular-nums}
.pill{display:inline-block;font-size:11px;border-radius:14px;padding:3px 10px;background:var(--okbg);color:var(--ok);font-weight:700;margin:2px 3px 0 0}
.todaytag{background:var(--zaff);color:#fff;border-radius:7px;font-size:10.5px;padding:2.5px 8px;font-family:system-ui;font-weight:700}
canvas{max-width:100%}
#scanbox{display:none;margin-top:10px}
#scanreader{width:100%;border-radius:12px;overflow:hidden}
button:focus-visible,select:focus-visible,input:focus-visible,.chk:focus-visible{outline:2.5px solid var(--mensa);outline-offset:2px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media(min-width:700px){.tabs{max-width:640px;left:50%;transform:translateX(-50%);border:1px solid var(--linea);border-radius:16px 16px 0 0}}
/* ══════════ STAMPA: Report per il nutrizionista ══════════ */
@media print{
  body{padding:0;background:#fff;color:#000}
  header,.tabs,.btn,.ibtn,.chipbtn,.datebar,#scanbox{display:none!important}
  .page{display:none!important}
  #printreport{display:block!important;padding:20px;font-size:12px}
  #printreport h1{font-size:20px;margin-bottom:4px}
  #printreport h2{font-size:15px;margin:14px 0 6px}
  #printreport table{font-size:11px}
  .card,.histweek{box-shadow:none;border:1px solid #ccc}
}
#printreport{display:none}
</style>
</head>
<body>

<header>
  <div class="hrow">
    <h1 id="hTitle">Il mio Diario</h1>
    <div class="hbtns">
      <span class="streak" id="hStreak" title="Giorni in target consecutivi">🔥 0</span>
      <button class="hbtn" id="themeBtn" onclick="toggleTheme()" title="Tema chiaro/scuro">🌙</button>
    </div>
  </div>
  <!-- Scorrimento date: frecce per navigare i giorni -->
  <div class="datebar">
    <button onclick="shiftDay(-1)" aria-label="Giorno precedente">‹</button>
    <div class="dt" id="hDate" onclick="goToday()" title="Tocca per tornare a oggi"></div>
    <button onclick="shiftDay(1)" aria-label="Giorno successivo">›</button>
  </div>
</header>

<div class="page" id="pg-oggi"></div>
<div class="page" id="pg-piano"></div>
<div class="page" id="pg-spesa"></div>
<div class="page" id="pg-sport"></div>
<div class="page" id="pg-storico"></div>
<div class="page" id="pg-io"></div>
<div id="printreport"></div>

<nav class="tabs">
  <button data-p="oggi"><span class="ic">☀️</span>Oggi</button>
  <button data-p="piano"><span class="ic">🍽️</span>Piano</button>
  <button data-p="spesa"><span class="ic">🛒</span>Spesa</button>
  <button data-p="sport"><span class="ic">🏃</span>Sport</button>
  <button data-p="storico"><span class="ic">📚</span>Storico</button>
  <button data-p="io"><span class="ic">👤</span>Io</button>
</nav>

<script>
"use strict";
/* ═══════════════════════════════════════════════════════════════
   1. DATI DEL PIANO (ribilanciati: quinoa soffiata al posto dell'avena
      −100 kcal / −5 g prot in colazione, compensati con
      "+ parmigiano 15g + 1 noce" (+90 kcal / +6 g prot) in UN pasto
      normale al giorno (mai mensa, mai liberi).
   ═══════════════════════════════════════════════════════════════ */
const ADD=" + parmigiano 15g + 1 noce"; // il compenso quotidiano
const MM ={n:"Metà mattina",t:"09:30",type:"norm",o:[{d:"Kefir 150g + quinoa soffiata 25g + frutti di bosco 40g + semi oleosi 10g",k:250,p:9}]};
const POM={n:"Metà pomeriggio",t:"16:00",type:"norm",o:[{d:"Yogurt greco 150g + frutta di stagione 40g + semi oleosi 10g",k:170,p:17}]};
const DC ={n:"Dopo cena",t:"21:30",type:"norm",o:[{d:"Tisana senza zucchero e frutta",k:70,p:0}]};
const PLAN=[
 {day:"Lunedì",ctx:"A casa (smart)",meals:[MM,
   {n:"Pranzo",t:"12:30",type:"norm",o:[{d:"Pollo 200g + verdura + patate 150g + ½ avocado + EVO 10g"+ADD,k:710,p:53}]},POM,
   {n:"Cena",t:"19:30",type:"norm",o:[{d:"Zuppa di verdure + 2 uova sode + crostini 30g + ½ avocado + EVO 10g",k:490,p:22}]},DC]},
 {day:"Martedì",ctx:"In ufficio — pranzo in mensa",meals:[{...MM,t:"09:30 (portatile)"},
   {n:"Pranzo",t:"12:30",type:"mensa",o:[{d:"MENSA: secondo di carne o pesce + verdura/insalata + pane + frutta",k:600,p:38}]},
   {...POM,t:"16:00 (portatile)"},
   {n:"Cena",t:"19:30",type:"norm",o:[
     {d:"Pane 60g + vitello 200g + scamorza 20g + insalata + patate 150g"+ADD,k:700,p:63},
     {d:"Pane 60g + prosciutto 150g + scamorza 40g + insalata + patate 150g"+ADD,k:700,p:63},
     {d:"Pane 120g + prosciutto 150g + scamorza 40g + insalata"+ADD,k:700,p:63}]},DC]},
 {day:"Mercoledì",ctx:"A casa (smart)",meals:[MM,
   {n:"Pranzo",t:"12:30",type:"free",o:[
     {d:"LIBERO: sushi — 4 nigiri + 16 uramaki (vai piano con la soia)",k:720,p:30},
     {d:"Branzino 250g + verdura + patate 180g + EVO 10g",k:520,p:51}]},POM,
   {n:"Cena",t:"19:30",type:"norm",o:[{d:"Verdura cruda + tonno 100g + fiocchi di latte 170g + pane 30g"+ADD,k:580,p:57}]},DC]},
 {day:"Giovedì",ctx:"In ufficio — pranzo in mensa",meals:[{...MM,t:"09:30 (portatile)"},
   {n:"Pranzo",t:"12:30",type:"mensa",o:[{d:"MENSA: secondo di carne o pesce + verdura/insalata + pane + frutta",k:600,p:38}]},
   {...POM,t:"16:00 (portatile)"},
   {n:"Cena",t:"19:30",type:"norm",o:[{d:"Pollo 200g + verdura + patate al forno 200g + EVO 10g"+ADD,k:630,p:52}]},
   {n:"Dopo cena",t:"21:30",type:"free",o:[{d:"LIBERO: gelato 1 pallina o dolcetto",k:150,p:3}]}]},
 {day:"Venerdì",ctx:"A casa (smart)",meals:[MM,
   {n:"Pranzo",t:"12:30",type:"norm",o:[{d:"Pasta 100g + tonno 120g + parmigiano 15g + verdura + EVO 10g"+ADD,k:780,p:52}]},
   {n:"Aperitivo",t:"17:30",type:"free",o:[
     {d:"LIBERO: birra media, olive, pochi panificati o fritti",k:570,p:0},
     {d:"Yogurt greco 150g + frutta di stagione 40g + semi oleosi 10g",k:170,p:17}]},
   {n:"Cena",t:"20:00",type:"norm",o:[{d:"3 uova + piselli 220g + patate 100g",k:520,p:39}]},DC]},
 {day:"Sabato",ctx:"Weekend — flessibile",meals:[MM,
   {n:"Pranzo",t:"12:30",type:"norm",o:[{d:"Caprino 100g + piselli 240g + verdura + patate 100g + EVO 10g"+ADD,k:800,p:45}]},POM,
   {n:"Cena",t:"20:00",type:"free",o:[{d:"LIBERO: pizza, burger o grigliata non eccessivi, poche patatine",k:900,p:30}]},DC]},
 {day:"Domenica",ctx:"Weekend — flessibile",meals:[
   {n:"Colazione",t:"09:30",type:"free",o:[
     {d:"LIBERO: 1 cornetto + succo senza zucchero",k:350,p:4},
     {d:"Kefir 150g + quinoa soffiata 25g + frutti di bosco 40g + semi oleosi 10g",k:250,p:9}]},
   {n:"Pranzo",t:"12:30",type:"norm",o:[{d:"3 uova + piselli 100g + verdura + EVO 10g"+ADD,k:550,p:36}]},POM,
   {n:"Cena",t:"19:30",type:"norm",o:[{d:"Salmone al forno 250g + verdura + patate 150g + EVO 10g",k:700,p:59}]},DC]}
];
const SLOTS=["Colazione","Metà mattina","Pranzo","Metà pomeriggio","Aperitivo","Cena","Dopo cena"];
const SHOP=[

function age(){if(!S.profile.dob)return 0;const b=new Date(S.profile.dob),n=new Date();
  let a=n.getFullYear()-b.getFullYear();if(n<new Date(n.getFullYear(),b.getMonth(),b.getDate()))a--;return a;}
function bmr(){const p=S.profile,lbm=parseFloat(p.lbm);
  if(lbm>0)return Math.round(370+21.6*lbm);
  const base=10*p.w+6.25*p.h-5*age();return Math.round(p.gender==="m"?base+5:base-161);}
function tdee(){return Math.round(bmr()*S.profile.act);}
function allSports(){return SPORTS_DEFAULT.concat(S.customSports);}
function workoutKcal(w){const sp=allSports().find(s=>s.name===w.sport)||{met:6};
  return Math.round(sp.met*S.profile.w*(w.min/60)*(INT[w.int]||1));}
function mealOpt(pdi,mi){const st=S.week.days[pdi].meals[mi];
  if(st.custom)return st.custom; // override AI/manuale della settimana
  const perm=S.permMeals[pdi+"_"+mi];
  if(perm&&st.opt===0)return perm; // override permanente sull'opzione base
  return PLAN[pdi].meals[mi].o[st.opt]||PLAN[pdi].meals[mi].o[0];}
function assignedDay(pdi,mi){const st=S.week.days[pdi].meals[mi];return st.movedTo===-1?pdi:st.movedTo;}
function dayItems(di){const items=[];
  PLAN.forEach((pd,pdi)=>pd.meals.forEach((m,mi)=>{if(assignedDay(pdi,mi)===di){
    const st=S.week.days[pdi].meals[mi];const slot=st.movedAs||m.n;
    items.push({pdi,mi,slot,ord:SLOTS.indexOf(slot)<0?9:SLOTS.indexOf(slot)});}}));
  items.sort((a,b)=>a.ord-b.ord);return items;}
function eatenOfDay(di){let k=0,p=0;
  dayItems(di).forEach(it=>{const st=S.week.days[it.pdi].meals[it.mi];
    if(st.done&&!st.skip){const o=mealOpt(it.pdi,it.mi);k+=o.k;p+=o.p;}});
  S.week.days[di].extras.forEach(e=>{k+=e.k;p+=e.p||0;});return{k,p};}
function extrasKcal(di){return S.week.days[di].extras.reduce((a,e)=>a+e.k,0);}
function skippedOfDay(di){return dayItems(di).filter(it=>S.week.days[it.pdi].meals[it.mi].skip).length;}
function plannedOfDay(di){let k=0,p=0;
  dayItems(di).forEach(it=>{const o=mealOpt(it.pdi,it.mi);k+=o.k;p+=o.p;});return{k,p};}
function burnedOfDay(di){return S.week.days[di].workouts.reduce((a,w)=>a+workoutKcal(w),0);}
function deficitOfDay(di){return tdee()+burnedOfDay(di)-eatenOfDay(di).k;}
/* Obiettivo acqua dinamico: +2 bicchieri se allenamento intenso o >45' */
function waterGoal(di){const hard=S.week.days[di].workouts.some(w=>w.int==="alta"||w.min>45);return 8+(hard?2:0);}

/* ═══════════════════════════════════════════════════════════════
   5. STREAK 🔥 (giorni in target consecutivi) — congelata in vacanza
   ═══════════════════════════════════════════════════════════════ */
function dayInTarget(di){const e=eatenOfDay(di);
  return e.k>0&&deficitOfDay(di)>=0&&extrasKcal(di)<=300;}
function bumpStreak(){const y=new Date();y.setDate(y.getDate()-1);y.setHours(12,0,0,0);
  const yIso=iso(y);if(S.streak.last===yIso)return;
  if(S.ui.vacanza){S.streak.last=yIso;save();return;} // vacanza: congela
  const prev=new Date(y);prev.setDate(prev.getDate()-1);
  if(dayInTarget(wd(y))){S.streak.count=(S.streak.last===iso(prev)||S.streak.count===0)?S.streak.count+1:1;}
  else S.streak.count=0;
  S.streak.last=yIso;save();}

const GEM_CHAIN=["gemini-3.5-flash","gemini-3.1-flash-lite","gemini-2.5-flash","gemini-2.5-flash-lite"];
const GEM_ALL=["auto"].concat(GEM_CHAIN,["gemini-3.1-pro-preview","gemini-2.5-pro"]);
function gemModels(){const m=S.ai.model||"auto";
  return m==="auto"?GEM_CHAIN:[m].concat(GEM_CHAIN.filter(x=>x!==m));}
/* parts extra (immagini) in formato Gemini inline_data */
async function geminiCall(prompt,imgB64,mime){
  const key=(S.ai&&S.ai.key||"").trim();if(!key)throw new Error("nokey");
  const parts=[];
  if(imgB64)parts.push({inline_data:{mime_type:mime||"image/jpeg",data:imgB64}});
  parts.push({text:prompt});
  let lastErr=null;
  for(const m of gemModels()){
    try{const r=await fetch("https://generativelanguage.googleapis.com/v1beta/models/"+m+":generateContent?key="+encodeURIComponent(key),{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({contents:[{parts}]})});
      if(r.status===404||r.status===429){lastErr=new Error(r.status===404?"modello":"quota");continue;}
      if(!r.ok)throw new Error("HTTP "+r.status);
      const j=await r.json();return j.candidates[0].content.parts.map(p=>p.text||"").join("");
    }catch(e){lastErr=e;if(!/modello|quota/.test(String(e.message||e)))break;}}
  throw lastErr||new Error("errore");}
/* Ollama locale (es. Gemma 4 multimodale): API nativa /api/chat, immagini in base64.
   Richiede Ollama sul PC con OLLAMA_ORIGINS impostato per il CORS. */
async function ollamaCall(prompt,imgB64){
  const url=(S.ai.ourl||"http://localhost:11434").replace(/\/$/,"");
  const msg={role:"user",content:prompt};if(imgB64)msg.images=[imgB64];
  const r=await fetch(url+"/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:S.ai.omodel||"gemma4:e4b",messages:[msg],stream:false})});
  if(!r.ok)throw new Error("Ollama HTTP "+r.status);
  const j=await r.json();return j.message.content;}
const aiOn=()=>S.ai.provider==="ollama"||!!(S.ai&&S.ai.key);
async function aiAsk(prompt){return S.ai.provider==="ollama"?ollamaCall(prompt):geminiCall(prompt);}
async function aiAskVision(prompt,imgB64,mime){return S.ai.provider==="ollama"?ollamaCall(prompt,imgB64):geminiCall(prompt,imgB64,mime);}
/* Scatta/scegli una foto e ridimensionala (max 1024px, JPEG) per contenere i token */
function snapPhoto(){return new Promise((res,rej)=>{
  const inp=document.createElement("input");inp.type="file";inp.accept="image/*";inp.capture="environment";
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return rej(new Error("annullato"));
    const img=new Image();img.onload=()=>{
      const MAX=1024,sc=Math.min(1,MAX/Math.max(img.width,img.height));
      const c=document.createElement("canvas");c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      res({b64:c.toDataURL("image/jpeg",0.82).split(",")[1],mime:"image/jpeg"});
      URL.revokeObjectURL(img.src);};
    img.onerror=()=>rej(new Error("immagine non leggibile"));
    img.src=URL.createObjectURL(f);};
  inp.click();});}

function mealCard(pdi,mi){
  const m=PLAN[pdi].meals[mi],st=S.week.days[pdi].meals[mi],o=mealOpt(pdi,mi);
  const dispName=st.movedAs||m.n;
  const cls="meal "+(m.type==="free"?"free ":"")+(m.type==="mensa"?"mensa ":"")+(st.done?"done ":"")+(st.skip?"skip":"");
  const sym=st.done?"✓":(st.skip?"✗":"");
  let h=`<div class="${cls}">
    <div class="chk ${st.done?"c":""}${st.skip?" s":""}" role="button" tabindex="0" onclick="tgl(${pdi},${mi})">${sym}</div>
    <div class="mbody">
      <div class="mtop"><span class="mname">${esc(dispName)}${st.skip?" (saltato)":""}</span><span class="mtime">${m.t}</span></div>
      <div class="mdesc">${esc(o.d)}</div>
      <div class="mkcal">~${o.k} kcal · ~${o.p} g prot ${st.custom?'<span class="badge ai">modificato</span>':(S.permMeals[pdi+"_"+mi]&&st.opt===0?'<span class="badge ai">alternativa fissa</span>':"")}</div>`;
  if(PLAN[pdi].meals[mi].o.length>1&&!st.custom){h+=`<div class="mopts">`+m.o.map((x,oi)=>
    `<button class="${oi===st.opt?"sel":""}" onclick="setOpt(${pdi},${mi},${oi})">Opzione ${oi+1}</button>`).join("")+`</div>`;}
  h+=`<div class="mtools">
    <select onchange="moveDay(${pdi},${mi},this.value)">
      <option value="-1" ${st.movedTo===-1?"selected":""}>📍 ${PLAN[pdi].day}</option>`;
  PLAN.forEach((d,di)=>{if(di!==pdi)h+=`<option value="${di}" ${st.movedTo===di?"selected":""}>→ ${d.day}</option>`;});
  h+=`</select>
    <select onchange="moveSlot(${pdi},${mi},this.value)">`;
  SLOTS.forEach(s=>{h+=`<option ${((st.movedAs||m.n)===s)?"selected":""}>${s}</option>`;});
  h+=`</select>
    <button class="ibtn" title="Modifica ingredienti (ristima AI)" onclick="editMeal(${pdi},${mi})">✏️</button>
    <button class="ibtn" title="Inventami un'alternativa con gli stessi macro" onclick="altMeal(${pdi},${mi})">🎲</button>`;
  if(st.custom)h+=`<button class="ibtn" title="Ripristina originale" onclick="resetMeal(${pdi},${mi})">↩️</button>`;
  if(st.movedTo!==-1||st.movedAs&&st.movedAs!==m.n)h+=`<span class="badge moved">da ${PLAN[pdi].day} · ${m.n}</span>`;
  h+=`</div></div></div>`;return h;}

function ring(pct,def){const r=72,c=2*Math.PI*r,off=c*(1-Math.min(1,pct));
  return `<div class="ringwrap"><svg width="170" height="170">
    <circle cx="85" cy="85" r="${r}" fill="none" stroke="var(--linea)" stroke-width="14"/>
    <circle cx="85" cy="85" r="${r}" fill="none" stroke="${def>=0?"#2F7D3B":"#B23B3B"}" stroke-width="14" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset .5s"/></svg>
    <div class="ringnum"><div class="v ${def>=0?"def":"sur"}">${def>=0?"−":"+"}${Math.abs(def)}</div>
    <div class="l">${def>=0?"kcal di deficit":"kcal di surplus"}</div></div></div>`;}
function stars(di,field){let h=`<div class="stars">`;
  for(let i=1;i<=5;i++)h+=`<span class="${S.week.days[di][field]>=i?"on":""}" onclick="setStar(${di},'${field}',${i})">⭐</span>`;
  return h+`</div>`;}

  <div class="aibox" id="menuOut" style="display:none"></div></div>`;
  el.innerHTML=h;
  // mostra i box AI solo quando pieni
  ["fridgeOut","menuOut"].forEach(id=>{const b=document.getElementById(id);
    new MutationObserver(()=>{b.style.display=b.textContent.trim()?"block":"none";}).observe(b,{childList:true,subtree:true,characterData:true});});}

/* ═══════════════════════════════════════════════════════════════
   11. SCANNER BARCODE (Html5-Qrcode + Open Food Facts, senza token AI)
   ═══════════════════════════════════════════════════════════════ */
let scanner=null;
window.startScan=(di)=>{
  if(window._noScan||typeof Html5Qrcode==="undefined")return alert("Scanner non disponibile: serve internet al primo avvio per caricare la libreria.");
  document.getElementById("scanbox").style.display="block";
  scanner=new Html5Qrcode("scanreader");
  scanner.start({facingMode:"environment"},{fps:10,qrbox:{width:230,height:120}},
    async code=>{stopScan();
      try{
        const r=await fetch("https://world.openfoodfacts.org/api/v0/product/"+code+".json");
        const j=await r.json();
        if(j.status!==1)return alert("Prodotto non trovato su Open Food Facts. Inseriscilo a mano.");
        const nm=j.product.product_name||"Prodotto",nu=j.product.nutriments||{};
        const k100=Math.round(nu["energy-kcal_100g"]||0),p100=Math.round((nu["proteins_100g"]||0)*10)/10;
        const g=parseFloat(prompt(nm+"\n~"+k100+" kcal e "+p100+" g prot per 100 g.\nQuanti grammi ne hai mangiati?","30"))||0;
        if(!g)return;
        S.week.days[di].extras.push({d:nm+" "+g+"g",k:Math.round(k100*g/100),p:Math.round(p100*g/100)});
        save();render("oggi");
      }catch(e){alert("Errore di rete verso Open Food Facts.");}
    },()=>{}).catch(()=>alert("Fotocamera non disponibile (permessi o contesto non sicuro)."));};
window.stopScan=()=>{if(scanner){scanner.stop().catch(()=>{});scanner=null;}
  const b=document.getElementById("scanbox");if(b)b.style.display="none";};

    .replace(/[0-9]+([.,][0-9]+)?\s*(g|kg|l|ml|pz)?/gi,"").replace(/[—–-].*$/,"")

/* ═══════════════════════════════════════════════════════════════
   14. STORICO: recap, salvataggio con AI (report PT + correlazioni +
       check TDEE), grafici Chart.js, WhatsApp, Report PDF
   ═══════════════════════════════════════════════════════════════ */
function weekSummary(){
  const days=PLAN.map((d,di)=>{const e=eatenOfDay(di);
    return {day:d.day,eat:e.k,prot:e.p,burn:burnedOfDay(di),def:deficitOfDay(di),sk:skippedOfDay(di),
      sgarri:extrasKcal(di),sleep:S.week.days[di].sleep,stress:S.week.days[di].stress,
      note:S.week.days[di].note||"",workouts:S.week.days[di].workouts.map(w=>w.sport+" "+w.min+"'")}});
  const avg=a=>Math.round(a.reduce((x,y)=>x+y,0)/7);
  return {from:S.week.started,to:iso(new Date()),tdee:tdee(),weight:S.profile.w,
    avgEat:avg(days.map(d=>d.eat)),avgProt:avg(days.map(d=>d.prot)),avgDef:avg(days.map(d=>d.def)),
    totBurn:days.reduce((a,d)=>a+d.burn,0),days,ai:null};}
function renderStorico(){const el=document.getElementById("pg-storico");
  const w=weekSummary();
  let h=`<div class="card"><h2>Recap della settimana in corso</h2>
  <table><tr><th>Giorno</th><th class="n">Mangiate</th><th class="n">Prot</th><th class="n">Sport</th><th class="n">😴/😰</th><th class="n">Deficit</th></tr>`;
  w.days.forEach(d=>{h+=`<tr><td>${d.day.slice(0,3)}${d.sk?` <span style="color:var(--rosso)">✗${d.sk}</span>`:""}</td>
    <td class="n">${d.eat}</td><td class="n">${d.prot}g</td><td class="n">${d.burn}</td>
    <td class="n">${d.sleep||"–"}/${d.stress||"–"}</td>
    <td class="n" style="color:${d.def>=0?"var(--salvia)":"var(--rosso)"}">${d.def>=0?"−":"+"}${Math.abs(d.def)}</td></tr>`;});
  h+=`</table><div class="stat3"><div><div class="v">${w.avgEat}</div><div class="l">kcal medie</div></div>
  <div><div class="v">${w.avgProt} g</div><div class="l">prot medie</div></div>
  <div><div class="v">−${w.avgDef}</div><div class="l">deficit medio</div></div></div>
  <button class="btn" onclick="closeWeek()">Salva settimana e ricomincia</button>
  <button class="btn ghost" onclick="waWeek()">📤 WhatsApp</button>
  <button class="btn ghost" onclick="printReport()">🖨️ Esporta Report PDF</button></div>`;
  // Grafici
  h+=`<div class="card"><h2>Grafici</h2><canvas id="chWeight" height="170"></canvas><div style="height:14px"></div><canvas id="chDef" height="150"></canvas>
  <div class="hint" id="chHint"></div></div>`;
  // Storia
  h+=`<div class="card"><h2>Settimane passate</h2>`;
  if(!S.history.length)h+=`<div class="hint">Ancora nessuna settimana salvata.</div>`;
  S.history.slice().reverse().forEach((wk,ri)=>{const i=S.history.length-1-ri;
    h+=`<div class="histweek" id="hw${i}"><div class="hh" onclick="document.getElementById('hw${i}').classList.toggle('open')">
      <span>${new Date(wk.from).toLocaleDateString("it-IT")} → ${new Date(wk.to).toLocaleDateString("it-IT")}</span>
      <span style="color:var(--salvia)">−${wk.avgDef}/g</span></div><div class="hb">
      <span class="pill">${wk.avgEat} kcal medie</span><span class="pill">${wk.avgProt} g prot</span>
      <span class="pill">${wk.totBurn} kcal sport</span><span class="pill">peso ${wk.weight} kg</span>`;
    if(wk.ai&&wk.ai.report)h+=`<div class="aibox">🏋️ ${esc(wk.ai.report)}${wk.ai.corr?"\n\n🔍 "+esc(wk.ai.corr):""}</div>`;
    wk.days.forEach(d=>{if(d.note||d.workouts.length)h+=`<div style="margin-top:5px"><b>${d.day}:</b> ${esc(d.workouts.join(", "))}${d.note?" — 📝 "+esc(d.note):""}</div>`;});
    h+=`<button class="btn warn small" onclick="delWeek(${i})">Elimina</button></div></div>`;});
  h+=`</div>`;el.innerHTML=h;drawCharts();}
function drawCharts(){
  const hint=document.getElementById("chHint");
  if(window._noChart||typeof Chart==="undefined"){if(hint)hint.textContent="Grafici non disponibili offline (Chart.js si carica da internet al primo avvio).";return;}
  const ws=S.profile.weights;
  if(ws.length){new Chart(document.getElementById("chWeight"),{type:"line",
    data:{labels:ws.map(x=>new Date(x.d).toLocaleDateString("it-IT",{day:"numeric",month:"short"})),
      datasets:[{label:"Peso (kg)",data:ws.map(x=>x.w),tension:.3,borderColor:"#2F7D3B",pointRadius:3},
        {label:"Massa grassa (%)",data:ws.map(x=>x.fat??null),tension:.3,borderColor:"#C77A15",pointRadius:3,spanGaps:true,yAxisID:"y2"}]},
    options:{plugins:{legend:{labels:{boxWidth:12}}},scales:{y2:{position:"right",grid:{drawOnChartArea:false}}}}});}
  if(S.history.length){new Chart(document.getElementById("chDef"),{type:"line",
    data:{labels:S.history.map(w=>new Date(w.to).toLocaleDateString("it-IT",{day:"numeric",month:"short"})),
      datasets:[{label:"Deficit medio settimanale (kcal/g)",data:S.history.map(w=>w.avgDef),tension:.3,borderColor:"#2F5FA6",fill:true,backgroundColor:"rgba(47,95,166,.12)"}]},
    options:{plugins:{legend:{labels:{boxWidth:12}}}}});}
  else if(hint)hint.textContent="Il grafico del deficit apparirà dopo la prima settimana salvata.";}
window.closeWeek=async()=>{
  if(!confirm("Salvo la settimana nello storico e azzero la nuova?"))return;
  const wk=weekSummary();
  // AI: report PT + correlazioni (una sola chiamata)
  if(aiOn()){try{
    const t=await aiAsk('Sei un personal trainer rigoroso ma motivante. Dati settimana (dieta, sonno 1-5, stress 1-5, sgarri kcal): '+JSON.stringify(wk.days)+'. Deficit medio '+wk.avgDef+' kcal, proteine medie '+wk.avgProt+'g. Rispondi SOLO JSON: {"report":"commento di massimo 3 frasi in italiano","corr":"1 correlazione interessante trovata tra sonno/stress e alimentazione, 1 frase; se non ce ne sono scrivi stringa vuota"}');
    const j=parseAIJSON(t);wk.ai={report:j.report,corr:j.corr};
  }catch(e){/* senza AI si salva comunque */}}
  S.history.push(wk);
  // Check TDEE: 3 settimane di deficit teorico ma peso fermo
  if(S.history.length>=3){
    const last3=S.history.slice(-3);
    const defOk=last3.every(x=>x.avgDef>=250);
    const wDrop=last3[0].weight-last3[2].weight;
    if(defOk&&wDrop<0.3){
      /* ── Prima di correggere il TDEE: verifica RICOMPOSIZIONE corporea ──
         Peso fermo + massa grassa in calo = stai perdendo grasso e mettendo
         muscolo: nessuna correzione, anzi ottimo segnale. */
      const cutoff=new Date(last3[0].from).getTime();
      const fats=S.profile.weights.filter(x=>x.fat!=null&&new Date(x.d).getTime()>=cutoff).map(x=>x.fat);
      let recomp=false;
      if(fats.length>=2&&(fats[0]-fats[fats.length-1])>=0.5){
        recomp=true;
        alert("📊 Peso fermo ma massa grassa in calo ("+fats[0]+"% → "+fats[fats.length-1]+"%): è RICOMPOSIZIONE, stai perdendo grasso e guadagnando muscolo. Nessuna correzione del TDEE: continua così!");
      }else if(fats.length<2){
        if(confirm("⚖️ Peso fermo da 3 settimane. Prima di correggere il TDEE: la tua % di massa grassa È SCESA (bilancia impedenziometrica o plicometria)?\n\nOK = sì, è scesa (ricomposizione) · Annulla = no / non lo so")){
          recomp=true;
          alert("Perfetto: è ricomposizione (grasso giù, muscolo su a parità di peso). Nessuna correzione necessaria. Consiglio: registra la % di massa grassa nelle pesate per tracciarla.");
        }
      }
      if(!recomp){
      let sugg="Da 3 settimane il deficit teorico c'è ma il peso non scende: probabilmente il TDEE reale è più basso o il NEAT è calato.";
      if(aiOn()){try{
        const t=await aiAsk("In 3 settimane deficit teorico medio "+Math.round(last3.reduce((a,x)=>a+x.avgDef,0)/3)+" kcal/g ma peso invariato ("+last3[0].weight+"→"+last3[2].weight+" kg). Suggerisci in 2 frasi in italiano: correzione del moltiplicatore TDEE e/o aumento passi/NEAT quotidiano.");
        sugg=t;}catch(e){}}
      if(confirm("📉 "+sugg+"\n\nOK = abbasso il fattore attività di 0.05 (TDEE più prudente) · Annulla = lascio così")){
        S.profile.act=Math.max(1.15,Math.round((S.profile.act-0.05)*100)/100);}
      }
    }}
  S.week=freshWeek();save();render(cur);
  alert("Settimana salvata"+(wk.ai?" con report AI":"")+". Buona settimana nuova!");};
window.delWeek=i=>{if(confirm("Eliminare questa settimana dallo storico?")){S.history.splice(i,1);save();render("storico");}};
window.waWeek=()=>{const w=weekSummary();
  let t="📊 *Recap settimana*%0A";
  w.days.forEach(d=>t+=encodeURIComponent(d.day.slice(0,3))+": "+d.eat+" kcal · "+d.prot+"g prot · deficit "+(d.def>=0?"−":"+")+Math.abs(d.def)+"%0A");
  t+="%0AMedie: "+w.avgEat+" kcal · "+w.avgProt+"g prot · deficit −"+w.avgDef;
  window.open("https://wa.me/?text="+t,"_blank");};

  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{try{S=JSON.parse(r.result);save();location.reload();}catch(x){alert("File non valido.");}};r.readAsText(f);};inp.click();};
window.wipePart=()=>{if(confirm("Azzero la settimana in corso? (resto salvato)")){S.week=freshWeek();save();location.reload();}};
window.wipeAll=()=>{if(confirm("Cancellare DAVVERO tutto?")&&confirm("Sicuro? Non si torna indietro.")){localStorage.removeItem(KEY);location.reload();}};

/* ═══════════════════════════════════════════════════════════════
   16. GOOGLE DRIVE SYNC (GSI + Drive REST, scope drive.appdata)
       Funziona solo da origine http/https registrata nel progetto.
   ═══════════════════════════════════════════════════════════════ */
let DTOKEN=null,tokenClient=null;
function loadGSI(cb){if(window.google&&google.accounts)return cb();
  const s=document.createElement("script");s.src="https://accounts.google.com/gsi/client";
  s.onload=cb;s.onerror=()=>alert("Impossibile caricare Google Identity (offline?).");document.head.appendChild(s);}
window.driveConnect=()=>{
  S.drive.cid=document.getElementById("dCid").value.trim();
  S.drive.akey=document.getElementById("dKey").value.trim();save();
  if(!S.drive.cid)return alert("Inserisci il CLIENT_ID.");
  if(location.protocol==="file:")return alert("L'OAuth Google non funziona da file:// — pubblica l'app su https (es. GitHub Pages) e registra l'origine nel progetto Google Cloud.");
  loadGSI(()=>{
    tokenClient=google.accounts.oauth2.initTokenClient({client_id:S.drive.cid,
      scope:"https://www.googleapis.com/auth/drive.appdata",
      callback:async t=>{DTOKEN=t.access_token;S.drive.on=true;save();
        document.getElementById("driveStatus").textContent="✅ Connesso. Sincronizzo…";
        await driveSyncOnStart();render("io");}});
    tokenClient.requestAccessToken();});};
async function driveFind(){
  const r=await fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%27diario_backup.json%27&fields=files(id,modifiedTime)",
    {headers:{Authorization:"Bearer "+DTOKEN}});
  const j=await r.json();return (j.files&&j.files[0])||null;}
window.driveUpload=async()=>{
  if(!DTOKEN)return alert("Connettiti prima a Drive.");
  try{const f=await driveFind();
    const meta={name:"diario_backup.json",parents:f?undefined:["appDataFolder"]};
    const boundary="-------diario";const body=
      "--"+boundary+"\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n"+JSON.stringify(meta)+
      "\r\n--"+boundary+"\r\nContent-Type: application/json\r\n\r\n"+JSON.stringify(S)+"\r\n--"+boundary+"--";
    const url="https://www.googleapis.com/upload/drive/v3/files"+(f?"/"+f.id:"")+"?uploadType=multipart";
    await fetch(url,{method:f?"PATCH":"POST",
      headers:{Authorization:"Bearer "+DTOKEN,"Content-Type":"multipart/related; boundary="+boundary},body});
    const st=document.getElementById("driveStatus");if(st)st.textContent="✅ Salvato su Drive alle "+new Date().toLocaleTimeString("it-IT");
  }catch(e){alert("Errore Drive: "+e.message);}};
async function driveSyncOnStart(){ // confronta timestamp e carica il più recente
  try{const f=await driveFind();if(!f)return driveUpload();
    if(new Date(f.modifiedTime)>new Date(S.meta.updated||0)){
      const r=await fetch("https://www.googleapis.com/drive/v3/files/"+f.id+"?alt=media",{headers:{Authorization:"Bearer "+DTOKEN}});
      const remote=await r.json();
      if(confirm("Su Drive c'è una versione più recente ("+new Date(f.modifiedTime).toLocaleString("it-IT")+"). Caricarla?")){
        S=remote;save();location.reload();}
    }else driveUpload();
  }catch(e){/* silenzioso */}}

/* ═══════════════════════════════════════════════════════════════
   17. AVVIO: header, tema, streak, prompt del mattino
   ═══════════════════════════════════════════════════════════════ */
function renderHeader(){
  document.getElementById("hTitle").textContent=(S.profile.name?"Diario di "+S.profile.name:"Il mio Diario")+(S.ui.vacanza?" 🏖️":"");
  const d=document.getElementById("hDate");
  d.innerHTML=fmtDate(VIEW)+(isToday()?"":"<small>tocca per tornare a oggi</small>");
  document.getElementById("hStreak").textContent="🔥 "+S.streak.count;}
function morningPrompt(){ // notifica interna per allenamenti di ieri dimenticati
  const today=iso(new Date());
  if(S.ui.lastMorning===today)return;
  S.ui.lastMorning=today;save();
  const y=new Date();y.setDate(y.getDate()-1);
  const ydi=wd(y);
  if(S.week.days[ydi].workouts.length===0&&!S.ui.vacanza){
    if(confirm("🌅 Buongiorno! Ieri ("+PLAN[ydi].day+") non risultano allenamenti registrati.\nTi sei dimenticato di inserirli? OK = vado a Sport")){
      show("sport");setTimeout(()=>{const s=document.getElementById("wDay");if(s)s.value=ydi;},80);return true;}}
  return false;}
function render(p){({oggi:renderOggi,piano:renderPiano,spesa:renderSpesa,sport:renderSport,storico:renderStorico,io:renderIo})[p]();renderHeader();}
applyTheme();bumpStreak();renderHeader();
const jumped=morningPrompt();
if(!jumped)show(S.profile.dob?"oggi":"io");
</script>
